    ];

    const CLIENTS_EXISTANTS = [
      { id: "AV-2026-0142", nom: "DUPONT", prenom: "Marie",  tel: "06 12 34 56 78", email: "marie.dupont@email.fr",  type: "particulier", lastSim: "12/04/2026" },
      { id: "AV-2026-0138", nom: "MARTIN", prenom: "Jean",   tel: "06 23 45 67 89", email: "j.martin@email.fr",     type: "particulier", lastSim: "03/05/2026" },
      { id: "AV-2026-0129", nom: "BERNARD",prenom: "Sophie", tel: "06 34 56 78 90", email: "s.bernard@email.fr",    type: "particulier", lastSim: "28/04/2026" },
      { id: "AV-2026-0117", nom: "LEROY",  prenom: "Pierre", tel: "06 45 67 89 01", email: "p.leroy@email.fr",      type: "particulier", lastSim: "—" },
      { id: "AV-2026-0103", nom: "ATELIER MARTIN SAS", prenom: "", tel: "01 42 86 75 30", email: "contact@atelier-martin.fr", type: "entreprise", lastSim: "15/03/2026" },
    ];

    const PRODUITS = [
      { id: "av",   label: "Assurance-Vie",   desc: "Multi-supports",                                dispo: true  },
      { id: "per",  label: "PER",              desc: "Versements déductibles à l'IR",                 dispo: true  },
      { id: "capi", label: "Contrat capi PM",  desc: "Trésorerie d'entreprise, taxé à l'IS",          dispo: true  },
    ];

    // === Constantes PER ===
    const TMI_OPTIONS = [
      { value: 0.00, label: "0 %" },
      { value: 0.11, label: "11 %" },
      { value: 0.30, label: "30 %" },
      { value: 0.41, label: "41 %" },
      { value: 0.45, label: "45 %" },
    ];
    // Rente PER (RVTO) — fraction imposable selon âge à l'entrée en jouissance
    const PER_RVTO_RATIO = (age) => age < 50 ? 0.70 : age < 60 ? 0.50 : age < 70 ? 0.40 : 0.30;

    // === Constantes Capi PM ===
    const IS_OPTIONS = [
      { value: 0.15, label: "15 % (PME ≤ 42 500 €)" },
      { value: 0.25, label: "25 % (taux normal)" },
    ];

    const DEFAULT_INPUTS = {
      mode: "select",
      clientSelected: null,
      clientNom: "", clientPrenom: "", clientTel: "", clientEmail: "", clientType: "particulier",
      produit: "av",
      dureeAnnees: 15,
      nbBeneficiaires: 2,
      ageSouscripteur: 50,
      situationFamiliale: "couple",
      versementInitial: 100000,
      versementMensuel: 500,
      fraisSouscription: 0.0475,
      // Allocation sous forme de liste : ajout/suppression dynamique, dropdown de type.
      // Par défaut une seule ligne (Fonds Euros à 100 %) ; le conseiller ajoute des lignes selon les besoins.
      allocation: [
        { id: 1, type: "fondsEuro", poids: 1.00, rendement: 0.025, sri: 1 },
      ],
      livretId: "csl",
      livretTaux: 0.0125,
      // Droits de succession : ligne directe par défaut à 30 %, indirecte à 60 %
      successionLine: "directe",
      successionTauxDirect: 0.30,
      successionTauxIndirect: 0.60,
      // PER : tranche marginale d'imposition (TMI) + mode de sortie
      tauxIR: 0.30,
      perModeSortie: "capital",  // 'capital' ou 'rente'
      // Capi PM : taux IS applicable
      tauxIS: 0.25,
    };

    // ============================================================
    // MOTEUR
    // ============================================================
    function rdtPondere(a) { return a.reduce((r, s) => r + s.poids * s.rendement, 0); }
    function sriPondere(a) {
      const t = a.reduce((s, x) => s + x.poids, 0);
      const w = a.reduce((s, x) => s + x.poids * x.sri, 0);
      return t > 0 ? w / t : 0;
    }

    function projection(inp, rdtNet) {
      const N = Math.round(inp.dureeAnnees * 12);
      const tm = Math.pow(1 + rdtNet, 1/12) - 1;
      const vIN = inp.versementInitial * (1 - inp.fraisSouscription);
      const vMN = inp.versementMensuel * (1 - inp.fraisSouscription);
      let cap = vIN, totBrut = inp.versementInitial, totNet = vIN;
      for (let m=1; m<=N; m++) {
        cap = (cap + vMN) * (1 + tm);
        totBrut += inp.versementMensuel; totNet += vMN;
      }
      return { capitalFin: cap, totVerseBrut: totBrut, totVerseNet: totNet, plusValue: cap - totNet, fraisSousPay: totBrut - totNet };
    }

    // fiscaliteAV — succession AV/PER en cas de décès
    // successionLine : 'directe' (taux forfaitaire barème) | 'indirecte' (60% flat)
    // txSuccDirect : taux forfaitaire ligne directe (30 % par défaut)
    function fiscaliteAV(cap, vNet, nb, age, txSuccIndirect, vBrut, successionLine, txSuccDirect) {
      const txIndirect = txSuccIndirect ?? TX_SUCC_INDIRECT;
      const txDirect = txSuccDirect ?? 0.30;
      const ligne = successionLine ?? 'directe';
      const av70 = age < 70;
      let taxe=0, partBenef=0, abattBenef=0, imposableBenef=0, taxeBenef=0, abattTotal=0, imposableTotal=0;
      if (av70) {
        // Régime art. 990 I : abattement 152 500 € par bénéficiaire, puis 20 % / 31,25 %
        partBenef = cap / nb;
        abattBenef = ABATT_AV_70;
        abattTotal = abattBenef * nb;
        imposableBenef = Math.max(0, partBenef - abattBenef);
        imposableTotal = imposableBenef * nb;
        const t1 = Math.min(imposableBenef, PLAFOND_T1);
        const t2 = Math.max(0, imposableBenef - PLAFOND_T1);
        taxeBenef = t1*TX_AV_T1 + t2*TX_AV_T2;
        taxe = taxeBenef * nb;
      } else {
        // Après 70 ans : seules les PRIMES versées après 70 ans entrent dans la succession
        // (les gains sont exonérés). Abattement global de 30 500 € sur les primes.
        // Puis droits de succession ordinaires au taux forfaitaire sélectionné.
        const primesBase = vBrut ?? vNet;   // versements bruts de préférence
        abattTotal = ABATT_AV_APRES_70;     // 30 500 € global
        const imposableGlobal = Math.max(0, primesBase - abattTotal);
        imposableTotal = imposableGlobal;
        if (ligne === 'indirecte') {
          taxe = imposableGlobal * txIndirect;
        } else {
          // Ligne directe : taux forfaitaire barème sur capital imposable (après abatt. global 30 500 € AV)
          taxe = imposableGlobal * txDirect;
          imposableTotal = imposableGlobal;
        }
      }
      const direct = cap - taxe;
      return { av70, taxe, direct, abattTotal, abattBenef, partBenef, imposableBenef, imposableTotal, taxeBenef };
    }

    // fiscaliteLivret — droits de succession sur actifs ordinaires (livrets, CAT…)
    // Ligne directe : taux forfaitaire barème appliqué sur le capital brut (sans abattement)
    // Ligne indirecte : 60 % flat (pas d'abattement pour tiers)
    function fiscaliteLivret(cap, nb, successionLine, txSuccIndirect, txSuccDirect) {
      const ligne = successionLine ?? 'directe';
      const txIndirect = txSuccIndirect ?? TX_SUCC_INDIRECT;
      const txDirect = txSuccDirect ?? 0.30;
      if (ligne === 'indirecte') {
        const droits = cap * txIndirect;
        return { abatt: 0, abattTotal: 0, abattParEnfant: 0, imp: cap, imposableTotal: cap, droits, net: cap - droits };
      }
      // Ligne directe : taux forfaitaire sur capital brut (sans abattement individuel)
      const droits = cap * txDirect;
      return { abatt: 0, abattTotal: 0, abattParEnfant: 0, imp: cap, imposableTotal: cap, droits, net: cap - droits };
    }

    // === Fiscalité PER — versements volontaires DÉDUITS à l'entrée ===
    //
    //  SORTIE EN CAPITAL :
    //    • Part "versements bruts" → IR au barème (TMI), SANS abattement de 10 %
    //    • Part "plus-value" (cap − versements bruts) → PFU 2026 = 12,8 % IR + 18,6 % PS = 31,4 %
    //    (option globale pour le barème possible mais généralement défavorable à 30 % de TMI)
    //
    //  SORTIE EN RENTE :
    //    • Imposée comme une pension de retraite : TMI sur rente après abattement 10 %
    //    • PS sur pensions : 0 / 4,3 / 7,4 ou 9,1 % selon le RFR du foyer
    //    → Le NET DE RENTE n'est PAS calculé par le simulateur (dépend du RFR, de la
    //      composition du foyer, du plafonnement de l'abattement 10 %, etc.).
    //      Seule la rente BRUTE estimée est restituée à titre indicatif.
    const PFU_PER_2026 = 0.314;  // 12,8 % IR + 18,6 % PS (2026)
    function fiscalitePER(cap, vNet, vBrut, tauxIR, modeSortie, ageSortie) {
      const ecoFiscEntree = vBrut * tauxIR;
      // Plus-value imposable au PFU = capital − versements bruts (la part de gains)
      const plusValue = Math.max(0, cap - vBrut);
      if (modeSortie === "rente") {
        // On ne calcule PAS la fiscalité de la rente (impossible sans RFR + plafonnement
        // de l'abattement de 10 %). Seule la rente brute annuelle indicative est restituée.
        const renteBruteAn = cap * 0.04;  // approximation tarif rente ~4 %
        return {
          modeSortie: "rente",
          ecoFiscEntree,
          plusValue,
          renteBruteAn,
          // Pas de chiffrage : fiscalité dépend du RFR et de la composition du foyer
          taxeRenteAn: null,
          renteNetteAn: null,
          netCapital: 0,
          taxe: 0, direct: cap, abattTotal: ecoFiscEntree, imposableTotal: 0,
        };
      }
      // Mode capital : IR (TMI) sur versements bruts + PFU 31,4 % sur plus-value
      const taxeCapVerse = vBrut * tauxIR;
      const taxePV = plusValue * PFU_PER_2026;
      const taxeTotale = taxeCapVerse + taxePV;
      return {
        modeSortie: "capital",
        ecoFiscEntree,
        plusValue,
        taxeCapVerse,
        taxePV,
        taxeTotale,
        netCapital: cap - taxeTotale,
        // mapping pour col schema
        taxe: taxeTotale, direct: cap - taxeTotale, abattTotal: ecoFiscEntree, imposableTotal: cap,
      };
    }

    // === Fiscalité Capi PM — IS sur la PLUS-VALUE (intérêts) au rachat ===
    // L'IS s'applique uniquement à la fraction de plus-value du contrat (cap - versements bruts),
    // pas sur le capital total. La fraction "principal" remboursée n'est pas imposable.
    function fiscaliteCapiPM(cap, vBrut, tauxIS) {
      // Plus-value = différence entre le capital récupéré et les versements bruts payés
      // (= les intérêts générés par le contrat, base imposable à l'IS)
      const plusValue = Math.max(0, cap - vBrut);
      const taxeIS = plusValue * tauxIS;
      return {
        plusValue,
        taxeIS,
        principal: vBrut,     // remboursement du capital — non imposable
        netCapital: cap - taxeIS,  // capital total − IS sur intérêts
        // mapping pour col schema
        taxe: taxeIS, direct: cap - taxeIS, abattTotal: 0, imposableTotal: plusValue,
      };
    }

    function rente(cap, vNet, rdt, dur, sit) {
      const brute = cap * rdt;
      const qpv = cap > 0 ? Math.max(0, cap - vNet)/cap : 0;
      const partPV = brute * qpv;
      const ab = sit === "couple" ? ABATT_RENTE_COUPLE : ABATT_RENTE_CELIB;
      let imp, regime;
      if (dur >= 8) {
        imp = Math.max(0, partPV - ab) * PFL_AV_8 + partPV * PS;
        regime = `PFL 7,5% + PS 17,2% (≥ 8 ans)`;
      } else {
        imp = partPV * PFU;
        regime = `PFU 30%`;
      }
      return { brute, imp, nette: brute - imp, regime, qpv };
    }

    function projLivret(vi, vm, dur, taux) {
      const N = Math.round(dur*12); const tm = Math.pow(1+taux, 1/12)-1;
      let cap = vi, tot = vi;
      for (let m=1; m<=N; m++) { cap = (cap+vm)*(1+tm); tot += vm; }
      return { capitalFin: cap, totVerse: tot, plusValue: cap - tot };
    }

    // === PER + Réintégration des réductions d'impôt ===
    //
    // MÉCANIQUE CORRECTE :
    //  • Chaque année, le client verse ses contributions directes dans le PER.
    //  • La réduction d'impôt perçue l'année suivante (remboursement IR) est réinvestie
    //    dans le PER l'année d'après → elle génère elle-même une nouvelle réduction.
    //  • Cela crée un effet de levier composé année après année.
    //
    // MODÈLE :
    //  Année 1 :  versement direct V1 → réduction R1 = V1 × TMI
    //  Année 2 :  versement direct V2 + réinvesti R1 → réduction R2 = (V2+R1) × TMI
    //  Année y :  Vy + R(y-1) → Ry = (Vy + R(y-1)) × TMI
    //
    // auxCap : portion du capital PER financée par les réductions réinvesties.
    // totReduc : somme de TOUTES les réductions générées (y compris sur les réinvestissements).
    // totReinvesti : montant total effectivement réinvesti dans le PER (= totReduc - dernière année).
    function projPERReinvest(inp, rdtNet, tauxIR) {
      const Y = Math.round(inp.dureeAnnees);
      let auxCap = 0;
      let totReduc = 0;
      let totReinvesti = 0;
      let reducPrecedente = 0;  // réduction de l'année y-1, réinvestie en année y
      for (let y = 1; y <= Y; y++) {
        // Versements directs de l'investisseur cette année
        const directY = (y === 1 ? inp.versementInitial : 0) + 12 * inp.versementMensuel;
        // Réduction de l'année précédente, réinvestie dans le PER cette année
        const reinvesteY = reducPrecedente;
        totReinvesti += reinvesteY;
        // Total versé dans le PER cette année (direct + réinvesti) — les deux sont déductibles
        const totalVersY = directY + reinvesteY;
        // Réduction d'impôt générée cette année (sur le total versé)
        const reducY = totalVersY * tauxIR;
        totReduc += reducY;
        // Le capital auxiliaire (partie financée par les réinvestissements) grossit au taux net
        // et reçoit le réinvestissement de cette année
        auxCap = auxCap * (1 + rdtNet) + reinvesteY;
        // La réduction de cette année sera réinvestie l'année prochaine
        reducPrecedente = reducY;
      }
      // La dernière réduction est générée mais non réinvestie (période terminée) :
      // elle est disponible pour l'épargnant à la fin de la période.
      const derniereReduc = reducPrecedente;
      return { auxCap, totReduc, totReinvesti, derniereReduc, plusValue: Math.max(0, auxCap - totReinvesti) };
    }

    /** Year-by-year auxiliary capital series for PER reinvest (graphique) */
    function perReinvestSeries(inp, rdtNet, tauxIR) {
      const Y = Math.round(inp.dureeAnnees);
      let auxCap = 0;
      let reducPrecedente = 0;
      const series = [0];
      for (let y = 1; y <= Y; y++) {
        const directY = (y === 1 ? inp.versementInitial : 0) + 12 * inp.versementMensuel;
        const reinvesteY = reducPrecedente;
        const totalVersY = directY + reinvesteY;
        const reducY = totalVersY * tauxIR;
        auxCap = auxCap * (1 + rdtNet) + reinvesteY;
        reducPrecedente = reducY;
        series.push(auxCap);
      }
      return series;
    }

    /** Year-by-year capital series for AV projection */
    function projectionSeries(inp, rdtNet) {
      const N = Math.round(inp.dureeAnnees);
      const tm = Math.pow(1 + rdtNet, 1/12) - 1;
      const vIN = inp.versementInitial * (1 - inp.fraisSouscription);
      const vMN = inp.versementMensuel * (1 - inp.fraisSouscription);
      let cap = vIN;
      const series = [vIN];
      for (let m = 1; m <= N*12; m++) {
        cap = (cap + vMN) * (1 + tm);
        if (m % 12 === 0) series.push(cap);
      }
      return series;
    }
    /** Year-by-year capital series for livret */
    function livretSeries(inp) {
      const N = Math.round(inp.dureeAnnees);
      const tm = Math.pow(1 + inp.livretTaux, 1/12) - 1;
      let cap = inp.versementInitial;
      const series = [inp.versementInitial];
      for (let m = 1; m <= N*12; m++) {
        cap = (cap + inp.versementMensuel) * (1 + tm);
        if (m % 12 === 0) series.push(cap);
      }
      return series;
    }

    /** Run full simulation for a given inputs snapshot. Returns metrics for given scenario level. */
    function runSimulation(inp, scenarioLvl = "med") {
      const rdtBrut = rdtPondere(inp.allocation);
      const sri = sriPondere(inp.allocation);
      const rdtPess = rdtBrut - 0.01;
      const rdtOpt = rdtBrut + 0.01;
      const rdt = scenarioLvl === "pess" ? rdtPess : scenarioLvl === "opt" ? rdtOpt : rdtBrut;
      const ligne = inp.successionLine ?? 'directe';
      const txIndirect = inp.successionTauxIndirect ?? TX_SUCC_INDIRECT;
      const txDirect = inp.successionTauxDirect ?? 0.30;

      const proj = projection(inp, rdt);
      // Dispatch fiscalité selon le produit choisi (AV / PER / Capi PM)
      let fisc, fiscPER = null, fiscCapi = null;
      if (inp.produit === "per") {
        const ageSortie = (inp.ageSouscripteur || 50) + (inp.dureeAnnees || 0);
        fiscPER = fiscalitePER(proj.capitalFin, proj.totVerseNet, proj.totVerseBrut, inp.tauxIR ?? 0.30, inp.perModeSortie ?? "capital", ageSortie);
        // Pour décès : PER assimilé AV — art. 990 I avant 70, droits succession après 70
        fisc = fiscaliteAV(proj.capitalFin, proj.totVerseNet, inp.nbBeneficiaires, inp.ageSouscripteur, txIndirect, proj.totVerseBrut, ligne, txDirect);
      } else if (inp.produit === "capi") {
        fiscCapi = fiscaliteCapiPM(proj.capitalFin, proj.totVerseBrut, inp.tauxIS ?? 0.25);
        fisc = { av70: false, taxe: fiscCapi.taxeIS, direct: fiscCapi.netCapital, abattTotal: 0, abattBenef: 0, partBenef: 0, imposableBenef: 0, imposableTotal: fiscCapi.plusValue, taxeBenef: 0 };
      } else {
        fisc = fiscaliteAV(proj.capitalFin, proj.totVerseNet, inp.nbBeneficiaires, inp.ageSouscripteur, txIndirect, proj.totVerseBrut, ligne, txDirect);
      }
      const r = rente(proj.capitalFin, proj.totVerseNet, rdt, inp.dureeAnnees, inp.situationFamiliale);
      const livret = projLivret(inp.versementInitial, inp.versementMensuel, inp.dureeAnnees, inp.livretTaux);
      const livretFisc = fiscaliteLivret(livret.capitalFin, inp.nbBeneficiaires, ligne, txIndirect, txDirect);
      const livretRenteBrute = livret.capitalFin * inp.livretTaux;
      // PER + réintégration : capital auxiliaire issu du réinvestissement des réductions d'impôt
      const perReinvest = inp.produit === "per"
        ? projPERReinvest(inp, rdt, inp.tauxIR ?? 0.30)
        : null;

      return { rdtBrut, rdtPess, rdtMed: rdtBrut, rdtOpt, sri, rdt, proj, fisc, fiscPER, fiscCapi, rente: r, livret, livretFisc, livretRenteBrute, perReinvest, txSucc: txIndirect, ligne };
    }

    // === Formatters ===
    const fmtEUR = (n,d=0) => n==null||isNaN(n) ? "—" : new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:d,minimumFractionDigits:d}).format(n);
    const fmtEURc = n => {
      if (n==null||isNaN(n)) return "—";
      if (Math.abs(n)>=1e6) return `${(n/1e6).toFixed(2).replace('.',',')} M€`;
      if (Math.abs(n)>=1e3) return `${Math.round(n/1e3)} k€`;
      return `${Math.round(n)} €`;
    };
    const fmtPCT = (n,d=2) => n==null||isNaN(n) ? "—" : new Intl.NumberFormat('fr-FR',{style:'percent',minimumFractionDigits:d,maximumFractionDigits:d}).format(n);

    // === Icons ===
    const I = {
      logo: () => (
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          {/* Logo FIGARA — étoile compas à 8 branches en rouge */}
          {/* 4 branches cardinales (longues, fines, en losange) */}
          <polygon points="16,1 17,15 16,16 15,15" fill="#DC2626"/>
          <polygon points="31,16 17,17 16,16 17,15" fill="#DC2626"/>
          <polygon points="16,31 15,17 16,16 17,17" fill="#DC2626"/>
          <polygon points="1,16 15,15 16,16 15,17" fill="#DC2626"/>
          {/* 4 branches diagonales (plus courtes) */}
          <polygon points="16,5 17,15 16,16 15,15" fill="#DC2626" transform="rotate(45 16 16)"/>
          <polygon points="16,5 17,15 16,16 15,15" fill="#DC2626" transform="rotate(135 16 16)"/>
          <polygon points="16,5 17,15 16,16 15,15" fill="#DC2626" transform="rotate(225 16 16)"/>
          <polygon points="16,5 17,15 16,16 15,15" fill="#DC2626" transform="rotate(315 16 16)"/>
          {/* Centre */}
          <circle cx="16" cy="16" r="0.8" fill="#DC2626"/>
        </svg>
      ),
      arrow: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
      back: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
      check: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
      close: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      chevron: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      plus: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      x: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      printer: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
      sparkle: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3 L13.5 8.5 L19 10 L13.5 11.5 L12 17 L10.5 11.5 L5 10 L10.5 8.5 Z"/></svg>,
      lock: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      trophy: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
    };

    // ============================================================
    // FIGARA DECOR — filigranes rouges en filigrane sur toutes les étapes
    // ============================================================
    function FigaraDecor() {
      // Filigranes rouges éclatants type screenshot Figara — visibles sur fond sombre
      const lines = Array.from({length: 24}, (_, i) => i);
      const renderWaves = (key) => lines.map(i => {
        const yBase = 25 + i * 5.5;
        const opacity = Math.max(0.1, 0.85 - i * 0.03);
        return (
          <path
            key={`${key}-${i}`}
            d={`M -40 ${yBase}
                C 80 ${yBase - 38}, 180 ${yBase + 70}, 280 ${yBase - 10}
                S 420 ${yBase - 24}, 520 ${yBase + 12}`}
            stroke="#EF4444"
            strokeWidth="0.7"
            strokeOpacity={opacity}
            fill="none"
          />
        );
      });
      return (
        <div className="fixed inset-0 pointer-events-none no-print" style={{zIndex: 0}}>
          {/* Filigrane top-left — flux rouge prominent type brand Figara */}
          <svg className="absolute top-[40px] left-0" width="520" height="380" viewBox="0 0 520 380" fill="none">
            {renderWaves('tl')}
          </svg>
          {/* Filigrane bottom-right miroir */}
          <svg className="absolute bottom-0 right-0" width="520" height="380" viewBox="0 0 520 380" fill="none" style={{transform: 'scale(-1, -1)'}}>
            {renderWaves('br')}
          </svg>
        </div>
      );
    }

    // ============================================================
    // STEPS
    // ============================================================
    const STEPS = [{id:1,label:"Identité"},{id:2,label:"Produit"},{id:3,label:"Allocation"},{id:4,label:"Comparatif"},{id:5,label:"Présentation"}];

    function Breadcrumb({ current, onJump, completable }) {
      return (
        <div className="flex items-start justify-center max-w-2xl mx-auto px-6">
          {STEPS.map((s, idx) => {
            const isActive = current === s.id;
            const isDone = current > s.id;
            const canJump = s.id < current || (completable && completable[s.id]);
            return (
              <React.Fragment key={s.id}>
                <div className={`flex flex-col items-center ${canJump ? 'cursor-pointer group' : ''}`} onClick={() => canJump && onJump(s.id)}>
                  <div className={`step-dot ${isActive ? 'active' : ''} ${isDone ? 'done' : ''} ${canJump ? 'group-hover:scale-105' : ''}`}>
                    {isDone ? <I.check/> : s.id}
                  </div>
                  <div className={`step-text ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}`}>{s.label}</div>
                </div>
                {idx < STEPS.length - 1 && (
                  <div className="flex-1 pt-[18px] px-3"><div className={`step-line ${current > s.id ? 'done' : ''}`}></div></div>
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    // ============================================================
    // APP
    // ============================================================
    function App() {
      const [step, setStep] = useState(1);
      const [inputs, setInputs] = useState(DEFAULT_INPUTS);
      const [scenarios, setScenarios] = useState([]);
      const [scenarioLvl, setScenarioLvl] = useState("med");
      const [builderOpen, setBuilderOpen] = useState(false);
      const [builderInitial, setBuilderInitial] = useState(null);
      const [printMode, setPrintMode] = useState(false);

      // Remonte automatiquement en haut de page à chaque changement d'étape
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, [step]);

      // Computed simulation for current inputs
      const sim = useMemo(() => runSimulation(inputs, scenarioLvl), [inputs, scenarioLvl]);

      const totalP = useMemo(() => inputs.allocation.reduce((s,v)=>s+v.poids, 0), [inputs.allocation]);
      const totalVerseBrut = inputs.versementInitial + inputs.versementMensuel * 12 * inputs.dureeAnnees;
      const reductionCommerciale = (FRAIS_SOUSC_MAX - inputs.fraisSouscription) * totalVerseBrut;
      const reductionPCT = FRAIS_SOUSC_MAX > 0 ? (FRAIS_SOUSC_MAX - inputs.fraisSouscription) / FRAIS_SOUSC_MAX : 0;
      const fraisAuTarifMax = FRAIS_SOUSC_MAX * totalVerseBrut;
      const fraisActuels = inputs.fraisSouscription * totalVerseBrut;

      const completable = {
        1: inputs.mode === "select" ? !!inputs.clientSelected : (inputs.clientNom.trim() && (inputs.clientType === 'entreprise' || inputs.clientPrenom.trim()) && inputs.clientEmail.trim()),
        2: inputs.versementInitial >= 0 && inputs.dureeAnnees > 0 && inputs.nbBeneficiaires >= 1,
        3: Math.abs(totalP - 1) < 0.001,
        4: true,
        5: true,
      };

      const upd = (k,v) => setInputs(p => ({...p, [k]: v}));

      // Allocation : liste libre. Le poids est borné pour que la somme ne dépasse jamais 100 %.
      const updAllocItem = (id, field, v) => {
        setInputs(p => {
          if (field === "poids") {
            const otherSum = p.allocation.filter(item => item.id !== id).reduce((s, x) => s + x.poids, 0);
            const maxAllowed = Math.max(0, 1 - otherSum);
            v = Math.max(0, Math.min(maxAllowed, v));
          }
          return {
            ...p,
            allocation: p.allocation.map(item => item.id === id ? { ...item, [field]: v } : item)
          };
        });
      };
      const addAllocItem = (type = "fondsActions") => {
        setInputs(p => {
          const newId = (p.allocation.length ? Math.max(...p.allocation.map(x => x.id)) : 0) + 1;
          const meta = SUPPORT_META[type];
          return {
            ...p,
            allocation: [...p.allocation, { id: newId, type, poids: 0, rendement: meta.rdtNetDef, sri: meta.sriDef }]
          };
        });
      };
      const removeAllocItem = (id) => {
        setInputs(p => ({
          ...p,
          allocation: p.allocation.length > 1 ? p.allocation.filter(item => item.id !== id) : p.allocation
        }));
      };
      const changeAllocType = (id, newType) => {
        const meta = SUPPORT_META[newType];
        setInputs(p => ({
          ...p,
          allocation: p.allocation.map(item =>
            item.id === id
              ? { ...item, type: newType, rendement: meta.rdtNetDef, sri: meta.sriDef }
              : item
          )
        }));
      };

      const next = () => setStep(s => Math.min(5, s+1));
      const prev = () => setStep(s => Math.max(1, s-1));

      const openBuilder = (sourceInputs) => {
        setBuilderInitial(JSON.parse(JSON.stringify(sourceInputs || inputs)));
        setBuilderOpen(true);
      };
      const closeBuilder = () => setBuilderOpen(false);
      const saveBuilderScen = (nom, builderInputs) => {
        setScenarios(p => [...p, { nom, date: Date.now(), inputs: JSON.parse(JSON.stringify(builderInputs)) }]);
        setBuilderOpen(false);
      };

      const removeScen = (idx) => setScenarios(p => p.filter((_,i)=>i!==idx));
      const loadScen = (s) => setInputs(s.inputs);

      const clientLabel = inputs.mode === "select" && inputs.clientSelected
        ? `${inputs.clientSelected.nom} ${inputs.clientSelected.prenom}`.trim()
        : inputs.mode === "create" && inputs.clientNom
        ? `${inputs.clientNom} ${inputs.clientPrenom}`.trim()
        : "Nouveau client";
      const clientId = inputs.mode === "select" && inputs.clientSelected ? inputs.clientSelected.id : "AV-2026-NEW";

      // Mode présentation client imprimable — overlay plein écran
      if (printMode) {
        return <ClientPresentationPrint inputs={inputs} sim={sim} scenarios={scenarios} clientLabel={clientLabel} totalVerseBrut={totalVerseBrut} onClose={() => setPrintMode(false)} />;
      }

      return (
        <div className="min-h-screen flex flex-col relative">
          {/* FILIGRANE FIGARA — décor brand sur toutes les étapes */}
          <FigaraDecor />

          {/* STICKY HEADER + BREADCRUMB — palette Figara : sombre + serif + filigranes */}
          <div className="sticky top-0 z-30 no-print shadow-xl" style={{
            background: 'linear-gradient(180deg, rgba(28, 25, 23, 0.95) 0%, rgba(41, 37, 36, 0.92) 100%)',
            backdropFilter: 'blur(12px)',
            WebkitBackdropFilter: 'blur(12px)'
          }}>
            {/* Liseré rouge brand Figara en haut */}
            <div className="h-[3px] bg-gradient-to-r from-red-700 via-red-500 to-red-700"></div>
            {/* Filigrane rouge décoratif côté droit du header */}
            <svg className="absolute top-0 right-0 h-full pointer-events-none" width="360" height="100" viewBox="0 0 360 100" preserveAspectRatio="xMaxYMid slice" fill="none" style={{opacity: 0.4}}>
              {Array.from({length: 14}).map((_, i) => {
                const yBase = 8 + i * 6;
                return (
                  <path key={i}
                    d={`M 360 ${yBase} C 280 ${yBase - 8}, 200 ${yBase + 14}, 100 ${yBase - 4} S 0 ${yBase + 8}, -50 ${yBase}`}
                    stroke="#EF4444" strokeWidth="0.6" strokeOpacity={Math.max(0.1, 0.7 - i * 0.045)} fill="none"/>
                );
              })}
            </svg>
            <header className="border-b border-white/10 relative">
              <div className="max-w-screen-xl mx-auto px-6 py-4 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <I.logo/>
                  <div className="serif text-[24px] font-semibold text-white tracking-[0.22em]">FIGARA</div>
                </div>
                <div className="hidden md:flex items-center gap-3 text-[12px]">
                  <span className="text-stone-400">Dossier</span>
                  <span className="mono text-white font-medium">{clientId}</span>
                  {clientLabel !== "Nouveau client" && (
                    <>
                      <span className="text-stone-600">·</span>
                      <span className="text-white font-semibold">{clientLabel}</span>
                    </>
                  )}
                </div>
                <button className="text-stone-400 hover:text-white transition"><I.close/></button>
              </div>
            </header>
            <div className="py-5 relative">
              <Breadcrumb current={step} onJump={setStep} completable={completable}/>
            </div>
          </div>

          <main className="flex-1 py-12 px-6 relative" style={{zIndex: 10}}>
            {step === 1 && <Step1Identite inputs={inputs} upd={upd} key="s1"/>}
            {step === 2 && <Step2Produit inputs={inputs} upd={upd} totalVerseBrut={totalVerseBrut} reductionCommerciale={reductionCommerciale} reductionPCT={reductionPCT} fraisAuTarifMax={fraisAuTarifMax} fraisActuels={fraisActuels} key="s2"/>}
            {step === 3 && <Step3Allocation inputs={inputs} updAllocItem={updAllocItem} addAllocItem={addAllocItem} removeAllocItem={removeAllocItem} changeAllocType={changeAllocType} sim={sim} totalP={totalP} key="s3"/>}
            {step === 4 && <Step4Resultats inputs={inputs} setInputs={setInputs} sim={sim} scenarioLvl={scenarioLvl} setScenarioLvl={setScenarioLvl} scenarios={scenarios} openBuilder={openBuilder} removeScen={removeScen} loadScen={loadScen} upd={upd} key="s4"/>}
            {step === 5 && <Step5Presentation inputs={inputs} sim={sim} scenarios={scenarios} scenarioLvl={scenarioLvl} setScenarioLvl={setScenarioLvl} onOpenPrint={() => setPrintMode(true)} key="s5"/>}
          </main>

          <footer className="border-t border-white/10 backdrop-blur py-5 px-6 no-print relative" style={{zIndex: 10, background: 'linear-gradient(0deg, rgba(28, 25, 23, 0.95) 0%, rgba(41, 37, 36, 0.92) 100%)'}}>
            <div className="max-w-3xl mx-auto flex items-center justify-between gap-4">
              <button onClick={prev} disabled={step===1} className="btn btn-light disabled:opacity-30 disabled:cursor-not-allowed"><I.back/> Précédent</button>
              <div className="text-[11px] uppercase tracking-wider text-stone-400 font-semibold">Étape {step}/{STEPS.length}</div>
              {step < 5 ? (
                <button onClick={next} disabled={!completable[step]} className="btn btn-dark">{step===4?"Présenter":"Continuer"} <I.arrow/></button>
              ) : (
                <button onClick={() => setPrintMode(true)} className="btn btn-dark"><I.printer/> Présentation client</button>
              )}
            </div>
          </footer>

          {/* SCENARIO BUILDER (slide-over) */}
          <ScenarioBuilder open={builderOpen} initialInputs={builderInitial} scenariosCount={scenarios.length} onClose={closeBuilder} onSave={saveBuilderScen} />
        </div>
      );
    }

    // ============================================================
    // STEP 1 — IDENTITÉ (inchangé)
    // ============================================================
    function Step1Identite({ inputs, upd }) {
      const [search, setSearch] = useState("");
      const [open, setOpen] = useState(false);
      const filtered = CLIENTS_EXISTANTS.filter(c => {
        const q = search.toLowerCase();
        return c.nom.toLowerCase().includes(q) || c.prenom.toLowerCase().includes(q) || c.id.toLowerCase().includes(q);
      });

      return (
        <div className="max-w-xl mx-auto page-enter">
          <div className="text-center mb-10">
            <div className="text-[11px] tracking-widest font-semibold text-red-600 uppercase mb-3">Étape 1 sur 4</div>
            <h1 className="text-3xl md:text-4xl font-bold text-stone-900 tracking-tightest">Identification du client</h1>
            <p className="mt-3 text-[14px] text-stone-500">Sélectionnez un client existant ou créez un nouveau dossier.</p>
          </div>

          <div className="grid grid-cols-2 gap-2 p-1 bg-stone-100 rounded-xl mb-8">
            <button onClick={() => upd("mode", "select")} className={`px-4 py-2.5 text-[13px] font-semibold rounded-lg transition ${inputs.mode==="select" ? "bg-white text-stone-900 shadow-sm" : "text-stone-500 hover:text-stone-900"}`}>
              Client existant
            </button>
            <button onClick={() => upd("mode", "create")} className={`px-4 py-2.5 text-[13px] font-semibold rounded-lg transition ${inputs.mode==="create" ? "bg-white text-stone-900 shadow-sm" : "text-stone-500 hover:text-stone-900"}`}>
              Nouveau client
            </button>
          </div>

          {inputs.mode === "select" && (
            <div className="page-enter">
              <label className="label">Rechercher un client</label>
              <div className="relative">
                <div className="flex items-center field" style={{ padding: 0 }}>
                  <span className="pl-4 text-stone-400"><I.search/></span>
                  <input type="text" value={search} onFocus={() => setOpen(true)} onChange={e => { setSearch(e.target.value); setOpen(true); }}
                    placeholder="Nom, prénom ou référence dossier..." className="num flex-1 px-3 py-3.5 bg-transparent text-[15px] focus:outline-none" />
                  <button onClick={() => setOpen(!open)} className="px-4 text-stone-400"><I.chevron/></button>
                </div>
                <div className={`dropdown ${open ? 'open' : ''} mt-0`}>
                  {filtered.length === 0 && <div className="px-4 py-3 text-sm text-stone-400">Aucun client trouvé</div>}
                  {filtered.map(c => (
                    <button key={c.id} onClick={() => { upd("clientSelected", c); setOpen(false); setSearch(""); }}
                      className="w-full text-left px-4 py-3 hover:bg-stone-50 transition border-b border-stone-100 last:border-b-0">
                      <div className="flex items-center justify-between">
                        <div>
                          <div className="text-[14px] font-semibold text-stone-900">{c.nom} {c.prenom}</div>
                          <div className="text-[11px] text-stone-500 mono">{c.id} · {c.type === "particulier" ? "Particulier" : "Entreprise"}</div>
                        </div>
                        <div className="text-[11px] text-stone-400">Dern. simul. {c.lastSim}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>

              {inputs.clientSelected && !open && (
                <div className="mt-6 p-5 bg-stone-50 border border-stone-200 rounded-xl page-enter">
                  <div className="flex items-start justify-between mb-4">
                    <div>
                      <div className="text-[11px] uppercase tracking-wider text-stone-500 font-semibold">Client sélectionné</div>
                      <div className="text-xl font-bold text-stone-900 mt-1">{inputs.clientSelected.nom} {inputs.clientSelected.prenom}</div>
                      <div className="text-[12px] text-stone-500 mono mt-0.5">{inputs.clientSelected.id}</div>
                    </div>
                    <span className="text-[11px] font-semibold uppercase tracking-wider px-2.5 py-1 bg-stone-900 text-white rounded">{inputs.clientSelected.type === "particulier" ? "Particulier" : "Entreprise"}</span>
                  </div>
                  <div className="grid grid-cols-2 gap-x-6 gap-y-2 text-[13px]">
                    <div><span className="text-stone-500">Tél.</span><span className="ml-2 text-stone-900 font-medium">{inputs.clientSelected.tel}</span></div>
                    <div><span className="text-stone-500">Email</span><span className="ml-2 text-stone-900 font-medium">{inputs.clientSelected.email}</span></div>
                  </div>
                  <button onClick={() => upd("clientSelected", null)} className="mt-4 text-[12px] text-stone-500 hover:text-stone-900 underline">Changer de client</button>
                </div>
              )}
            </div>
          )}

          {inputs.mode === "create" && (
            <div className="space-y-5 page-enter">
              <div>
                <label className="label">Type de client</label>
                <div className="grid grid-cols-2 gap-2">
                  {[{v:"particulier",l:"Particulier"},{v:"entreprise",l:"Entreprise"}].map(o => (
                    <button key={o.v} onClick={() => upd("clientType", o.v)}
                      className={`field text-[14px] font-semibold transition ${inputs.clientType===o.v ? "border-stone-900 bg-stone-50" : "text-stone-600 hover:border-stone-400"}`}>
                      {o.l}
                    </button>
                  ))}
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="label">{inputs.clientType === "entreprise" ? "Raison sociale" : "Nom"}</label>
                  <input type="text" value={inputs.clientNom} onChange={e=>upd("clientNom", e.target.value)} className="field" placeholder={inputs.clientType === "entreprise" ? "ATELIER MARTIN SAS" : "DUPONT"} />
                </div>
                {inputs.clientType === "particulier" && (
                  <div>
                    <label className="label">Prénom</label>
                    <input type="text" value={inputs.clientPrenom} onChange={e=>upd("clientPrenom", e.target.value)} className="field" placeholder="Marie" />
                  </div>
                )}
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="label">Téléphone</label>
                  <input type="tel" value={inputs.clientTel} onChange={e=>upd("clientTel", e.target.value)} className="field" placeholder="06 12 34 56 78" />
                </div>
                <div>
                  <label className="label">Email</label>
                  <input type="email" value={inputs.clientEmail} onChange={e=>upd("clientEmail", e.target.value)} className="field" placeholder="contact@email.fr" />
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // STEP 2 — PRODUIT (avec économie en € et %)
    // ============================================================
    function Step2Produit({ inputs, upd, totalVerseBrut, reductionCommerciale, reductionPCT, fraisAuTarifMax, fraisActuels }) {
      return (
        <div className="max-w-2xl mx-auto page-enter">

    // ============================================================
    // Composant : champ de saisie rendement (% / an)
    // Utilise un état local pour permettre la saisie libre (« 5.07 », « 7.5 », etc.)
    // sans que le toFixed du parent ne ré-écrive l'input pendant la frappe.
    // Valide et propage la valeur uniquement au blur ou à Entrée.
    // ============================================================
    function RendementInput({ value, onChange }) {
      // value = rendement décimal (0.05 = 5 %). On affiche en pourcentage.
      const toDisplay = (v) => {
        if (v == null || isNaN(v)) return "";
        const pct = v * 100;
        // Affiche jusqu'à 2 décimales, sans virgule traînante (5.5 plutôt que 5.50)
        return Number.isInteger(pct) ? String(pct) : pct.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
      };
      const [text, setText] = useState(toDisplay(value));
      const [focused, setFocused] = useState(false);
      // Si le rendement change côté parent et qu'on n'est PAS en train d'éditer, on resynchronise
      useEffect(() => {
        if (!focused) setText(toDisplay(value));
      }, [value, focused]);

      const commit = () => {
        // Tolère « 5,07 » (virgule française) → « 5.07 »
        const cleaned = text.replace(",", ".").trim();
        if (cleaned === "" || cleaned === "-") {
          setText(toDisplay(value));    // restaure
          return;
        }
        const num = parseFloat(cleaned);
        if (isFinite(num)) {
          const decimal = Math.max(0, Math.min(0.50, num / 100));  // borne 0–50 %
          onChange(decimal);
          setText(toDisplay(decimal));
        } else {
          setText(toDisplay(value));
        }
      };

      return (
        <input
          type="text"
          inputMode="decimal"
          value={text}
          onChange={(e) => setText(e.target.value)}
          onFocus={(e) => { setFocused(true); e.target.select(); }}
          onBlur={() => { setFocused(false); commit(); }}
          onKeyDown={(e) => {
            if (e.key === "Enter") { e.target.blur(); }
            else if (e.key === "ArrowUp") {
              e.preventDefault();
              const step = e.shiftKey ? 0.5 : 0.1;
              const cur = parseFloat(text.replace(",", ".")) || 0;
              const next = Math.min(50, cur + step);
              setText(next.toFixed(2).replace(/0+$/, "").replace(/\.$/, ""));
              onChange(Math.max(0, Math.min(0.50, next / 100)));
            } else if (e.key === "ArrowDown") {
              e.preventDefault();
              const step = e.shiftKey ? 0.5 : 0.1;
              const cur = parseFloat(text.replace(",", ".")) || 0;
              const next = Math.max(0, cur - step);
              setText(next.toFixed(2).replace(/0+$/, "").replace(/\.$/, ""));
              onChange(Math.max(0, Math.min(0.50, next / 100)));
            }
          }}
          placeholder="0"
          className="num w-full px-3 py-2.5 text-right text-[16px] font-bold text-stone-900 bg-transparent focus:outline-none"
        />
      );
    }

    // ============================================================
    // STEP 3 — ALLOCATION (liste libre, dropdown de support, add/remove)

    function Step3Allocation({ inputs, updAllocItem, addAllocItem, removeAllocItem, changeAllocType, sim, totalP }) {

            <div className="flex items-baseline gap-3 mb-4">
              <div className="text-[20px] md:text-[22px] font-extrabold text-red-600 tracking-tight">SRI</div>
              <div className="text-[12px] md:text-[13px] text-stone-600">Indicateur synthétique de risque et de performance associé à votre épargne.</div>
            </div>
            <div className="flex items-start justify-between gap-1.5 md:gap-3 flex-wrap">
              {[
                { num: 1, color: "#7BD0CF", label: "Prudent" },
                { num: 2, color: "#7BD0CF", label: "Prudent +" },
                { num: 3, color: "#A5DC54", label: "Équilibré" },
                { num: 4, color: "#A5DC54", label: "Équilibré +" },
                { num: 5, color: "#F0CD3F", label: "Dynamique" },
                { num: 6, color: "#F0CD3F", label: "Dynamique +" },
                { num: 7, color: "#F08C92", label: "Offensif" },
              ].map(s => {
                const isActive = Math.round(sim.sri) === s.num;
                return (
                  <div key={s.num} className="flex flex-col items-center gap-2 flex-1 min-w-[80px]">
                    <div className={`w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center text-[18px] md:text-[20px] font-extrabold text-stone-900 transition ${isActive ? 'ring-4 ring-stone-900 shadow-lg scale-110' : 'shadow-sm'}`}
                      style={{background: s.color}}>
                      {s.num}
                    </div>
                    <div className={`text-[11px] md:text-[12px] text-center ${isActive ? 'font-extrabold text-stone-900' : 'font-medium text-stone-600'}`}>{s.label}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Visual bar */}
          <div className="mb-6">
            <div className="alloc-bar mb-3">
              {a.map(s => (
                <div key={s.id} className="alloc-segment" style={{ width:`${s.poids*100}%`, background: SUPPORT_META[s.type].color }}></div>
              ))}
            </div>
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center flex-wrap gap-x-4 gap-y-1">
                {a.map(s => (
                  <div key={s.id} className="flex items-center gap-2">
                    <div className="w-2 h-2 rounded-full" style={{background: SUPPORT_META[s.type].color}}></div>
                    <span className="text-[11px] font-semibold text-stone-700">{SUPPORT_META[s.type].label}</span>
                    <span className="num text-[11px] font-bold text-stone-900">{(s.poids*100).toFixed(0)}%</span>
                  </div>
                ))}
              </div>
              <div className="flex items-center gap-3 flex-wrap">
                <div className={`text-[11px] font-bold ${isOK ? 'text-emerald-700' : 'text-stone-700'}`}>
                  Total : <span className="num">{(totalP*100).toFixed(0)} %</span>
                </div>
                {!isOK && (
                  <span className="text-[11px] font-bold text-amber-700 bg-amber-50 border border-amber-200 rounded-md px-2 py-0.5">
                    Reste <span className="num">{restePct} %</span> à répartir
                  </span>
                )}
                {isOK && (
                  <span className="text-[11px] font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-md px-2 py-0.5">
                    100 % alloué ✓
                  </span>
                )}
              </div>
            </div>
          </div>

          {/* Supports — liste dynamique avec dropdown + slider + suppression */}
          <div className="space-y-4 mb-4">
            {a.map(item => {
              const m = SUPPORT_META[item.type];
              const otherSum = a.filter(x => x.id !== item.id).reduce((s, x) => s + x.poids, 0);

              return (
                <div key={item.id} className="bg-white border border-stone-200 rounded-2xl p-5">

                        {Object.entries(SUPPORT_META).map(([k,mm]) => (

                    </div>
                    <div className="flex items-center gap-3 flex-shrink-0">
                      <div className="num text-3xl font-bold text-stone-900 tracking-tightest">{(item.poids*100).toFixed(0)}<span className="text-base font-medium text-stone-500">%</span></div>

                        <button onClick={() => removeAllocItem(item.id)} className="p-2 text-stone-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition" title="Supprimer ce support">
                          <I.x/>
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Poids slider — borné dynamiquement pour ne jamais dépasser 100 % au total */}
                  <div className="mb-4">
                    <div className="flex items-center justify-between mb-2">
                      <label className="text-[11px] uppercase tracking-wider font-semibold text-stone-500">Poids dans l'enveloppe</label>
                      <span className="num text-[11px] font-medium text-stone-400">max {maxPct} %</span>
                    </div>
                    <input type="range" min="0" max={maxPct} step="1" value={(item.poids*100).toFixed(0)}
                      onChange={e=>updAllocItem(item.id, "poids", parseFloat(e.target.value)/100)}
                      className="slider" />
                  </div>

                  <div className="grid grid-cols-2 gap-4 pt-3 border-t border-stone-100">
                    {/* Rendement net — input à état local pour permettre la saisie libre (pas de toFixed pendant la frappe) */}
                    <div>
                      <label className="label" style={{marginBottom:6}}>Rendement net annuel</label>
                      <div className="flex items-center bg-stone-50 rounded-lg border border-stone-200">
                        <RendementInput
                          value={item.rendement}
                          onChange={v => updAllocItem(item.id, "rendement", v)}
                        />
                        <span className="px-3 text-[12px] text-stone-500 font-medium">% / an</span>
                      </div>
                    </div>

                    {/* SRI slider */}
                    <div>
                      <div className="flex items-end justify-between mb-2">
                        <label className="label" style={{marginBottom:0}}>Note SRI</label>
                        <div className="flex items-baseline gap-2">
                          <span className="num text-2xl font-bold tracking-tightest" style={{color: SRI_COLORS[item.sri]}}>{item.sri}<span className="text-xs font-medium text-stone-400">/7</span></span>
                          <span className="text-[10px] font-semibold text-stone-500 uppercase tracking-wider">{SRI_LABELS[item.sri]}</span>
                        </div>
                      </div>
                      <input type="range" min="1" max="7" step="1" value={item.sri}
                        onChange={e=>updAllocItem(item.id, "sri", parseInt(e.target.value))}
                        className="sri-slider" />
                      <div className="flex justify-between mt-1 text-[9px] text-stone-400 font-medium" style={{padding: '0 13px'}}>
                        {[1,2,3,4,5,6,7].map(n => <span key={n} className={item.sri===n?"text-stone-900 font-bold":""}>{n}</span>)}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Add support */}
          <div className="mb-6">
            <button onClick={() => addAllocItem("fondsActions")}
              className="w-full bg-white border-2 border-dashed border-stone-300 hover:border-stone-900 hover:bg-stone-50 rounded-2xl px-5 py-4 flex items-center justify-center gap-2 text-[13px] font-bold text-stone-700 transition">
              <I.plus/> Ajouter un support
            </button>
          </div>

          {/* Synthèse — SRI hero centré */}
          <div className="bg-stone-900 rounded-2xl p-6 md:p-8 text-white">
            <div className="text-center text-[12px] uppercase tracking-widest font-bold text-stone-400 mb-6">Synthèse de l'enveloppe</div>

            {/* SRI hero centré */}
            <div className="text-center mb-7">
              <div className="text-[11px] uppercase tracking-wider text-stone-400 font-semibold mb-2">SRI moyen pondéré</div>
              <div className="num text-6xl md:text-7xl font-bold tracking-tightest leading-none" style={{color: SRI_COLORS[Math.round(sim.sri)]}}>
                {sim.sri.toFixed(1)}<span className="text-3xl md:text-4xl font-medium text-stone-400">/7</span>
              </div>
              <div className="text-[13px] font-semibold text-stone-300 mt-2 mb-4">{SRI_LABELS[Math.round(sim.sri)] || "—"}</div>
              <div className="max-w-md mx-auto">
                <div className="relative h-2.5 rounded-full" style={{ background: 'linear-gradient(90deg, #7BD0CF 0%, #7BD0CF 28%, #A5DC54 30%, #A5DC54 56%, #F0CD3F 58%, #F0CD3F 84%, #F08C92 86%, #F08C92 100%)' }}>
                  <div className="absolute -top-[5px] w-[18px] h-[18px] rounded-full bg-white shadow-lg ring-2 ring-stone-900"
                    style={{ left: `calc(${Math.max(0, Math.min(100, ((sim.sri - 1) / 6) * 100))}% - 9px)` }}></div>
                </div>
                <div className="flex justify-between mt-2 text-[10px] text-stone-500 font-medium">
                  {[1,2,3,4,5,6,7].map(n => <span key={n} className={Math.round(sim.sri)===n?"text-white font-bold":""}>{n}</span>)}
                </div>
              </div>
            </div>

            {/* Rendement + 3 scénarios en bas */}
            <div className="grid grid-cols-2 gap-6 pt-6 border-t border-stone-700">
              <div className="text-center">
                <div className="text-[11px] uppercase tracking-wider text-stone-400 font-semibold mb-1">Rendement net pondéré</div>
                <div className="num text-3xl font-bold text-emerald-400 tracking-tightest">{fmtPCT(sim.rdtBrut)}</div>
                <div className="text-[11px] text-stone-400 mt-1">moyenne des supports</div>
              </div>
              <div className="border-l border-stone-700 pl-6">
                <div className="text-[11px] uppercase tracking-wider text-stone-400 font-semibold mb-2">3 scénarios (±1 %)</div>
                <div className="space-y-0.5 text-[12px]">
                  <div className="flex justify-between"><span className="text-stone-400">Pessimiste</span><span className="num font-semibold text-red-400">{fmtPCT(sim.rdtPess)}</span></div>
                  <div className="flex justify-between"><span className="text-stone-400">Médian</span><span className="num font-semibold text-white">{fmtPCT(sim.rdtMed)}</span></div>
                  <div className="flex justify-between"><span className="text-stone-400">Optimiste</span><span className="num font-semibold text-emerald-400">{fmtPCT(sim.rdtOpt)}</span></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // STEP 4 — RÉSULTATS — COLONNES PREMIUM
    // ============================================================
    function Step4Resultats({ inputs, setInputs, sim, scenarioLvl, setScenarioLvl, scenarios, openBuilder, removeScen, loadScen, upd }) {
      // Pour Capi PM (personne morale), le comparateur est un "Compte à terme" entreprise, pas un livret particulier
      const isCapiProduit = inputs.produit === "capi";
      const refLabel = isCapiProduit ? "Compte à terme" : "Livret";
      const livretNom = isCapiProduit ? "Compte à terme" : (LIVRETS.find(p=>p.id===inputs.livretId)?.nom || "Livret");
      const totalVerseBrut = inputs.versementInitial + inputs.versementMensuel * 12 * inputs.dureeAnnees;

      // Mesure dynamique de la hauteur du bandeau "Hypothèse principale" pour positionner exactement le bandeau "Détail" juste en dessous (sans chevauchement, sans gap)
      const hypotheseRef = useRef(null);
      const [hypotheseH, setHypotheseH] = useState(60);
      useLayoutEffect(() => {
        if (!hypotheseRef.current) return;
        const update = () => {
          if (hypotheseRef.current) setHypotheseH(hypotheseRef.current.offsetHeight);
        };
        update();
        const ro = new ResizeObserver(update);
        ro.observe(hypotheseRef.current);
        window.addEventListener('resize', update);
        return () => { ro.disconnect(); window.removeEventListener('resize', update); };
      }, [scenarios.length, inputs.produit]);

      // Build columns
      // Column 1: LIVRET (figé) — uses current inputs (livretTaux, durée, versements, nbBeneficiaires)
      //  ↳ Pour PER : remplacé par "PER + Réintégration des réductions d'impôt"
      // Column 2: SOLUTION ACTUELLE — current inputs at current scenario level
      // Columns 3+: SCÉNARIOS — each scenario's inputs run at current scenario level
      const isPERProduit = inputs.produit === "per";
      const livretCol = useMemo(() => {
        const ligne = inputs.successionLine ?? 'directe';
        const txIndirect = inputs.successionTauxIndirect ?? TX_SUCC_INDIRECT;
        const txDirect = inputs.successionTauxDirect ?? 0.30;
        const livretProj = projLivret(inputs.versementInitial, inputs.versementMensuel, inputs.dureeAnnees, inputs.livretTaux);
        const livretFisc = fiscaliteLivret(livretProj.capitalFin, inputs.nbBeneficiaires, ligne, txIndirect, txDirect);
        const renteBruteAn = livretProj.capitalFin * inputs.livretTaux;
        // Description abattement selon ligne
        const abattDetail = ligne === 'directe'
          ? `Taux forfaitaire ${((txDirect)*100).toFixed(0)} % sur capital brut (ligne directe)`
          : `Aucun abattement (ligne indirecte — ${((txIndirect)*100).toFixed(0)} %)`;
        return {
          type: "livret",
          name: livretNom,
          subtitle: `Taux ${fmtPCT(inputs.livretTaux)}`,
          capital: livretProj.capitalFin,
          versements: livretProj.totVerse,
          plusValue: livretProj.plusValue,
          fraisSouscription: 0,
          fraisDe: 0,
          rdt: inputs.livretTaux,
          // Succession
          capitalDeces: livretProj.capitalFin,
          abattement: livretFisc.abattTotal,
          abattDetail,
          imposable: livretFisc.imposableTotal,
          taxe: livretFisc.droits,
          taxeLabel: "Droits de succession",
          netTransmis: livretFisc.net,
          // Rente
          renteBrute: renteBruteAn,
          renteImpot: 0,
          renteNetteAn: renteBruteAn,
          renteNetteMois: renteBruteAn / 12,
          renteRegime: "Exonéré (livret réglementé)",
          // Réduction d'impôt (n/a livret)
          isPER: false,
          reductionImpotAnnuelle: 0,
          reductionImpotAnnee1: 0,
          reductionImpotCumulee: 0,
          tauxIRPct: 0,
          coutReel: livretProj.totVerse,  // pas d'avantage fiscal — coût = versements
        };
      }, [inputs.versementInitial, inputs.versementMensuel, inputs.dureeAnnees, inputs.livretTaux, inputs.nbBeneficiaires, inputs.successionLine, inputs.successionTauxIndirect, inputs.successionTauxDirect, livretNom]);

      // === Colonne PER + Réintégration des réductions d'impôt ===
      // L'épargnant réinvestit chaque année sa réduction d'impôt dans le PER.
      // Ce réinvestissement génère lui-même une nouvelle réduction (effet levier composé).
      const perReinvestCol = useMemo(() => {
        if (!isPERProduit) return null;
        const ligne = inputs.successionLine ?? 'directe';
        const txIndirect = inputs.successionTauxIndirect ?? TX_SUCC_INDIRECT;
        const txDirect = inputs.successionTauxDirect ?? 0.30;
        const auxCap = sim.perReinvest?.auxCap || 0;
        const totReduc = sim.perReinvest?.totReduc || 0;         // total réductions (y.c. sur réinvest.)
        const totReinvesti = sim.perReinvest?.totReinvesti || 0; // montant total réinvesti dans PER
        const auxPV = Math.max(0, auxCap - totReinvesti);
        const perCap = sim.proj.capitalFin;
        const totalCap = perCap + auxCap;
        // Réduction d'impôt : année 1 (initial + mensuel) vs années suivantes
        // Dans PER+Réintégration, la réduction de l'année précédente est réinvestie,
        // ce qui génère une réduction supplémentaire → on utilise totReduc (compoundé).
        const tmi = inputs.tauxIR || 0;
        const redAnnee1 = (inputs.versementInitial + inputs.versementMensuel * 12) * tmi;
        const redAnnuelleCourante = inputs.versementMensuel * 12 * tmi;
        // === Succession (cas décès) ===
        const fiscSucc = fiscaliteAV(totalCap, sim.proj.totVerseNet + totReinvesti, inputs.nbBeneficiaires, inputs.ageSouscripteur, txIndirect, sim.proj.totVerseBrut + totReinvesti, ligne, txDirect);
        const renteRef = rente(totalCap, sim.proj.totVerseNet + totReinvesti, sim.rdt, inputs.dureeAnnees, inputs.situationFamiliale);
        return {
          type: "perReinvest",
          name: "PER + Réintégration",
          subtitle: `Réductions réinvesties · levier fiscal composé`,
          capital: totalCap,
          // L'épargnant verse ses contributions directes (identiques à Solution PER)
          versements: sim.proj.totVerseBrut,
          // Plus-value totale = capital PER + auxCap − versements directs bruts
          plusValue: Math.max(0, totalCap - sim.proj.totVerseBrut),
          fraisSouscription: sim.proj.fraisSousPay,
          fraisDe: 0,
          rdt: sim.rdt,
          // Succession
          capitalDeces: totalCap,
          abattement: fiscSucc.abattTotal,
          abattDetail: fiscSucc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${inputs.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`,
          imposable: fiscSucc.imposableTotal,
          taxe: fiscSucc.taxe,
          taxeLabel: "Taxe PER+AV (art. 990 I)",
          netTransmis: fiscSucc.direct,
          renteBrute: renteRef.brute,
          renteImpot: renteRef.imp,
          renteNetteAn: renteRef.nette,
          renteNetteMois: renteRef.nette / 12,
          renteRegime: renteRef.regime + " (sur PER + réinvest.)",
          // PER reinvest specifics
          isPER: true,
          auxCap,
          totReduc,
          totReinvesti,
          perCap,
          // Réduction d'impôt : l'effet de levier composé génère PLUS de réductions que le PER seul
          reductionImpotAnnee1: redAnnee1,
          reductionImpotAnnuelle: redAnnuelleCourante,
          reductionImpotCumulee: totReduc,    // total réductions (avec levier composé)
          tauxIRPct: tmi,
          // COÛT RÉEL : l'épargnant réinvestit ses réductions → il ne les "garde" pas
          // Son effort net = versements directs bruts (les réductions alimentent le système)
          coutReel: sim.proj.totVerseBrut,
          coutReelLabel: "Versements directs (réductions réinvesties)",
        };
      }, [isPERProduit, sim, inputs.versementInitial, inputs.versementMensuel, inputs.dureeAnnees, inputs.tauxIR, inputs.successionLine, inputs.successionTauxIndirect, inputs.successionTauxDirect, inputs.ageSouscripteur, inputs.nbBeneficiaires, inputs.situationFamiliale]);

      const produitLabel = inputs.produit === "per" ? "PER" : inputs.produit === "capi" ? "Capi PM" : "Ass Vie";
      const solutionCol = useMemo(() => {
        const isPER = inputs.produit === "per";
        const isCapi = inputs.produit === "capi";
        // Détermination de l'abattement et du label de taxe selon le produit
        // Pour la phase DÉCÈS : PER comme AV → 152 500 € par bénéficiaire avant 70 ans (régime art. 990 I).
        // La fiscalité de SORTIE (TMI + PFU) s'applique en cas de VIE, pas au décès.
        let abattement = sim.fisc.abattTotal;
        let abattDetail = sim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${inputs.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`;
        let taxeLabel = "Taxe AV (art. 990 I)";
        let netTransmis = sim.fisc.direct;
        if (isPER) {
          // PER en cas de décès : assimilé à l'AV — abattement 152 500 € par bénéficiaire (avant 70 ans)
          // ou 30 500 € global après 70 ans. On garde sim.fisc.* qui est calculé via fiscaliteAV().
          taxeLabel = "Taxe PER (art. 990 I)";
        } else if (isCapi) {
          abattement = 0;
          abattDetail = `Personne morale — IS ${(inputs.tauxIS*100).toFixed(0)} % sur plus-values`;
          taxeLabel = "Impôt sur les sociétés";
          netTransmis = sim.fiscCapi?.netCapital || sim.fisc.direct;
        }
        // Réduction d'impôt PER :
        //   • Année 1 : (versement initial + 12 × mensuel) × TMI — le versement initial est
        //     déductible en totalité l'année de la souscription.
        //   • Années suivantes : 12 × mensuel × TMI (versements récurrents uniquement).
        //   • Cumulée : totVerseBrut × TMI (= ecoFiscEntree de fiscalitePER).
        const tmi = isPER ? inputs.tauxIR : 0;
        const reductionImpotAnnee1    = isPER ? (inputs.versementInitial + inputs.versementMensuel * 12) * tmi : 0;
        const reductionImpotAnnuelle  = isPER ? (inputs.versementMensuel * 12) * tmi : 0;
        const reductionImpotCumulee   = isPER ? (sim.fiscPER?.ecoFiscEntree || 0) : 0;
        // COÛT RÉEL Solution PER : l'épargnant GARDE chaque année sa réduction d'impôt
        // → son effort net = versements − réductions perçues sur la période.
        const coutReel = isPER ? Math.max(0, sim.proj.totVerseBrut - reductionImpotCumulee) : sim.proj.totVerseBrut;
        const coutReelLabel = isPER ? "Versements − réductions d'impôt perçues" : "Versements bruts";
        return ({
          type: "solution",
          isPER,
          isCapi,
          name: `Solution ${produitLabel}`,
          subtitle: `Rdt ${fmtPCT(sim.rdt)} · ${scenarioLvl === "med" ? "médian" : scenarioLvl === "pess" ? "pessimiste" : "optimiste"}`,
          capital: sim.proj.capitalFin,
          versements: sim.proj.totVerseBrut,
          plusValue: Math.max(0, sim.proj.capitalFin - sim.proj.totVerseBrut),
          fraisSouscription: sim.proj.fraisSousPay,
          rdt: sim.rdt,
          capitalDeces: sim.proj.capitalFin,
          abattement,
          abattDetail,
          imposable: sim.fisc.imposableTotal,
          taxe: sim.fisc.taxe,
          taxeLabel,
          netTransmis,
          renteBrute: isPER && sim.fiscPER?.modeSortie === "rente" ? sim.fiscPER.renteBruteAn : sim.rente.brute,
          renteImpot: isPER && sim.fiscPER?.modeSortie === "rente" ? sim.fiscPER.taxeRenteAn : sim.rente.imp,
          renteNetteAn: isPER && sim.fiscPER?.modeSortie === "rente" ? sim.fiscPER.renteNetteAn : sim.rente.nette,
          renteNetteMois: (isPER && sim.fiscPER?.modeSortie === "rente" ? sim.fiscPER.renteNetteAn : sim.rente.nette) / 12,
          renteRegime: isPER ? "RVTO (PER)" : isCapi ? "Non applicable (PM)" : sim.rente.regime,
          reductionImpotAnnee1,
          reductionImpotAnnuelle,
          reductionImpotCumulee,
          tauxIRPct: tmi,
          coutReel,
          coutReelLabel,
        });
      }, [sim, scenarioLvl, inputs.nbBeneficiaires, inputs.produit, inputs.tauxIR, inputs.tauxIS, inputs.perModeSortie, inputs.versementInitial, inputs.versementMensuel, inputs.dureeAnnees, produitLabel]);

      const scenarioCols = useMemo(() => scenarios.map((s, idx) => {
        const sSim = runSimulation(s.inputs, scenarioLvl);
        const sIsPER = s.inputs.produit === "per";
        const sTmi = sIsPER ? (s.inputs.tauxIR || 0) : 0;
        const sRedAnnee1   = sIsPER ? (s.inputs.versementInitial + s.inputs.versementMensuel * 12) * sTmi : 0;
        const sRedAnnuelle = sIsPER ? (s.inputs.versementMensuel * 12) * sTmi : 0;
        const sRedCumulee  = sIsPER ? (sSim.fiscPER?.ecoFiscEntree || 0) : 0;
        return {
          type: "scenario",
          colorIndex: (idx % 4) + 1,
          name: s.nom,
          subtitle: `Rdt ${fmtPCT(sSim.rdt)}`,
          idx,
          inputs: s.inputs,
          isPER: sIsPER,
          capital: sSim.proj.capitalFin,
          versements: sSim.proj.totVerseBrut,
          plusValue: Math.max(0, sSim.proj.capitalFin - sSim.proj.totVerseBrut),
          fraisSouscription: sSim.proj.fraisSousPay,
          rdt: sSim.rdt,
          capitalDeces: sSim.proj.capitalFin,
          abattement: sSim.fisc.abattTotal,
          abattDetail: sSim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${s.inputs.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`,
          imposable: sSim.fisc.imposableTotal,
          taxe: sSim.fisc.taxe,
          taxeLabel: "Taxe AV (art. 990 I)",
          netTransmis: sSim.fisc.direct,
          renteBrute: sSim.rente.brute,
          renteImpot: sSim.rente.imp,
          renteNetteAn: sSim.rente.nette,
          renteNetteMois: sSim.rente.nette / 12,
          renteRegime: sSim.rente.regime,
          reductionImpotAnnee1: sRedAnnee1,
          reductionImpotAnnuelle: sRedAnnuelle,
          reductionImpotCumulee: sRedCumulee,
          tauxIRPct: sTmi,
          coutReel: sIsPER ? Math.max(0, sSim.proj.totVerseBrut - sRedCumulee) : sSim.proj.totVerseBrut,
          coutReelLabel: sIsPER ? "Versements − réductions d'impôt perçues" : "Versements bruts",
        };
      }), [scenarios, scenarioLvl]);

      // Colonne de référence : pour PER → PER + Réintégration ; sinon → Livret/CAT
      const referenceCol = isPERProduit ? perReinvestCol : livretCol;
      // En PER : la Solution PER seul est placée à GAUCHE, le bonus « PER + Réintégration » à DROITE
      // (logique pédagogique : on part de la situation de référence puis on montre l'amélioration).
      // Dans les autres produits, l'ordre historique reste : référence (livret/CAT) à gauche.
      const allCols = isPERProduit
        ? [solutionCol, referenceCol, ...scenarioCols]
        : [referenceCol, solutionCol, ...scenarioCols];

      // Best column for net transmis (winner badge)
      const bestNetTransmis = Math.max(...allCols.map(c => c.netTransmis));
      const bestRente = Math.max(...allCols.map(c => c.renteNetteMois));

      return (
        <div className="max-w-screen-xl mx-auto page-enter">
          <div className="text-center mb-6">
            <div className="text-[11px] tracking-widest font-semibold text-red-600 uppercase mb-3">Étape 4 sur 4</div>
            <h1 className="text-3xl md:text-4xl font-bold text-stone-900 tracking-tightest">Comparaison des solutions</h1>
            <p className="mt-3 text-[14px] text-stone-500">Le {isCapiProduit ? "compte à terme" : "livret"} reste fixé. Ajoutez des scénarios pour comparer plusieurs allocations côte-à-côte.</p>
          </div>

          {/* Bandeau rappel des hypothèses — sticky permanent. Chaque ligne (base + scénarios) a le même format pour faciliter la comparaison */}
          <div ref={hypotheseRef} className="sticky mb-4 -mx-2 px-2 no-print" style={{top: '175px', zIndex: 25, background: '#fafaf9'}}>
            <div style={{paddingTop: '6px', paddingBottom: '6px', background: '#fafaf9'}}>
            <div className="bg-white border border-stone-200 rounded-xl overflow-hidden shadow-lg">
              <div className="h-[2px] bg-gradient-to-r from-red-700 via-red-500 to-red-700"></div>

              {/* Ligne base — Hypothèse principale (Solution Ass Vie) */}
              <div className="px-4 py-2.5 flex items-center gap-4 flex-wrap">
                <div className="flex items-center gap-2 flex-shrink-0 w-44">
                  <span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-red-50 text-red-600 ring-2 ring-red-200 flex-shrink-0">
                    <I.lock/>
                  </span>
                  <div className="min-w-0">
                    <div className="text-[11px] uppercase tracking-widest font-bold text-red-600 truncate">Hypothèse principale</div>
                    <div className="text-[9px] text-stone-500 truncate">Solution {produitLabel}</div>
                  </div>
                </div>
                <div className="flex items-center gap-4 md:gap-5 flex-wrap text-[12px]">
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-stone-500">Initial</span>
                    <span className="num font-bold text-stone-900">{fmtEUR(inputs.versementInitial)}</span>
                  </div>
                  <span className="text-stone-300">·</span>
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-stone-500">Mensuel</span>
                    <span className="num font-bold text-stone-900">{fmtEUR(inputs.versementMensuel)}<span className="text-[10px] text-stone-500">/mois</span></span>
                  </div>
                  <span className="text-stone-300">·</span>
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-stone-500">Durée</span>
                    <span className="num font-bold text-stone-900">{inputs.dureeAnnees} ans</span>
                  </div>
                  <span className="text-stone-300">·</span>
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-stone-500">Hypothèse de rendement</span>
