                      <circle cx="16" cy="16" r="0.8" fill="#DC2626"/>
                    </svg>
                    <div>
                      <div className="pres-cover-brand-group">Groupement</div>
                      <div className="pres-cover-brand-name">Figara</div>
                    </div>
                  </div>
                )}
                {inputs.cabinetLogo && (
                  <div className="pres-cover-brand-right">
                    <img src={inputs.cabinetLogo} alt={inputs.cabinetNom || "Logo cabinet"}
                      className="pres-cover-cabinet-logo" />
                  </div>
                )}
              </div>

              {/* Mid — titre */}
              <div className="pres-cover-mid">
                <div className="pres-cover-eyebrow">Étude personnalisée</div>
                <h1 className="pres-cover-title">
                  Simulation<br/>
                  <em>{isPER ? "Plan d'Épargne Retraite" : isCapi ? "Contrat de Capitalisation Personne Morale" : "Assurance-Vie"}</em>
                </h1>
              </div>

              {/* Bloc méta — carte blanche, ombre, accent rouge */}
              <div className="pres-cover-meta-block">
                <div className="pres-cover-meta-grid">
                  <div>
                    <div className="pres-cover-meta-k">Préparé pour</div>
                    <div className="pres-cover-meta-v">{clientLabel || "Nouveau client"}</div>
                  </div>
                  <div>
                    <div className="pres-cover-meta-k">Date de l'étude</div>
                    <div className="pres-cover-meta-v">{today}</div>
                  </div>
                  <div>
                    <div className="pres-cover-meta-k">Conseiller</div>
                    <div className="pres-cover-meta-v">{inputs.conseillerNom || 'Votre conseiller'}{inputs.cabinetNom ? <><br/><em>{inputs.cabinetNom}</em></> : null}</div>
                  </div>
                  <div>
                    <div className="pres-cover-meta-k">Référence</div>
                    <div className="pres-cover-meta-v">{clientId(inputs)}</div>
                  </div>
                </div>
              </div>

              {/* Footer page 1 — pagination supprimée */}
            </div>

            {/* ============== PAGE 2 — DASHBOARD GRAPHIQUE ============== */}
            <div className="pres-sheet pres-spread">
              <div className="pres-spread-watermark">II</div>

              {/* Head — sans pagination (déplacée en bas) */}
              <div className="pres-spread-head">
                <div>
                  <div className="pres-spread-pretitle">Évolution · {N} ans · scénario médian</div>
                  <h2 className="pres-spread-title">Votre capital, <em>en perspective.</em></h2>
                </div>
              </div>

              {/* Ligne décorative Figara sous le titre */}
              <FigaraRule style={{margin:'4mm 0 0'}}/>

              {/* Hypothèses retenues — récap propre, aligné, dans l'ordre demandé */}
              {(() => {
                const nf = (x) => new Intl.NumberFormat('fr-FR').format(Math.round(x || 0));
                const frais = inputs.fraisSouscription || 0;
                const comps = (inputs.versementsComplementaires || []).filter(v => (Number(v.montant) || 0) > 0);
                const totalComp = comps.reduce((s, v) => s + (Number(v.montant) || 0), 0);
                const remiseEur = Math.max(0, (FRAIS_SOUSC_MAX - frais)) * totalVerseBrut;
                const remisePct = FRAIS_SOUSC_MAX > 0 ? Math.max(0, (FRAIS_SOUSC_MAX - frais)) / FRAIS_SOUSC_MAX * 100 : 0;
                const totalNet = totalVerseBrut * (1 - frais);
                // Détails (chips lisibles) — le total net est un hero à part
                const details = [
                  { k: 'Versement initial brut', v: nf(inputs.versementInitial), u: '€', c: '#0f766e' },
                  ...(comps.length ? [{ k: 'Versements compl. bruts', v: nf(totalComp), u: '€', sub: comps.map(v => `${nf(Number(v.montant) || 0)} € · année ${v.annee}`).join('\n'), c: '#b8924e' }] : []),
                  { k: 'Versement mensuel brut', v: nf(inputs.versementMensuel), u: '€/m', c: '#0369a1' },
                  { k: 'Durée', v: `${N}`, u: 'ans', c: '#1c2735' },
                  { k: 'Rendement médian', v: (sim.rdtMed * 100).toFixed(2).replace('.', ','), u: '%', c: '#047857' },
                  { k: "Frais d'entrée", v: (frais * 100).toFixed(2).replace('.', ','), u: '%', sub: remiseEur > 0 ? `remise ${remisePct.toFixed(0)} % soit ${nf(remiseEur)} €` : null, c: '#b45309' },
                ];
                return (
                  <div className="pres-cmp-card" style={{ marginTop: '4mm', padding: '4mm 5mm 4.5mm' }}>
                    <div className="cmp-title">Hypothèses retenues</div>
                    {/* Détails — chips colorés, contenu centré */}
                    <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '3mm', marginTop: '3mm' }}>
                      {details.map((it, idx) => (
                        <div key={idx} style={{ flex: '0 0 30%', minWidth: '44mm', minHeight: '23mm', background: `${it.c}0d`, border: `1px solid ${it.c}44`, borderRadius: '2.5mm', padding: '2.6mm 3.5mm', textAlign: 'center', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '6.4pt', letterSpacing: '0.16em', textTransform: 'uppercase', color: it.c, fontWeight: 700, lineHeight: 1.3 }}>{it.k}</div>
                          <div style={{ fontFamily: "'Fraunces','Playfair Display',serif", fontSize: '15pt', fontWeight: 700, color: '#0a0908', lineHeight: 1, fontVariantNumeric: 'tabular-nums', marginTop: '1.5mm', whiteSpace: 'nowrap' }}>
                            {it.v}<span style={{ fontSize: '8pt', fontWeight: 500, color: '#78716c', marginLeft: '1.5px' }}>{it.u}</span>
                          </div>
                          {it.sub && <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '5.8pt', fontWeight: 700, color: '#b45309', letterSpacing: '0.02em', marginTop: '1.5mm', whiteSpace: 'pre-line', lineHeight: 1.5, display: 'inline-block', textAlign: 'left' }}>{it.sub}</div>}
                        </div>
                      ))}
                    </div>
                    {/* HERO — Total net versé (EN BAS) */}
                    <div style={{ marginTop: '3.5mm', borderRadius: '2.5mm', background: 'linear-gradient(120deg,#065f46 0%,#047857 55%,#10b981 100%)', padding: '3mm 6mm', display: 'flex', alignItems: 'center', justifyContent: 'space-between', boxShadow: '0 3mm 8mm -6mm rgba(4,120,87,0.5)' }}>
                      <div>
                        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '7pt', letterSpacing: '0.24em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.85)', fontWeight: 700 }}>Total net versé</div>
                        <div style={{ fontSize: '7.5pt', color: 'rgba(255,255,255,0.7)', marginTop: '0.8mm' }}>net de frais d'entrée · investi réellement</div>
                      </div>
                      <div style={{ fontFamily: "'Fraunces','Playfair Display',serif", fontSize: '22pt', fontWeight: 800, color: '#fff', letterSpacing: '-0.02em', lineHeight: 1 }}>{nf(totalNet)}<span style={{ fontSize: '11pt', fontWeight: 600, opacity: 0.85, marginLeft: '2px' }}>€</span></div>
                    </div>
                  </div>
                );
              })()}

              {/* Chart Chart.js (canvas) — réplique du graphique de l'onglet Présentation */}
              <div className="pres-cmp-card" style={{marginTop:'4mm', padding:'4mm 5mm 5mm'}}>
                <div className="cmp-title">Évolution comparée · Capital & scenarii</div>
                <div style={{width:'100%', height:'42mm', position:'relative'}}>
                  <canvas ref={printChartRef}></canvas>
                </div>
                <div style={{display:'none'}}>
                <svg viewBox={`0 0 ${chartW} ${chartH}`} style={{width:'100%', height:'auto', maxHeight:'80mm'}}>
                  {/* Gridlines horizontales (montants — niveaux d'amplitude sur l'axe Y) */}
                  {[0.25, 0.5, 0.75, 1].map((p, i) => (
                    <g key={`gh-${i}`}>
                      <line x1={padL} y1={padT + (1-p)*(chartH-padT-padB)} x2={chartW-padR} y2={padT + (1-p)*(chartH-padT-padB)} stroke="rgba(10,9,8,0.08)" strokeWidth="0.5"/>
                      <text x={padL-6} y={padT + (1-p)*(chartH-padT-padB) + 3} textAnchor="end" fontSize="7.5" fill="#a8a29e" fontFamily="JetBrains Mono" letterSpacing="1">{fmtEURc(p*yMax)}</text>
                    </g>
                  ))}
                  {/* Gridlines verticales (années — séparateurs au niveau des labels d'années) */}
                  {[0, Math.floor(N/4), Math.floor(N/2), Math.floor(N*3/4), N].map((y, i) => (
                    <g key={`gv-${i}`}>
                      <line x1={xs(y)} y1={padT} x2={xs(y)} y2={chartH-padB} stroke="rgba(10,9,8,0.06)" strokeWidth="0.5" strokeDasharray="2 3"/>
                      <text x={xs(y)} y={chartH-padB+14} textAnchor="middle" fontSize="7.5" fill="#57534e" fontFamily="JetBrains Mono" letterSpacing="1.5" fontWeight="600">AN {y}</text>
                    </g>
                  ))}
                  {/* Axe X et Y (lignes plus marquées) */}
                  <line x1={padL} y1={padT} x2={padL} y2={chartH-padB} stroke="rgba(10,9,8,0.18)" strokeWidth="0.6"/>
                  <line x1={padL} y1={chartH-padB} x2={chartW-padR} y2={chartH-padB} stroke="rgba(10,9,8,0.18)" strokeWidth="0.6"/>
                  <path d={pathTunnel} fill="rgba(139, 111, 29, 0.08)" stroke="none"/>
                  <path d={pathOpt} fill="none" stroke="rgba(4, 120, 87, 0.55)" strokeWidth="1.2" strokeDasharray="3 3"/>
                  <path d={pathPess} fill="none" stroke="rgba(180, 83, 9, 0.55)" strokeWidth="1.2" strokeDasharray="3 3"/>
                  <path d={pathLiv} fill="none" stroke={isPER ? "rgba(13, 148, 136, 0.85)" : "rgba(120, 113, 108, 0.65)"} strokeWidth={isPER ? "1.6" : "1.2"} strokeDasharray={isPER ? "4 4" : "6 4"}/>
                  <path d={pathMed} fill="none" stroke="#0a0908" strokeWidth="2.6"/>
                  {[
                    { v: finalOpt, lbl: 'OPTIMISTE', color: 'rgba(4, 120, 87, 0.9)' },
                    { v: finalSolution, lbl: isPER ? 'PER SEUL' : 'MÉDIAN', color: '#0a0908', bold: true },
                    { v: finalPess, lbl: 'PESSIMISTE', color: 'rgba(180, 83, 9, 0.9)' },
                    { v: finalLivret, lbl: isPER ? 'PER + IR' : livretNom.toUpperCase(), color: isPER ? '#047857' : '#78716c', bold: isPER },
                  ].sort((a,b) => ys(a.v) - ys(b.v)).map((it, i, arr) => {
                    let y = ys(it.v);
                    if (i > 0) {
                      const prev = arr[i-1];
                      const prevY = (prev.__y || ys(prev.v));
                      if (y - prevY < 18) y = prevY + 18;
                    }
                    it.__y = y;
                    // Boîtes agrandies pour accueillir « PER + RÉINTÉGRATION » + lisibilité accrue des montants
                    const w = it.bold ? 150 : 145;
                    const h = it.bold ? 18 : 16;
                    return (
                      <g key={i}>
                        <line x1={xs(N)} y1={ys(it.v)} x2={xs(N)+4} y2={y} stroke={it.color} strokeWidth="0.6"/>
                        <rect x={xs(N)+5} y={y-h/2} width={w} height={h} rx={it.bold ? 1 : 0} fill={it.color}/>
                        <text x={xs(N)+9} y={y + (it.bold ? 4 : 3.5)} fontSize={it.bold ? 10 : 9} fill="#f7f3ed" fontWeight={it.bold ? 700 : 600} fontFamily="JetBrains Mono" letterSpacing={it.bold ? "0.3" : "0.5"}>{fmtEURc(it.v)} · {it.lbl}</text>
                      </g>
                    );
                  })}
                </svg>
                </div>
              </div>

              {/* 3 modules dashboard : Multiplicateur · Allocation · (Rente AV/PER ou Net après IS Capi) — espacement homogène */}
              <div className="pres-modules-row" style={{gridTemplateColumns:'1fr 1.1fr 1fr', marginTop:'2mm', marginBottom:'0'}}>
                {/* DONUT Multiplicateur — cercle agrandi + ligne Figara + chiffres plus gros */}
                {(() => {
                  // En mode PER : on affiche le multiplicateur avec ET sans réintégration
                  const multipleSeul = finalSolution / Math.max(1, totalVerseBrut);
                  const multipleReinv = finalLivret / Math.max(1, totalVerseBrut);  // finalLivret = PER + Réintégration en mode PER
                  if (isPER) {
                    const r = 34, c = 2 * Math.PI * r;
                    const pct1 = Math.min(100, Math.max(0, (multipleSeul - 1) / 2 * 100));
                    const pct2 = Math.min(100, Math.max(0, (multipleReinv - 1) / 2 * 100));
                    return (
                      <div className="pres-donut-card" style={{display:'flex', flexDirection:'column'}}>
                        <div className="dn-tag" style={{textAlign:'center'}}>Multiplicateur</div>
                        <FigaraRule style={{margin:'0 0 2mm'}}/>
                        {/* 2 donuts — label + donut dans la même colonne, côte à côte */}
                        <div style={{display:'flex', gap:'3mm', justifyContent:'center', alignItems:'center', marginTop:'0'}}>
                          {/* PER seul */}
                          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'1mm'}}>
                            <div style={{fontSize:'6.5pt', textTransform:'uppercase', letterSpacing:'0.10em', fontWeight:700, color:'#57534e', textAlign:'center', lineHeight:1}}>PER seul</div>
                            <svg width="54" height="54" viewBox="0 0 100 100" style={{display:'block'}}>
                              <g transform="rotate(-90 50 50)">
                                <circle cx="50" cy="50" r={r} fill="none" stroke="#f5f5f4" strokeWidth="9"/>
                                <circle cx="50" cy="50" r={r} fill="none" stroke="#57534e" strokeWidth="9" strokeLinecap="round" strokeDasharray={`${(pct1/100)*c} ${c}`}/>
                              </g>
                              <text x="50" y="50" textAnchor="middle" dominantBaseline="central"
                                fontFamily="Fraunces, 'Playfair Display', serif" fontSize="20" fontWeight="800" fill="#0a0908" letterSpacing="-0.5">×{multipleSeul.toFixed(2)}</text>
                            </svg>
                          </div>
                          {/* PER + IR */}
                          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'1mm'}}>
                            <div style={{fontSize:'6.5pt', textTransform:'uppercase', letterSpacing:'0.10em', fontWeight:700, color:'#047857', textAlign:'center', lineHeight:1}}>PER + IR</div>
                            <svg width="54" height="54" viewBox="0 0 100 100" style={{display:'block'}}>
                              <g transform="rotate(-90 50 50)">
                                <circle cx="50" cy="50" r={r} fill="none" stroke="#f5f5f4" strokeWidth="9"/>
                                <circle cx="50" cy="50" r={r} fill="none" stroke="#047857" strokeWidth="9" strokeLinecap="round" strokeDasharray={`${(pct2/100)*c} ${c}`}/>
                              </g>
                              <text x="50" y="50" textAnchor="middle" dominantBaseline="central"
                                fontFamily="Fraunces, 'Playfair Display', serif" fontSize="20" fontWeight="800" fill="#047857" letterSpacing="-0.5">×{multipleReinv.toFixed(2)}</text>
                            </svg>
                          </div>
                        </div>
                        <div className="dn-foot" style={{marginTop:'2mm', paddingTop:'2mm', textAlign:'center', fontSize:'6.5pt', lineHeight:1.4}}>
                          Pour <strong style={{color:'#0a0908'}}>{fmtEURc(totalVerseBrut)}</strong> versés :<br/>
                          PER : <strong style={{color:'#0a0908'}}>{fmtEURc(finalSolution)}</strong> · PER + IR : <strong style={{color:'#047857'}}>{fmtEURc(finalLivret)}</strong>
                        </div>
                      </div>
                    );
                  }
                  // AV / Capi : donut unique
                  const multiple = multipleSeul;
                  const pct = Math.min(100, Math.max(0, (multiple - 1) / 2 * 100));
                  const r = 44, c = 2 * Math.PI * r;
                  const dash = (pct / 100) * c;
                  return (
                    <div className="pres-donut-card">
                      <div className="dn-tag">Multiplicateur</div>
                      <FigaraRule style={{margin:'0 0 4mm'}}/>
                      <div style={{display:'flex', justifyContent:'center', margin:'2mm 0 2mm'}}>
                        <svg width="124" height="124" viewBox="0 0 124 124">
                          <g transform="rotate(-90 62 62)">
                            <circle cx="62" cy="62" r={r} fill="none" stroke="#f5f5f4" strokeWidth="10"/>
                            <circle cx="62" cy="62" r={r} fill="none" stroke="#047857" strokeWidth="10" strokeLinecap="round" strokeDasharray={`${dash} ${c}`}/>
                          </g>
                          <text x="62" y="58" textAnchor="middle" dominantBaseline="central"
                            fontFamily="Fraunces, 'Playfair Display', serif" fontSize="22" fontWeight="800" fill="#047857"
                            letterSpacing="-0.5">×{multiple.toFixed(2)}</text>
                          <text x="62" y="76" textAnchor="middle" dominantBaseline="central"
                            fontFamily="Inter, sans-serif" fontSize="8" fontWeight="600" fill="#78716c"
                            letterSpacing="0.3">capital versé</text>
                        </svg>
                      </div>
                      <div className="dn-foot">
                        Pour <strong style={{color:'#0a0908'}}>{fmtEURc(totalVerseBrut)}</strong> versés,<br/>vous récupérez <strong style={{color:'#047857'}}>{fmtEURc(finalSolution)}</strong>.
                      </div>
                    </div>
                  );
                })()}

                {/* DONUT Allocation + rendements */}
                {(() => {
                  const r = 28, c = 2 * Math.PI * r;
                  let cumulOffset = 0;
                  return (
                    <div className="pres-alloc-card">
                      <div className="al-tag">Allocation des supports</div>
                      <FigaraRule style={{margin:'0 0 4mm'}}/>
                      <div className="al-body">
                        <svg width="72" height="72" viewBox="0 0 72 72" style={{transform:'rotate(-90deg)'}}>
                          <circle cx="36" cy="36" r={r} fill="none" stroke="#f5f5f4" strokeWidth="9"/>
                          {allocBar.map((s, idx) => {
                            const seg = s.poids * c;
                            const offset = -cumulOffset;
                            cumulOffset += seg;
                            return <circle key={s.id} cx="36" cy="36" r={r} fill="none" stroke={SUPPORT_META[s.type].color} strokeWidth="9" strokeDasharray={`${seg} ${c}`} strokeDashoffset={offset} strokeLinecap="butt"/>;
                          })}
                        </svg>
                        <div className="al-supports">
                          {allocBar.map(s => (
                            <div key={s.id} className="al-supp-row">
                              <span className="lft"><span className="sw" style={{background: SUPPORT_META[s.type].color}}></span><span className="nm">{SUPPORT_META[s.type].label}</span></span>
                              <span className="pc">{(s.poids*100).toFixed(0)}<span className="unit">%</span></span>
                            </div>
                          ))}
                        </div>
                      </div>
                      {/* Bandeau Hypothèses de rendement avec SRI mis en valeur sur la même ligne */}
                      <div className="al-rdt">
                        <div className="al-rdt-tag" style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'2mm'}}>
                          <span>Hypothèses de rendement</span>
                          <span style={{display:'inline-flex', alignItems:'baseline', gap:'2px', padding:'1mm 2mm', background:'#fafaf9', border:'0.5pt solid '+SRI_COLORS[Math.round(sim.sri)], borderRadius:'1.5mm'}}>
                            <span style={{fontSize:'5.5pt', color:'#57534e', fontWeight:600}}>SRI</span>
                            <span style={{fontFamily:"'Fraunces','Playfair Display',serif", fontSize:'10pt', fontWeight:800, color: SRI_COLORS[Math.round(sim.sri)], letterSpacing:'-0.01em'}}>{sim.sri.toFixed(1)}</span>
                            <span style={{fontSize:'6pt', color:'#78716c'}}>/7</span>
                          </span>
                        </div>
                        <div className="al-rdt-cells">
                          <div className="al-rdt-cell pess">
                            <div className="lab">Pess.</div>
                            <div className="val">{fmtPCT(sim.rdtPess).replace(' %','')}<span style={{fontSize:'7pt'}}>%</span></div>
                          </div>
                          <div className="al-rdt-cell med">
                            <div className="lab">Médian</div>
                            <div className="val">{fmtPCT(sim.rdtMed).replace(' %','')}<span style={{fontSize:'7pt'}}>%</span></div>
                          </div>
                          <div className="al-rdt-cell opt">
                            <div className="lab">Opt.</div>
                            <div className="val">{fmtPCT(sim.rdtOpt).replace(' %','')}<span style={{fontSize:'7pt'}}>%</span></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* RENTE compteur (caché pour Capi PM — pas pertinent) */}
                {!isCapi ? (() => {
                  // Rente perpétuelle = capital × taux mensuel équivalent
                  const tm = sim.rdt > 0 ? (Math.pow(1 + sim.rdt, 1/12) - 1) : 0;
                  const renteSeulMois = finalSolution > 0 ? finalSolution * tm : 0;
                  const renteReinvMois = isPER && finalLivret > 0 ? finalLivret * tm : 0;
                  if (isPER) {
                    return (
                      <div className="pres-rente-card" style={{display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center'}}>
                        <div className="rt-tag" style={{textAlign:'center'}}>Rente à vie</div>
                        <FigaraRule style={{width:'100%', margin:'0 0 2mm'}}/>
                        {/* Deux blocs verticaux compacts — valeurs centrées */}
                        <div style={{display:'flex', flexDirection:'column', gap:'1.5mm', width:'100%', marginTop:'1mm'}}>
                          <div style={{padding:'1.5mm 2.5mm', border:'1px solid rgba(120,113,108,0.30)', borderRadius:'1.5mm', background:'rgba(245,245,244,0.45)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'2mm'}}>
                            <div style={{fontSize:'6.5pt', textTransform:'uppercase', letterSpacing:'0.10em', fontWeight:700, color:'#57534e'}}>PER seul</div>
                            <div style={{fontFamily:"'Fraunces','Playfair Display',serif", fontSize:'13pt', fontWeight:800, color:'#0a0908', letterSpacing:'-0.02em', lineHeight:1}}>{fmtEUR(renteSeulMois)}<span style={{fontSize:'6.5pt', color:'#78716c', marginLeft:'1mm', fontWeight:500}}>/mois</span></div>
                          </div>
                          <div style={{padding:'1.5mm 2.5mm', border:'2px solid #047857', borderRadius:'1.5mm', background:'linear-gradient(180deg, rgba(236,253,245,0.65) 0%, #ffffff 100%)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'2mm'}}>
                            <div style={{fontSize:'6.5pt', textTransform:'uppercase', letterSpacing:'0.10em', fontWeight:700, color:'#047857'}}>PER + IR</div>
                            <div style={{fontFamily:"'Fraunces','Playfair Display',serif", fontSize:'13pt', fontWeight:800, color:'#047857', letterSpacing:'-0.02em', lineHeight:1}}>{fmtEUR(renteReinvMois)}<span style={{fontSize:'6.5pt', color:'#047857', marginLeft:'1mm', fontWeight:500}}>/mois</span></div>
                          </div>
                        </div>
                        <div style={{marginTop:'2mm', paddingTop:'1.5mm', width:'100%', fontSize:'6.5pt', color:'#57534e', textAlign:'center', fontStyle:'italic', lineHeight:1.4, borderTop:'1px solid rgba(167,243,208,0.6)'}}>
                          Annuel : {fmtEUR(renteSeulMois*12)} vs <strong style={{color:'#047857', fontStyle:'normal'}}>{fmtEUR(renteReinvMois*12)}</strong> · Capital préservé
                        </div>
                      </div>
                    );
                  }
                  const renteMois = renteSeulMois;
                  const renteAn = renteMois * 12;
                  const rente20 = renteAn * 20;
                  return (
                    <div className="pres-rente-card" style={{display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center'}}>
                      <div className="rt-tag">Rente brute à vie</div>

    // ============================================================
    // SCENARIO BUILDER (slide-over panel)
    // ============================================================
    function ScenarioBuilder({ open, initialInputs, scenariosCount, onClose, onSave }) {
      const [name, setName] = useState("");
      const [b, setB] = useState(initialInputs || DEFAULT_INPUTS);

      // Re-init when opening with new initialInputs
      useEffect(() => {
        if (open && initialInputs) {
          setB(JSON.parse(JSON.stringify(initialInputs)));
          setName(`Scénario ${scenariosCount + 1}`);
          setActiveProfil(null);
        }
      }, [open, initialInputs, scenariosCount]);

      const upd = (k, v) => setB(p => ({ ...p, [k]: v }));
      const updAllocItem = (id, field, v) => {
        setB(p => {
          if (field === "poids") {
            const otherSum = p.allocation.filter(item => item.id !== id).reduce((s, x) => s + x.poids, 0);
            const maxAllowed = Math.max(0, 1 - otherSum);
            v = Math.max(0, Math.min(maxAllowed, v));
          }
          return {
            ...p,
            allocation: p.allocation.map(item => item.id === id ? { ...item, [field]: v } : item)
          };
        });
      };
      const addAllocItem = (type = "fondsActions") => {
        setB(p => {
          const newId = (p.allocation.length ? Math.max(...p.allocation.map(x => x.id)) : 0) + 1;
          const meta = SUPPORT_META[type];
          return {
            ...p,
            allocation: [...p.allocation, { id: newId, type, poids: 0, rendement: meta.rdtNetDef, sri: meta.sriDef }]
          };
        });
      };
      const removeAllocItem = (id) => {
        setB(p => ({
          ...p,
          allocation: p.allocation.length > 1 ? p.allocation.filter(item => item.id !== id) : p.allocation
        }));
      };
      const changeAllocType = (id, newType) => {
        const meta = SUPPORT_META[newType];
        setB(p => ({
          ...p,
          allocation: p.allocation.map(item =>
            item.id === id
              ? { ...item, type: newType, rendement: meta.rdtNetDef, sri: meta.sriDef }
              : item
          )
        }));
      };
      // Profils d'allocation pré-réglés (1 clic remplit toute l'allocation)
      const PROFILS = {
        prudent:   { label: "Prudent",   desc: "Sécurité",  parts: [["fondsEuro",0.80],["fondsStructure",0.20]] },
        equilibre: { label: "Équilibré", desc: "Mixte",     parts: [["fondsEuro",0.40],["fondsStructure",0.30],["fondsActions",0.30]] },
        dynamique: { label: "Dynamique", desc: "Performance",parts: [["fondsEuro",0.10],["fondsStructure",0.30],["fondsActions",0.60]] },
      };
      const [activeProfil, setActiveProfil] = useState(null);
      const applyProfil = (key) => {
        const parts = PROFILS[key].parts;
        setActiveProfil(key);
        setB(p => ({
          ...p,
          allocation: parts.map(([type, poids], i) => {
            const m = SUPPORT_META[type];
            return { id: i + 1, type, poids, rendement: m.rdtNetDef, sri: m.sriDef };
          })
        }));

      const sim = useMemo(() => runSimulation(b), [b]);
      const totalP = b.allocation.reduce((s,v)=>s+v.poids, 0);
      const isOK = Math.abs(totalP - 1) < 0.001;

      const totalVerseBrut = b.versementInitial + b.versementMensuel * 12 * b.dureeAnnees + totalComplementaires(b);
      const reductionCommerciale = (FRAIS_SOUSC_MAX - b.fraisSouscription) * totalVerseBrut;
      const reductionPCT = FRAIS_SOUSC_MAX > 0 ? (FRAIS_SOUSC_MAX - b.fraisSouscription) / FRAIS_SOUSC_MAX : 0;

      // Build preview column
      const previewLivret = projLivret(b);
      const previewLivretFisc = fiscaliteLivret(previewLivret.capitalFin, b.nbBeneficiaires);
      const previewCol = {
        type: "scenario", colorIndex: 1,
        name: name || `Scénario ${scenariosCount + 1}`,
        subtitle: `Rdt ${fmtPCT(sim.rdt)}`,
        capital: sim.proj.capitalFin,
        versements: sim.proj.totVerseBrut,
        plusValue: Math.max(0, sim.proj.capitalFin - sim.proj.totVerseBrut),
        fraisSouscription: sim.proj.fraisSousPay,
        rdt: sim.rdt,
        capitalDeces: sim.proj.capitalFin,
        abattement: sim.fisc.abattTotal,
        abattDetail: sim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${b.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`,
        imposable: sim.fisc.imposableTotal,
        taxe: sim.fisc.taxe,
        taxeLabel: "Taxe AV (art. 990 I)",
        netTransmis: sim.fisc.direct,
        renteBrute: sim.rente.brute,
        renteImpot: sim.rente.imp,
        renteNetteAn: sim.rente.nette,
        renteNetteMois: sim.rente.nette / 12,
        renteRegime: sim.rente.regime,
      };

      const handleSave = () => {
        const finalName = name.trim() || `Scénario ${scenariosCount + 1}`;
        onSave(finalName, b);
      };

      return (
        <>
          <div className={`builder-overlay ${open ? 'open' : ''} no-print`} onClick={onClose}></div>
          <div className={`builder-panel ${open ? 'open' : ''} no-print`}>
            {/* HEADER */}
            <div className="px-6 py-5 border-b border-stone-200 bg-white flex items-center justify-between flex-shrink-0">
              <div>
                <div className="text-[11px] uppercase tracking-widest font-bold text-emerald-700 mb-0.5">Nouveau scénario</div>
                <div className="text-[20px] font-bold text-stone-900 tracking-tight">Configurer la nouvelle solution</div>
              </div>
              <button onClick={onClose} className="p-2 text-stone-400 hover:text-stone-900 hover:bg-stone-100 rounded-lg transition"><I.close/></button>
            </div>

            {/* BODY */}
            <div className="flex-1 overflow-y-auto p-6">
              <div className="max-w-xl mx-auto space-y-6">

                {/* Rappel — solution de référence (scénario 1) — mise en avant */}
                <div className="rounded-2xl border-2 border-emerald-600 bg-gradient-to-br from-emerald-50 to-white px-5 py-4 shadow-sm">
                  <div className="flex items-center gap-2 mb-3">
                    <span className="w-2 h-2 rounded-full bg-emerald-600"></span>
                    <div className="text-[11px] uppercase tracking-widest font-extrabold text-emerald-800">Solution de référence</div>
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    <div>
                      <div className="text-[10px] text-stone-500 uppercase tracking-wider font-semibold mb-1">Investi au départ</div>

                    </div>
                    <div>
                      <div className="text-[10px] text-stone-500 uppercase tracking-wider font-semibold mb-1">Versement</div>
                      <div className="num text-[20px] md:text-[22px] font-extrabold text-stone-900 tracking-tightest leading-none">{fmtEUR((initialInputs||b).versementMensuel)}<span className="text-[12px] font-medium text-stone-400"> /mois</span></div>
                    </div>
                    <div>
                      <div className="text-[10px] text-stone-500 uppercase tracking-wider font-semibold mb-1">Durée</div>

                <div>
                  <label className="label">Nom du scénario</label>
                  <input type="text" value={name} onChange={e=>setName(e.target.value)} className="field text-[16px] font-semibold" placeholder={`Scénario ${scenariosCount + 1}`} />
                </div>

                <div className="space-y-5">
                  <div className="text-[11px] uppercase tracking-widest font-bold text-stone-500">Paramètres</div>

                    <div className="flex items-end justify-between mb-2">
                      <label className="label" style={{marginBottom:0}}>Versement initial</label>
                      <span className="num text-xl font-bold text-stone-900 tracking-tightest">{fmtEUR(b.versementInitial)}</span>
                    </div>
                    <input type="range" min="0" max="500000" step="1000" value={b.versementInitial}

                  </div>

                  <div>
                    <div className="flex items-end justify-between mb-2">
                      <label className="label" style={{marginBottom:0}}>Versement mensuel</label>
                      <span className="num text-xl font-bold text-stone-900 tracking-tightest">{fmtEUR(b.versementMensuel)}<span className="text-sm font-medium text-stone-500"> /mois</span></span>
                    </div>
                    <input type="range" min="0" max="5000" step="50" value={b.versementMensuel}
                      onChange={e=>upd("versementMensuel", parseFloat(e.target.value)||0)} className="slider" />
                  </div>

                  <div>
                    <div className="flex items-end justify-between mb-2">
                      <label className="label" style={{marginBottom:0}}>Durée</label>
                      <span className="num text-xl font-bold text-stone-900 tracking-tightest">{b.dureeAnnees}<span className="text-sm font-medium text-stone-500"> ans</span></span>
                    </div>
                    <input type="range" min="1" max="40" step="1" value={b.dureeAnnees}
                      onChange={e=>upd("dureeAnnees", parseInt(e.target.value)||1)} className="slider" />
                  </div>

                </div>

                {/* Ajustement fin de l'allocation (optionnel) */}
                <div>
                  <div className="flex items-center justify-between mb-3">
                    <div className="text-[11px] uppercase tracking-widest font-bold text-stone-500">Détail de l'allocation</div>
                    <span className={`num text-[11px] font-bold ${isOK ? 'text-emerald-700' : 'text-red-700'}`}>{(totalP*100).toFixed(0)} %</span>
                  </div>
                  <div className="alloc-bar mb-3">
                    {b.allocation.map(s => (
                      <div key={s.id} className="alloc-segment" style={{ width:`${s.poids*100}%`, background: SUPPORT_META[s.type].color }}></div>
                    ))}
                  </div>
                  <div className="space-y-3">
                    {b.allocation.map(item => {
                      const m = SUPPORT_META[item.type];
                      const otherSum = b.allocation.filter(x => x.id !== item.id).reduce((s, x) => s + x.poids, 0);
                      const maxPct = Math.max(0, Math.round((1 - otherSum) * 100));
                      return (
                        <div key={item.id} className="bg-white border border-stone-200 rounded-xl p-3">
                          <div className="flex items-center justify-between mb-2 gap-2">
                            <div className="flex items-center gap-2 flex-1 min-w-0">
                              <div className="w-1 h-7 rounded-full flex-shrink-0" style={{background: m.color}}></div>
                              <select value={item.type} onChange={e=>{setActiveProfil(null); changeAllocType(item.id, e.target.value);}}
                                className="text-[12px] font-bold text-stone-900 bg-stone-50 border border-stone-200 rounded px-2 py-1 focus:outline-none focus:border-stone-900 cursor-pointer">
                                {Object.entries(SUPPORT_META).map(([k,mm]) => (
                                  <option key={k} value={k}>{mm.label}</option>
                                ))}
                              </select>
                            </div>
                            <div className="flex items-center gap-2 flex-shrink-0">
                              <span className="num text-[15px] font-bold tracking-tightest">{(item.poids*100).toFixed(0)}%</span>
                              {b.allocation.length > 1 && (
                                <button onClick={() => {setActiveProfil(null); removeAllocItem(item.id);}} className="p-1 text-stone-400 hover:text-red-600 hover:bg-red-50 rounded transition" title="Supprimer">
                                  <I.x/>
                                </button>
                              )}
                            </div>
                          </div>
                          <div className="flex items-center justify-between mb-1">
                            <span className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">Poids</span>
                            <span className="num text-[10px] text-stone-400">max {maxPct} %</span>
                          </div>
                          <input type="range" min="0" max={maxPct} step="1" value={(item.poids*100).toFixed(0)}
                            onChange={e=>{setActiveProfil(null); updAllocItem(item.id, "poids", parseFloat(e.target.value)/100);}}
                            className="slider mb-2" />
                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <div className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Rdt net</div>
                              <div className="flex items-center bg-stone-50 rounded border border-stone-200">
                                <input type="number" value={(item.rendement*100).toFixed(2)} step={0.50}
                                  onChange={e=>{setActiveProfil(null); updAllocItem(item.id, "rendement", parseFloat(e.target.value)/100||0);}}
                                  className="num w-full px-2 py-1.5 text-right text-[13px] font-bold bg-transparent focus:outline-none" />
                                <span className="px-2 text-[10px] text-stone-400">%</span>
                              </div>
                            </div>
                            <div>
                              <div className="flex items-center justify-between mb-1">
                                <span className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">SRI</span>
                                <span className="num text-[11px] font-bold" style={{color: SRI_COLORS[item.sri]}}>{item.sri}/7</span>
                              </div>
                              <input type="range" min="1" max="7" step="1" value={item.sri}
                                onChange={e=>{setActiveProfil(null); updAllocItem(item.id, "sri", parseInt(e.target.value));}}
                                className="sri-slider" style={{height: 6}} />
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <button onClick={() => {setActiveProfil(null); addAllocItem("fondsActions");}}
                    className="mt-3 w-full bg-white border-2 border-dashed border-stone-300 hover:border-stone-900 hover:bg-stone-50 rounded-xl px-4 py-2.5 flex items-center justify-center gap-2 text-[12px] font-bold text-stone-700 transition">
                    <I.plus/> Ajouter un support
                  </button>
                  <div className="mt-3 grid grid-cols-2 gap-3 text-[11px]">
                    <div className="bg-stone-50 border border-stone-200 rounded-lg px-3 py-2">
                      <span className="text-stone-500 uppercase tracking-wider font-semibold text-[10px]">Rdt pondéré</span>
                      <div className="num font-bold text-stone-900">{fmtPCT(sim.rdtBrut)}</div>
                    </div>
                    <div className="bg-stone-50 border border-stone-200 rounded-lg px-3 py-2">
                      <span className="text-stone-500 uppercase tracking-wider font-semibold text-[10px]">SRI moyen</span>
                      <div className="num font-bold" style={{color: SRI_COLORS[Math.round(sim.sri)]}}>{sim.sri.toFixed(1)} / 7</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* FOOTER */}
            <div className="px-6 py-4 border-t border-stone-200 bg-white flex items-center justify-between gap-3 flex-shrink-0">
              <div className="text-[11px] text-stone-500">{isOK ? "Allocation à 100% — prêt à confirmer" : `Total allocation : ${(totalP*100).toFixed(0)}% (doit être 100%)`}</div>
              <div className="flex items-center gap-2">
                <button onClick={onClose} className="btn btn-light">Annuler</button>
                <button onClick={handleSave} disabled={!isOK} className="btn btn-emerald disabled:opacity-40 disabled:cursor-not-allowed"><I.check/> Confirmer le scénario</button>
              </div>
            </div>
          </div>
        </>
      );
    }

    // ============================================================
    // LOGIN SCREEN — email/password (Supabase Auth)
    // ============================================================
    function LoginScreen() {
      const [mode, setMode] = useState("login"); // "login" | "signup"
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [nom, setNom] = useState("");
      const [cabinetNom, setCabinetNom] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [info, setInfo] = useState("");

      const submit = async (e) => {
        e.preventDefault();
        setError(""); setInfo(""); setLoading(true);
        try {
          if (mode === "login") {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
          } else {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user) {
              await supabase.from('profiles').update({ nom, cabinet_nom: cabinetNom }).eq('id', data.user.id);
            }
            if (!data.session) {
              setInfo("Compte créé. Vérifiez votre boîte mail pour confirmer votre adresse, puis connectez-vous.");
              setMode("login");
            }
          }
        } catch (err) {
          setError(err.message || "Une erreur est survenue.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-stone-950 flex items-center justify-center px-4 relative overflow-hidden">
          <FigaraDecor/>
          <div className="relative z-10 w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8">
            <div className="flex items-center gap-2.5 mb-6">
              <I.logo/>
              <div className="text-[15px] font-extrabold tracking-tight text-stone-900">Simulateur FIGARA</div>
            </div>
            <div className="flex mb-6 bg-stone-100 rounded-lg p-1">
              <button type="button" onClick={() => { setMode("login"); setError(""); setInfo(""); }}
                className={`flex-1 py-1.5 text-[12px] font-semibold rounded-md transition ${mode === "login" ? "bg-white text-stone-900 shadow-sm" : "text-stone-500"}`}>Connexion</button>
              <button type="button" onClick={() => { setMode("signup"); setError(""); setInfo(""); }}
                className={`flex-1 py-1.5 text-[12px] font-semibold rounded-md transition ${mode === "signup" ? "bg-white text-stone-900 shadow-sm" : "text-stone-500"}`}>Créer un compte</button>
            </div>
            <form onSubmit={submit}>
              {mode === "signup" && (
                <>
                  <div className="mb-3">
                    <label className="label">Nom</label>
                    <input type="text" value={nom} onChange={e => setNom(e.target.value)} required
                      className="w-full px-3 py-2 text-[13px] border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400" />
                  </div>
                  <div className="mb-3">
                    <label className="label">Cabinet</label>
                    <input type="text" value={cabinetNom} onChange={e => setCabinetNom(e.target.value)}
                      className="w-full px-3 py-2 text-[13px] border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400" />
                  </div>
                </>
              )}
              <div className="mb-3">
                <label className="label">Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoComplete="email"
                  className="w-full px-3 py-2 text-[13px] border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400" />
              </div>
              <div className="mb-4">
                <label className="label">Mot de passe</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength={6}
                  autoComplete={mode === "login" ? "current-password" : "new-password"}
                  className="w-full px-3 py-2 text-[13px] border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400" />
              </div>
              {error && <div className="mb-3 text-[12px] text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">{error}</div>}
              {info && <div className="mb-3 text-[12px] text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">{info}</div>}
              <button type="submit" disabled={loading} className="btn btn-dark w-full justify-center disabled:opacity-50">
                <I.lock/> {loading ? "Veuillez patienter…" : mode === "login" ? "Se connecter" : "Créer mon compte"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ============================================================
    // SUPER-ADMIN DASHBOARD — toutes les simulations, tous les membres
    // ============================================================
    const PRODUIT_LABELS_ADMIN = { av: "Assurance-Vie", per: "PER", capi: "Capitalisation" };

    function SuperAdminDashboard({ onBack, onLogout }) {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [search, setSearch] = useState("");

      useEffect(() => {
        let active = true;
        (async () => {
          setLoading(true);
          // Pas de compte requis pour les cabinets : cabinet_nom/conseiller_nom (auto-déclarés)
          // sont les colonnes texte sur simulations. Le join profiles ne sert que pour
          // les lignes historiques archivées avant le passage en accès sans login.
          const { data, error } = await supabase.from('simulations').select('*, profiles:member_id(email,nom,cabinet_nom)').order('created_at', { ascending: false });
          if (!active) return;
          if (error) setError(error.message);
          else setRows(data || []);
          setLoading(false);
        })();
        return () => { active = false; };
      }, []);

      const cabinetOf = r => r.cabinet_nom || r.profiles?.cabinet_nom || "Cabinet non renseigné";
      const conseillerOf = r => r.conseiller_nom || r.profiles?.nom || r.profiles?.email || "—";

      const filtered = rows.filter(r => {
        if (!search) return true;
        const s = search.toLowerCase();
        return [r.client_nom, r.client_prenom, r.client_email, r.produit, cabinetOf(r), conseillerOf(r)]
          .filter(Boolean).some(v => String(v).toLowerCase().includes(s));
      });

      // Stats d'usage : cabinets, répartition par cabinet/conseiller, par produit, activité dans le temps
      const stats = useMemo(() => {
        const byCabinet = {};
        const byProduit = {};
        const byDay = {};
        rows.forEach(r => {
          const cab = cabinetOf(r);
          if (!byCabinet[cab]) byCabinet[cab] = { cabinet: cab, conseillers: new Set(), count: 0, last: null };
          byCabinet[cab].count += 1;
          const cons = r.conseiller_nom || r.profiles?.nom || r.profiles?.email;
          if (cons) byCabinet[cab].conseillers.add(cons);
          if (!byCabinet[cab].last || r.created_at > byCabinet[cab].last) byCabinet[cab].last = r.created_at;
          const p = r.produit || "autre";
          byProduit[p] = (byProduit[p] || 0) + 1;
          const day = (r.created_at || "").slice(0, 10);
          if (day) byDay[day] = (byDay[day] || 0) + 1;
        });
        const cabinetStats = Object.values(byCabinet)
          .map(c => ({ ...c, conseillers: Array.from(c.conseillers) }))
          .sort((a, b) => b.count - a.count);
        const conseillersDistincts = new Set(rows.map(r => r.conseiller_nom || r.profiles?.nom || r.profiles?.email).filter(Boolean)).size;
        const produitStats = Object.entries(byProduit).sort((a, b) => b[1] - a[1]);
        const dayEntries = Object.entries(byDay).sort((a, b) => a[0].localeCompare(b[0])).slice(-30);
        const maxDay = dayEntries.reduce((m, [, n]) => Math.max(m, n), 0);
        const last7 = (() => {
          const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
          return rows.filter(r => r.created_at && new Date(r.created_at) >= cutoff).length;
        })();
        return { cabinetStats, conseillersDistincts, produitStats, dayEntries, maxDay, last7 };
      }, [rows]);

      return (
        <div className="min-h-screen bg-stone-50">
          <header className="sticky top-0 z-20 bg-stone-950 px-6 py-3 flex items-center justify-between">
            <div className="flex items-center gap-2.5">
              <I.logo/>
              <div className="text-[14px] font-extrabold text-white tracking-tight">Vue Super-Admin — toutes les simulations</div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={onBack} className="px-3 py-1.5 text-[11px] font-semibold rounded-lg bg-white/10 text-white hover:bg-white/20 transition">Retour au simulateur</button>
              <button onClick={onLogout} className="px-3 py-1.5 text-[11px] font-semibold rounded-lg border border-white/20 text-stone-300 hover:text-white hover:border-white/40 transition">Déconnexion</button>
            </div>
          </header>
          <div className="max-w-6xl mx-auto px-6 py-6">
            {error && <div className="mb-4 text-[12px] text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">Erreur : {error}</div>}

            {!loading && (
              <div className="mb-8">
                {/* Cartes de synthèse */}
                <div className="grid grid-cols-4 gap-3 mb-5">
                  <div className="bg-white border border-stone-200 rounded-xl px-4 py-3">
                    <div className="text-[10px] uppercase tracking-wide text-stone-400 font-semibold mb-1">Cabinets actifs</div>
                    <div className="text-[22px] font-bold text-stone-900">{stats.cabinetStats.length}</div>
                  </div>
                  <div className="bg-white border border-stone-200 rounded-xl px-4 py-3">
                    <div className="text-[10px] uppercase tracking-wide text-stone-400 font-semibold mb-1">Conseillers actifs</div>
                    <div className="text-[22px] font-bold text-stone-900">{stats.conseillersDistincts}</div>
                  </div>
                  <div className="bg-white border border-stone-200 rounded-xl px-4 py-3">
                    <div className="text-[10px] uppercase tracking-wide text-stone-400 font-semibold mb-1">Simulations totales</div>
                    <div className="text-[22px] font-bold text-stone-900">{rows.length}</div>
                  </div>
                  <div className="bg-white border border-stone-200 rounded-xl px-4 py-3">
                    <div className="text-[10px] uppercase tracking-wide text-stone-400 font-semibold mb-1">7 derniers jours</div>
                    <div className="text-[22px] font-bold text-stone-900">{stats.last7}</div>
                  </div>
                </div>

                <div className="grid grid-cols-3 gap-5">
                  {/* Par cabinet */}
                  <div className="bg-white border border-stone-200 rounded-xl p-4 col-span-2">
                    <div className="text-[11px] uppercase tracking-wide text-stone-400 font-semibold mb-3">Utilisation par cabinet</div>
                    {stats.cabinetStats.length === 0 ? (
                      <div className="text-[12px] text-stone-400">Aucune donnée.</div>
                    ) : (
                      <table className="w-full text-[12px]">
                        <thead>
                          <tr className="text-stone-400 uppercase text-[10px] tracking-wide border-b border-stone-100">
                            <th className="text-left py-1.5">Cabinet</th>
                            <th className="text-left py-1.5">Conseiller(s)</th>
                            <th className="text-right py-1.5">Simulations</th>
                            <th className="text-right py-1.5">Dernière activité</th>
                          </tr>
                        </thead>
                        <tbody>
                          {stats.cabinetStats.map((c, i) => (
                            <tr key={i} className="border-b border-stone-50">
                              <td className="py-1.5 text-stone-900 font-medium">{c.cabinet}</td>
                              <td className="py-1.5 text-stone-600">{c.conseillers.length ? c.conseillers.join(", ") : "—"}</td>
                              <td className="py-1.5 text-right num font-semibold text-stone-900">{c.count}</td>
                              <td className="py-1.5 text-right text-stone-500">{c.last ? new Date(c.last).toLocaleDateString('fr-FR') : "—"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    )}
                  </div>

                  {/* Répartition par produit */}
                  <div className="bg-white border border-stone-200 rounded-xl p-4">
                    <div className="text-[11px] uppercase tracking-wide text-stone-400 font-semibold mb-3">Répartition par produit</div>
                    {stats.produitStats.length === 0 ? (
                      <div className="text-[12px] text-stone-400">Aucune donnée.</div>
                    ) : (
                      <div className="space-y-2.5">
                        {stats.produitStats.map(([p, n]) => {
                          const pct = rows.length ? Math.round((n / rows.length) * 100) : 0;
                          return (
                            <div key={p}>
                              <div className="flex justify-between text-[12px] mb-1">
                                <span className="text-stone-700">{PRODUIT_LABELS_ADMIN[p] || p}</span>
                                <span className="text-stone-500 num">{n} ({pct}%)</span>
                              </div>
                              <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden">
                                <div className="h-full bg-red-500 rounded-full" style={{ width: `${pct}%` }} />
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>

                {/* Activité dans le temps (pics) */}
                <div className="bg-white border border-stone-200 rounded-xl p-4 mt-5">
                  <div className="text-[11px] uppercase tracking-wide text-stone-400 font-semibold mb-3">Activité — 30 derniers jours avec simulations</div>
                  {stats.dayEntries.length === 0 ? (
                    <div className="text-[12px] text-stone-400">Aucune donnée.</div>
                  ) : (
                    <div className="flex items-end gap-1 h-24">
                      {stats.dayEntries.map(([day, n]) => (
                        <div key={day} className="flex-1 flex flex-col items-center justify-end h-full group relative" title={`${day} : ${n} simulation${n > 1 ? "s" : ""}`}>
                          <div className="w-full bg-red-500 rounded-t-sm hover:bg-red-600 transition" style={{ height: `${stats.maxDay ? (n / stats.maxDay) * 100 : 0}%`, minHeight: '3px' }} />
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            <div className="mb-4 flex items-center justify-between">
              <div className="text-[13px] text-stone-500">{filtered.length} simulation{filtered.length !== 1 ? "s" : ""} archivée{filtered.length !== 1 ? "s" : ""}</div>
              <input type="text" placeholder="Rechercher (client, membre, cabinet, produit…)" value={search} onChange={e => setSearch(e.target.value)}
                className="w-80 px-3 py-2 text-[12px] border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400 bg-white" />
            </div>
            {loading ? (
              <div className="text-[13px] text-stone-400 py-12 text-center">Chargement…</div>
            ) : filtered.length === 0 ? (
              <div className="text-[13px] text-stone-400 py-12 text-center">Aucune simulation archivée.</div>
            ) : (
              <div className="bg-white border border-stone-200 rounded-2xl overflow-hidden">
                <table className="w-full text-[12px]">
                  <thead>
                    <tr className="bg-stone-50 border-b border-stone-200 text-stone-500 uppercase text-[10px] tracking-wide">
                      <th className="text-left px-4 py-2.5">Date</th>
                      <th className="text-left px-4 py-2.5">Conseiller</th>
                      <th className="text-left px-4 py-2.5">Cabinet</th>
                      <th className="text-left px-4 py-2.5">Client</th>
                      <th className="text-left px-4 py-2.5">Produit</th>
                      <th className="text-right px-4 py-2.5">Capital final</th>
                      <th className="text-right px-4 py-2.5">Durée</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(r => (
                      <tr key={r.id} className="border-b border-stone-100 hover:bg-stone-50">
                        <td className="px-4 py-2.5 text-stone-600 whitespace-nowrap">{new Date(r.created_at).toLocaleDateString('fr-FR')}</td>
                        <td className="px-4 py-2.5 text-stone-900 font-medium">{conseillerOf(r)}</td>
                        <td className="px-4 py-2.5 text-stone-600">{cabinetOf(r)}</td>
                        <td className="px-4 py-2.5 text-stone-900">{[r.client_prenom, r.client_nom].filter(Boolean).join(" ") || "—"}</td>
                        <td className="px-4 py-2.5 text-stone-600">{r.produit || "—"}</td>
                        <td className="px-4 py-2.5 text-right num font-semibold text-stone-900">{fmtEUR(r.resume?.capitalFinal)}</td>
                        <td className="px-4 py-2.5 text-right text-stone-600">{r.resume?.dureeAnnees ? `${r.resume.dureeAnnees} ans` : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // IDENTIFICATION LÉGÈRE — Cabinet + Conseiller, sans mot de passe ni compte.
    // Demandé une seule fois par navigateur (stocké en localStorage), sert d'identifiant
    // d'usage pour les statistiques super-admin. Pas d'authentification pour l'usage normal.
    // ============================================================
    function IdentityGate() {
      const readSaved = () => {
        try { return JSON.parse(localStorage.getItem('figara_conseiller') || '{}'); } catch { return {}; }
      };
      const [identified, setIdentified] = useState(() => {
        const s = readSaved();
        return !!(s.cabinetNom && s.conseillerNom);
      });
      const [cabinetNom, setCabinetNom] = useState("");
      const [conseillerNom, setConseillerNom] = useState("");
      const [touched, setTouched] = useState(false);

      if (identified) return <App/>;

      const submit = (e) => {
        e.preventDefault();
        setTouched(true);
        if (!cabinetNom.trim() || !conseillerNom.trim()) return;
        try {
          const prev = readSaved();
          localStorage.setItem('figara_conseiller', JSON.stringify({
            ...prev, cabinetNom: cabinetNom.trim(), conseillerNom: conseillerNom.trim(),
            cabinetLogo: prev.cabinetLogo || '', afficherFigara: prev.afficherFigara !== undefined ? prev.afficherFigara : true,
          }));
        } catch {}
        setIdentified(true);
      };

      return (
        <div className="min-h-screen bg-stone-950 flex items-center justify-center px-4 relative overflow-hidden">
          <FigaraDecor/>
          <div className="relative z-10 w-full max-w-sm bg-white rounded-2xl shadow-2xl p-8">
            <div className="flex items-center gap-2.5 mb-6">
              <I.logo/>
              <div className="text-[15px] font-extrabold tracking-tight text-stone-900">Simulateur FIGARA</div>
            </div>
            <p className="text-[12px] text-stone-500 mb-5">Renseignez votre cabinet et votre nom — demandé une seule fois sur cet appareil.</p>
            <form onSubmit={submit}>
              <div className="mb-3">
                <label className="label">Cabinet</label>
                <input type="text" value={cabinetNom} onChange={e => setCabinetNom(e.target.value)} placeholder="Figara Patrimoine"
                  className="w-full px-3 py-2 text-[13px] border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400" />
                {touched && !cabinetNom.trim() && <div className="mt-1 text-[11px] text-red-600">Champ requis.</div>}
              </div>
              <div className="mb-4">
                <label className="label">Votre nom</label>
                <input type="text" value={conseillerNom} onChange={e => setConseillerNom(e.target.value)} placeholder="Prénom NOM"
                  className="w-full px-3 py-2 text-[13px] border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400" />
                {touched && !conseillerNom.trim() && <div className="mt-1 text-[11px] text-red-600">Champ requis.</div>}
              </div>
              <button type="submit" className="btn btn-dark w-full justify-center">Accéder au simulateur</button>
            </form>
          </div>
        </div>
      );
    }

    // ============================================================
    // AUTH GATE — session Supabase + routage App / SuperAdminDashboard
    // Accessible uniquement via #admin : réservé au super-admin pour consulter les stats d'usage.
    // ============================================================
    function AuthGate() {
      const [session, setSession] = useState(undefined); // undefined = chargement, null = déconnecté
      const [profile, setProfile] = useState(null);
      const [view, setView] = useState("app"); // "app" | "admin"

      useEffect(() => {
        let active = true;
        supabase.auth.getSession().then(({ data }) => { if (active) setSession(data.session ?? null); });
        const { data: sub } = supabase.auth.onAuthStateChange((_event, sess) => {
          setSession(sess);
          if (!sess) setProfile(null);
        });
        return () => { active = false; sub.subscription.unsubscribe(); };
      }, []);

      useEffect(() => {
        if (!session) return;
        let active = true;
        supabase.from('profiles').select('*').eq('id', session.user.id).single().then(({ data }) => {
          if (active) setProfile(data || null);
        });
        return () => { active = false; };
      }, [session]);

      if (session === undefined) {
        return <div className="min-h-screen bg-stone-950 flex items-center justify-center text-stone-400 text-[13px]">Chargement…</div>;
      }
      if (!session) {
        return <LoginScreen/>;
      }
      const isSuperAdmin = profile?.role === 'super_admin';
      const onLogout = () => supabase.auth.signOut();

      if (view === "admin" && isSuperAdmin) {
        return <SuperAdminDashboard onBack={() => setView("app")} onLogout={onLogout}/>;
      }
      return <App session={session} isSuperAdmin={isSuperAdmin} onOpenAdmin={() => setView("admin")} onLogout={onLogout}/>;
    }

    // ============================================================
    // ROOT — usage normal (cabinets) : pas de login, juste l'identification légère.
    // Accès admin (vous) : ajouter #admin à l'URL → login Supabase → tableau de bord.
    // ============================================================
    function Root() {
      const [hash, setHash] = useState(window.location.hash);
      useEffect(() => {
        const onHash = () => setHash(window.location.hash);
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      if (hash === '#admin') return <AuthGate/>;
      return <IdentityGate/>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
