            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Épargne investie" val={fmtEUR(col.versements)} />
            {col.isPER && col.reductionImpotCumulee > 0 && (
              <Row textPrimary={textPrimary} textSecondary={textSecondary}
                lbl="Coût réel pour l'épargnant"
                val={<span style={{whiteSpace:'nowrap'}}>{fmtEUR(Math.max(0, col.versements - col.reductionImpotCumulee))} <span className="font-normal text-[9px] opacity-60">(cap.−réduc.)</span></span>} bold />
            )}
            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Plus-value" val={`+${fmtEUR(col.plusValue)}`} positive />
            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Capital + intérêts" val={fmtEUR(col.capital)} bold />
            {col.isPER && col.reductionImpotCumulee > 0 && (
              <div className="mt-3 pt-3 border-t border-stone-200/60 rounded-md bg-emerald-50/60 px-3 py-2.5 ring-1 ring-emerald-200/60">
                <div className="flex items-baseline justify-between gap-2">
                  <div className="text-[10px] uppercase tracking-widest font-bold text-emerald-700">Réduction d'impôt PER</div>
                  <div className="num text-[16px] font-bold text-emerald-700">{fmtEUR(col.reductionImpotCumulee)}</div>
                </div>
                <div className="text-[10px] text-emerald-700/80 mt-1">
                  Versements déductibles × TMI {(col.tauxIRPct*100).toFixed(0)}%
                </div>
              </div>
            )}
          </div>

          {/* ═══════ EN CAS DE DÉCÈS ═══════ */}
          <SectionTitle textPrimary={textPrimary} sectionBg={sectionBg} dividerColor={dividerColor} accent={accent}>
            En cas de décès
          </SectionTitle>
          <div className="px-5 py-4 space-y-2.5" style={{minHeight: '160px'}}>
            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Capital à transmettre" val={fmtEUR(col.capitalDeces)} />
            <div style={{minHeight: '40px'}}>
              <div className={`flex items-center justify-between text-[12px] ${textSecondary}`}>
                <span>Abattement</span>
                <span className={`num font-semibold ${textPrimary}`}>{col.abattement === 0 ? '0 €' : `−${fmtEUR(col.abattement)}`}</span>
              </div>
              <div className={`text-[10px] ${textMuted} mt-0.5 truncate`}>{col.abattDetail}</div>
            </div>
            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Droits de succession" val={col.taxe === 0 ? "0 €" : `−${fmtEUR(col.taxe)}`} negative={col.taxe > 0} muted={col.taxe === 0} />
          </div>

          {/* HIGHLIGHT : Capital net pour les bénéficiaires (aligné entre colonnes) */}
          <div className={`${highlightBg} border-y-2 ${dividerColor} px-5 py-4 text-center`}>
            <div className="flex items-center justify-center gap-2 mb-1">
              <div className={`text-[10px] uppercase tracking-widest font-bold ${textSecondary}`}>Capital net pour les bénéficiaires</div>
              {isBestSuccession && !isLivret && <I.trophy />}
            </div>
            <div className={`num text-2xl md:text-[28px] font-bold tracking-tightest ${highlightTxt} leading-none`}>{fmtEUR(col.netTransmis)}</div>
          </div>

          {/* ═══════ RENTE ═══════ */}
          <SectionTitle textPrimary={textPrimary} sectionBg={sectionBg} dividerColor={dividerColor} accent={accent}>
            Rente
          </SectionTitle>
          <div className="px-5 py-4 space-y-3">
            {/* Rente mensuelle brute — pilotée par le slider, hero centré */}
            <div className="text-center">
              <div className={`text-[10px] uppercase tracking-wider font-semibold ${textSecondary}`}>Rente mensuelle brute</div>
              <div className={`num text-[26px] font-bold tracking-tightest ${textPrimary} mt-0.5 leading-none`}>
                {fmtEUR(targetRente)}<span className="text-base font-medium opacity-60"> /mois</span>
              </div>
            </div>

            {/* Slider d'ajustement (min = perpétuelle) */}
            <div className="no-print pt-1">
              <input type="range" min={sliderMin} max={sliderMax} step={1} value={Math.min(Math.max(targetRente, sliderMin), sliderMax)}
                onChange={e=>{
                  const v = parseFloat(e.target.value);
                  // Première fenêtre de 100 € depuis le min : valeur précise à l'euro
                  // Au-delà : snap au pas de 50 €
                  if (v - sliderMin <= 100) {
                    setTargetRente(v);
                  } else {
                    setTargetRente(Math.round(v / 50) * 50);
                  }
                }}
                className="slider" />
              <div className={`relative text-[9px] font-medium mt-1 ${textMuted}`} style={{height:'14px'}}>
                <span style={{position:'absolute', left:'11px', transform:'translateX(-50%)'}}>à vie</span>
                <span style={{position:'absolute', right:'11px', transform:'translateX(50%)'}}>{fmtEURc(sliderMax)} /mois</span>
              </div>
            </div>

            {/* Fiscalité — compact */}
            <Row textPrimary={textPrimary} textSecondary={textSecondary}
              lbl="Fiscalité"
              val={targetFiscMois <= 0.5 ? "Exonéré" : `−${fmtEUR(targetFiscMois)} /mois`}
              negative={targetFiscMois > 0.5}
              muted={targetFiscMois <= 0.5} />

            {/* Rente mensuelle nette — hero centré */}
            <div className="text-center pt-2">
              <div className={`text-[10px] uppercase tracking-wider font-semibold ${textSecondary}`}>Rente mensuelle nette</div>
              <div className={`num text-[26px] font-bold tracking-tightest ${highlightTxt} mt-0.5 leading-none`}>
                {fmtEUR(targetNetMois)}<span className={`text-base font-medium opacity-60 ${textPrimary}`}> /mois</span>
              </div>
            </div>

            {/* Durée de distribution */}
            <div className={`mt-2 pt-3 border-t ${dividerColor} text-center`}>
              <div className={`text-[10px] uppercase tracking-widest font-bold ${textSecondary} mb-1`}>Durée de distribution</div>
              <div className={`num text-[26px] font-bold tracking-tightest ${textPrimary} leading-none`}>
                {isPerpetual ? <>À vie <span className="text-base font-medium opacity-60">∞</span></>
                  : durYears >= 1 ? <>{durYears}<span className="text-base font-medium opacity-60"> {durYears > 1 ? 'ans' : 'an'}</span>{durMonths > 0 && <>{' '}{durMonths}<span className="text-base font-medium opacity-60"> mois</span></>}</>
                  : <>{Math.max(1, Math.round(dur * 12))}<span className="text-base font-medium opacity-60"> mois</span></>}
              </div>
              <div className={`text-[10px] ${textMuted} mt-1`}>
                {isPerpetual ? 'Rente à vie · capital préservé' : 'Capital épuisé à terme'}
              </div>
            </div>
          </div>

          {/* FOOTER */}
          {isScenario && onLoad && (
            <div className="px-5 py-3 border-t border-stone-100 no-print">
              <button onClick={onLoad} className="w-full text-[11px] font-semibold text-stone-700 hover:text-stone-900 hover:bg-stone-100 py-1.5 rounded transition">Charger ce scénario</button>
            </div>
          )}
        </div>
      );
    }

    function SectionTitle({ children, textPrimary, sectionBg, dividerColor, accent }) {
      return (
        <div className={`${sectionBg} border-y ${dividerColor} px-5 py-3 text-center relative`}>
          <div className="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-[3px] rounded-b-full" style={{background: accent}}></div>
          <div className={`text-[12px] font-extrabold tracking-tight uppercase ${textPrimary}`}>{children}</div>
        </div>
      );
    }

    function Row({ lbl, val, bold, negative, positive, muted, textPrimary, textSecondary }) {
      // Plus-value (positive) : utilise textPrimary (white sur solution émeraude, stone-900 sur fond clair)
      // + font-extrabold pour la mise en valeur — lisible sur tout fond.
      return (
        <div className={`flex items-baseline justify-center gap-3 text-[12px] ${textSecondary}`}>
          <span className="whitespace-nowrap">{lbl}</span>
          <span className={`num ${bold ? `${textPrimary} font-bold text-[15px]` : ''} ${negative ? 'text-red-500' : ''} ${positive ? `${textPrimary} font-extrabold` : ''} ${muted ? 'opacity-50' : 'font-semibold'} ${!bold && !negative && !positive ? textPrimary : ''}`}>{val}</span>
        </div>
      );
    }

    // ============================================================
    // STEP 5 — PRÉSENTATION CLIENT (graphique premium)
    // ============================================================
    function Step5Presentation({ inputs, sim, scenarios, scenarioLvl, setScenarioLvl, onOpenPrint }) {
      const chartRef = useRef(null);
      const chartInst = useRef(null);
      const isPER_Step5 = inputs.produit === "per";
      const livretNom = isPER_Step5 ? "PER + Réintégration" : (inputs.produit === "capi" ? "Compte à terme" : (LIVRETS.find(p=>p.id===inputs.livretId)?.nom || "Livret"));

      // Compute series and metrics
      const N = Math.round(inputs.dureeAnnees);
      // 3 séries pour la solution : prudent / médian / optimiste — affichées simultanément
      const pessData = useMemo(() => projectionSeries(inputs, sim.rdtPess), [inputs, sim.rdtPess]);
      const medData  = useMemo(() => projectionSeries(inputs, sim.rdtMed),  [inputs, sim.rdtMed]);
      const optData  = useMemo(() => projectionSeries(inputs, sim.rdtOpt),  [inputs, sim.rdtOpt]);
      const solutionData = medData; // alias : la courbe médiane est la référence
      // Courbe de référence : pour PER → PER + Réintégration des réductions ; sinon → livret
      const livretData = useMemo(() => {
        if (isPER_Step5) {
          const aux = perReinvestSeries(inputs, sim.rdtMed, inputs.tauxIR ?? 0.30);
          return medData.map((v, i) => v + (aux[i] || 0));
        }
        return livretSeries(inputs);
      }, [inputs, sim.rdtMed, medData, isPER_Step5]);
      const scenarioSeries = useMemo(() => scenarios.map((s, idx) => {
        const sSim = runSimulation(s.inputs, "med");
        return {
          nom: s.nom,
          // Palette qui évite tout vert (déjà pris par opt/médian) — bleu / violet / orange vif / rose
          color: ['#2563eb','#9333ea','#ea580c','#ec4899'][idx % 4],
          data: projectionSeries(s.inputs, sSim.rdt),
        };
      }), [scenarios]);

      const finalLivret = livretData[livretData.length - 1];
      const finalSolution = solutionData[solutionData.length - 1];
      const finalPess = pessData[pessData.length - 1];
      const finalOpt  = optData[optData.length - 1];
      // En PER, le gain "vs Réintégration" est le BONUS apporté par le réinvestissement.
      // Dans les autres produits, c'est le gain vs livret/CAT.
      const gainEUR = isPER_Step5 ? (finalLivret - finalSolution) : (finalSolution - finalLivret);
      const gainPCT = isPER_Step5
        ? (finalSolution > 0 ? gainEUR / finalSolution : 0)
        : (finalLivret > 0 ? gainEUR / finalLivret : 0);
      const totalVerseBrut = inputs.versementInitial + inputs.versementMensuel * 12 * inputs.dureeAnnees;

      useEffect(() => {
        if (!chartRef.current || typeof Chart === 'undefined') return;
        if (chartInst.current) chartInst.current.destroy();

        const labels = Array.from({length: N+1}, (_, i) => i);
        const ctx = chartRef.current.getContext('2d');

        // Gradient fill under solution AV
        const gradSol = ctx.createLinearGradient(0, 0, 0, 540);
        gradSol.addColorStop(0, 'rgba(4, 120, 87, 0.18)');
        gradSol.addColorStop(0.7, 'rgba(4, 120, 87, 0.04)');
        gradSol.addColorStop(1, 'rgba(4, 120, 87, 0)');

        // End-of-line labels plugin — anti-chevauchement : on collecte tous les labels, on les trie par y et on décale ceux qui se chevauchent
        const endLabels = {
          id: 'endLabels',
          afterDatasetsDraw(chart) {
            const { ctx, chartArea } = chart;
            // 1) Collecte de tous les labels à afficher
            const items = [];
            chart.data.datasets.forEach((dataset, i) => {
              if (dataset._noEndLabel) return;
              const meta = chart.getDatasetMeta(i);
              const lastPoint = meta.data[meta.data.length - 1];
              if (!lastPoint) return;
              const value = dataset.data[dataset.data.length - 1];
              const suffix = dataset._endLabelSuffix || dataset.label || '';
              const label = suffix ? `${fmtEURc(value)} · ${suffix}` : fmtEURc(value);
              const isSoft = !!dataset._endLabelSoft;
              ctx.save();
              ctx.font = isSoft ? '600 9px Inter' : '700 11px Inter';
              const textWidth = ctx.measureText(label).width;
              ctx.restore();
              const padX = isSoft ? 5 : 8;
              const w = textWidth + padX * 2;
              const h = isSoft ? 16 : 20;
              const x = lastPoint.x + (isSoft ? 6 : 8);
              const yIdeal = lastPoint.y - h / 2;
              items.push({
                label, x, yIdeal, w, h, padX, isSoft,
                bg: isSoft ? (dataset._endLabelBg || dataset.borderColor) : dataset.borderColor,
              });
            });

            // 2) Tri par y croissant (de haut en bas)
            items.sort((a, b) => a.yIdeal - b.yIdeal);

            // 3) Anti-chevauchement vertical : on pousse chaque label vers le bas si nécessaire
            const margin = 2;  // espace minimal entre 2 labels
            for (let i = 0; i < items.length; i++) {
              if (i === 0) {
                items[i].y = items[i].yIdeal;
              } else {
                const prev = items[i - 1];
                const prevBottom = prev.y + prev.h + margin;
                items[i].y = Math.max(items[i].yIdeal, prevBottom);
              }
            }

            // 4) Si le bloc débordait en bas, on le re-cale dans la zone visible (en remontant tout)
            if (items.length > 0) {
              const lastBottom = items[items.length - 1].y + items[items.length - 1].h;
              const overflow = lastBottom - chartArea.bottom;
              if (overflow > 0) {
                for (let i = items.length - 1; i >= 0; i--) {
                  items[i].y -= overflow;
                  if (i > 0) {
                    const prev = items[i - 1];
                    const prevBottom = prev.y + prev.h + margin;
                    if (items[i].y < prevBottom) {
                      items[i - 1].y -= (prevBottom - items[i].y);
                    }
                  }
                }
              }
            }

            // 5) Rendu final
            items.forEach(it => {
              ctx.save();
              ctx.font = it.isSoft ? '600 9px Inter' : '700 11px Inter';
              ctx.fillStyle = it.bg;
              if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(it.x, it.y, it.w, it.h, it.isSoft ? 8 : 10);
                ctx.fill();
              } else {
                ctx.fillRect(it.x, it.y, it.w, it.h);
              }
              ctx.fillStyle = '#fff';
              ctx.textBaseline = 'middle';
              ctx.fillText(it.label, it.x + it.padX, it.y + it.h / 2);
              ctx.restore();
            });
          },
        };

        // Year-8 vertical annotation — uniquement pour AV (le seuil 8 ans est spécifique au régime fiscal AV)
        const showYear8 = inputs.produit !== "per" && inputs.produit !== "capi";
        const yearAnnotation = {
          id: 'year8',
          afterDraw(chart) {
            if (N < 8 || !showYear8) return;
            const { ctx, chartArea, scales } = chart;
            const xPos = scales.x.getPixelForValue(8);
            ctx.save();
            ctx.strokeStyle = 'rgba(120, 113, 108, 0.35)';
            ctx.setLineDash([3, 3]);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(xPos, chartArea.top + 30);
            ctx.lineTo(xPos, chartArea.bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            // Label
            ctx.font = '700 10px Inter';
            const text = 'AN 8 · RÉGIME FISCAL FAVORABLE *';
            const tw = ctx.measureText(text).width;
            const padX = 8, h = 20;
            const x = xPos - (tw + padX*2)/2;
            const y = chartArea.top + 10;
            ctx.fillStyle = '#0c0a09';
            if (ctx.roundRect) {
              ctx.beginPath();
              ctx.roundRect(x, y, tw + padX*2, h, 10);
              ctx.fill();
            } else {
              ctx.fillRect(x, y, tw + padX*2, h);
            }
            ctx.fillStyle = '#fff';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x + padX, y + h/2);
            ctx.restore();
          },
        };

        const datasets = [
          // Optimiste — borne haute du tunnel : remplit jusqu'à Prudent (index 2)
          {
            label: 'Optimiste',
            data: optData,
            borderColor: 'rgba(5, 150, 105, 0.65)',
            backgroundColor: 'rgba(16, 185, 129, 0.10)',  // tunnel coloré (très léger)
            borderDash: [5, 4],
            borderWidth: 1.75,
            fill: 2,  // remplit jusqu'au dataset Prudent (index 2)
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHoverBackgroundColor: '#059669',
            _endLabelSoft: true,
            _endLabelBg: '#059669',
          },
          // Médian — la courbe principale (gras + remplissage sous la courbe)
          {
            label: 'Médian',
            data: medData,
            borderColor: '#047857',
            backgroundColor: gradSol,
            borderWidth: 4,
            fill: true,
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: '#047857',
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2,
          },
          // Pessimiste — borne basse du tunnel coloré + remplissage BLANC entre pess et livret
          // L'index du livret = 3 (opt, méd, pess) + scenarioSeries.length (scénarios) — toujours dernier
          {
            label: 'Pessimiste',
            data: pessData,
            borderColor: 'rgba(180, 83, 9, 0.65)',
            backgroundColor: '#ffffff',  // blanc opaque entre pessimiste et livret
            borderDash: [5, 4],
            borderWidth: 1.75,
            fill: 3 + scenarioSeries.length,  // target = dataset Livret (dernier)
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 4,
            pointHoverBackgroundColor: '#b45309',
            _endLabelSoft: true,
            _endLabelBg: '#b45309',
          },
          ...scenarioSeries.map(s => ({
            label: s.nom,
            data: s.data,
            borderColor: s.color,
            borderWidth: 2.5,
            fill: false,
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: s.color,
          })),
          {
            label: livretNom,
            data: livretData,
            borderColor: isPER_Step5 ? '#0d9488' : '#a8a29e',
            borderDash: isPER_Step5 ? [4, 4] : [6, 5],
            borderWidth: isPER_Step5 ? 2.5 : 2,
            fill: false,
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: isPER_Step5 ? '#0d9488' : '#a8a29e',
            _endLabelBg: isPER_Step5 ? '#0d9488' : undefined,
          },
        ];

        chartInst.current = new Chart(ctx, {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            layout: { padding: { right: 160, top: 40, bottom: 8, left: 8 } },
            animation: { duration: 1200, easing: 'easeOutQuart' },
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#0c0a09',
                titleColor: '#fff',
                bodyColor: '#e7e5e4',
                titleFont: { family: 'Inter', weight: '700', size: 13 },
                bodyFont: { family: 'Inter', size: 12, weight: '500' },
                padding: 14,
                cornerRadius: 12,
                borderColor: '#44403c',
                borderWidth: 1,
                displayColors: true,
                boxPadding: 6,
                callbacks: {
                  title: (items) => `An ${items[0].label}`,
                  label: (c) => `  ${c.dataset.label} : ${fmtEUR(c.parsed.y)}`,
                },
              },
            },
            scales: {
              y: {
                ticks: { callback: v => fmtEURc(v), font: { family: 'Inter', size: 12, weight: '500' }, color: '#78716c', padding: 8 },
                grid: { color: '#f5f5f4', drawBorder: false, lineWidth: 1 },
                border: { display: false },
              },
              x: {
                ticks: { callback: function(v, i) { return i % Math.ceil(N/12) === 0 || i === N ? `An ${this.getLabelForValue(v)}` : ''; }, font: { family: 'Inter', size: 12, weight: '500' }, color: '#78716c', padding: 8 },
                grid: { display: false },
                border: { display: false },
              },
            },
          },
          plugins: [endLabels, yearAnnotation],
        });

        return () => chartInst.current?.destroy();
      }, [livretData, pessData, medData, optData, scenarioSeries, N, livretNom]);

      const allocBar = inputs.allocation;
      const isPER = inputs.produit === "per";
      const reductionImpotCumulee = isPER ? (sim.fiscPER?.ecoFiscEntree || 0) : 0;
      const reductionImpotAnnuelle = isPER ? (inputs.versementInitial / Math.max(1, inputs.dureeAnnees) + inputs.versementMensuel * 12) * inputs.tauxIR : 0;

      const produitNomComplet = inputs.produit === "per" ? "PER" : inputs.produit === "capi" ? "Capi PM" : "Assurance-Vie";
      return (
        <div className="max-w-screen-xl mx-auto page-enter">
          {/* HERO — titre + chip gains + chip réduction d'impôt PER */}
          <div className="flex items-end justify-between flex-wrap gap-4 mb-4 pb-4 border-b border-stone-200">
            <div>
              <div className="text-[10px] tracking-widest font-semibold text-red-600 uppercase mb-1">Étape 5 · Présentation client</div>
              <div className="flex items-baseline gap-3 flex-wrap">
                {!isPER_Step5 && <h1 className="text-xl md:text-2xl font-bold text-stone-900 tracking-tight">Avec votre solution {produitNomComplet}</h1>}
                {!isPER_Step5 && <div className="num text-2xl md:text-3xl font-bold text-emerald-700 tracking-tightest">+{fmtEUR(gainEUR)}</div>}
                {!isPER_Step5 && <span className="px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded text-[12px] font-bold">+{(gainPCT*100).toFixed(0)} %</span>}
                {!isPER_Step5 && <span className="text-[12px] text-stone-500">vs {livretNom} · {inputs.dureeAnnees} ans · scénario médian</span>}
                {isPER && <h1 className="text-xl md:text-2xl font-bold text-stone-900 tracking-tight">Votre solution PER</h1>}
                {isPER && reductionImpotCumulee > 0 && (
                  <span className="ml-2 inline-flex items-center gap-1.5 px-2.5 py-1 bg-emerald-100 text-emerald-800 rounded-full text-[12px] font-bold ring-1 ring-emerald-300/60">
                    + {fmtEUR(reductionImpotCumulee)} de réduction d'impôt
                  </span>
                )}
              </div>
            </div>
            {onOpenPrint && (
              <button onClick={onOpenPrint} className="no-print inline-flex items-center gap-2 px-4 py-2.5 rounded-lg bg-stone-900 hover:bg-stone-800 text-white text-[12px] font-bold tracking-wide uppercase shadow-md hover:shadow-lg transition-all ring-1 ring-stone-900/20">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="6 9 6 2 18 2 18 9"/>
                  <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                  <rect x="6" y="14" width="12" height="8"/>
                </svg>
                Présentation client
              </button>
            )}
          </div>

          {/* RAPPEL DES HYPOTHÈSES — bandeau compact à lecture rapide */}
          <div className="bg-white border border-stone-200 rounded-xl shadow-sm mb-5 overflow-hidden">
            <div className="h-[2px] bg-gradient-to-r from-red-700 via-red-500 to-red-700"></div>
            <div className="px-4 py-3 grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-4 items-center">
              <div>
                <div className="text-[9px] uppercase tracking-widest font-bold text-stone-400 mb-0.5">Versement initial</div>
                <div className="num text-[16px] font-bold text-stone-900 tracking-tightest leading-none">{fmtEUR(inputs.versementInitial)}</div>
              </div>
              <div>
                <div className="text-[9px] uppercase tracking-widest font-bold text-stone-400 mb-0.5">Versement périodique</div>
                <div className="num text-[16px] font-bold text-stone-900 tracking-tightest leading-none">{fmtEUR(inputs.versementMensuel)}<span className="text-[11px] font-medium text-stone-500"> /mois</span></div>
              </div>
              <div>
                <div className="text-[9px] uppercase tracking-widest font-bold text-stone-400 mb-0.5">Durée</div>
                <div className="num text-[16px] font-bold text-stone-900 tracking-tightest leading-none">{inputs.dureeAnnees}<span className="text-[11px] font-medium text-stone-500"> ans</span></div>
              </div>
              <div>
                <div className="text-[9px] uppercase tracking-widest font-bold text-stone-400 mb-0.5">Hyp. rendement</div>
                <div className="num text-[16px] font-bold text-emerald-700 tracking-tightest leading-none">{fmtPCT(sim.rdtMed)}<span className="text-[10px] font-medium text-stone-500"> médian</span></div>
                <div className="text-[9px] text-stone-400 mt-0.5">prudent {fmtPCT(sim.rdtPess)} · opt {fmtPCT(sim.rdtOpt)}</div>
              </div>
              <div className="border-l border-stone-100 pl-3 md:pl-4">
                <div className="text-[9px] uppercase tracking-widest font-bold text-emerald-700 mb-0.5">Total versé</div>
                <div className="num text-[18px] font-extrabold text-emerald-700 tracking-tightest leading-none">{fmtEUR(totalVerseBrut)}</div>
              </div>
            </div>
          </div>

          {/* MAIN GRID — 3 colonnes : KPI gauche | Chart centre | KPI droite */}
          <div className="grid grid-cols-12 gap-4 mb-6">
            {/* LEFT — 3 cartes "VS Livret" : Capital, Rente, Succession */}
            <div className="col-span-12 md:col-span-3 space-y-3">
              {(() => {
                // Couleur palette pour barres : émeraude pour le « gagnant », gris stone pour la référence
                const ComparisonCard = ({ title, valSolution, valLivret, gain, gainPct, valFmt = fmtEUR, sub, solutionLabel, livretLabel, victoireLabel }) => {
                  const max = Math.max(valSolution, valLivret, 1);
                  const wSol = (valSolution / max) * 100;
                  const wLiv = (valLivret / max) * 100;
                  return (
                    <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-sm">
                      <div className="text-[11px] uppercase tracking-widest font-extrabold text-stone-900 mb-3">{title}</div>
                      <div className="space-y-2.5">
                        <div>
                          <div className="flex items-center justify-between text-[11px] mb-1">
                            <span className="text-emerald-700 font-bold">{solutionLabel || produitNomComplet}</span>
                            <span className="num font-bold text-emerald-700">{valFmt(valSolution)}</span>
                          </div>
                          <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden">
                            <div className="h-full bg-gradient-to-r from-emerald-500 to-emerald-700 rounded-full" style={{width: `${wSol}%`, transition: 'width 0.6s ease-out'}}></div>
                          </div>
                        </div>
                        <div>
                          <div className="flex items-center justify-between text-[11px] mb-1">
                            <span className="text-stone-500 font-semibold">{livretLabel || livretNom}</span>
                            <span className="num font-semibold text-stone-500">{valFmt(valLivret)}</span>
                          </div>
                          <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden">
                            <div className="h-full bg-stone-400 rounded-full" style={{width: `${wLiv}%`, transition: 'width 0.6s ease-out'}}></div>
                          </div>
                        </div>
                        <div className="pt-2 border-t border-stone-100 flex items-center justify-between">
                          <span className="text-[10px] uppercase tracking-wider font-bold text-emerald-700">{victoireLabel || `Victoire ${produitNomComplet}`}</span>
                          <div className="text-right">
                            <div className="num text-[15px] font-bold text-emerald-700 leading-none">+{valFmt(gain)}</div>
                            {gainPct != null && <div className="text-[9px] text-emerald-700/70">+{(gainPct*100).toFixed(0)} %{sub ? ' · '+sub : ''}</div>}
                            {sub && gainPct == null && <div className="text-[9px] text-emerald-700/70">{sub}</div>}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                };

                // Carte premium pour PER : header sombre + 2 colonnes chiffres + badge gain
                const PERCard = ({ title, subtitle, solLabel, livLabel, solVal, livVal, gainVal, gainPct, fmt, gainLabel, gainSub, suffix }) => {
                  const max = Math.max(solVal, livVal, 1);
                  const wSol = (solVal / max) * 100;
                  const wLiv = (livVal / max) * 100;
                  return (
                    <div className="rounded-2xl overflow-hidden shadow-md" style={{border:'1px solid #e7e5e4'}}>
                      {/* Header — couleur douce, titre en premier et en grand */}
                      <div className="px-4 py-3.5" style={{background:'linear-gradient(135deg,#44403c 0%,#57534e 100%)'}}>
                        <div className="text-[15px] font-extrabold text-white leading-tight tracking-tight mb-0.5">{title}</div>
                        <div className="text-[9px] uppercase tracking-widest font-semibold text-stone-400">{subtitle || 'Comparatif PER'}</div>
                      </div>
                      {/* Corps : 2 colonnes */}
                      <div className="bg-white px-4 pt-4 pb-3">
                        <div className="grid grid-cols-2 gap-2 mb-3">
                          {/* Gagnant : PER + IR */}
                          <div className="rounded-xl p-3 text-center" style={{background:'linear-gradient(160deg,#f0fdf4,#dcfce7)'}}>
                            <div className="text-[8.5px] uppercase tracking-widest font-bold text-emerald-700 mb-1.5">{solLabel}</div>
                            <div className="num text-[18px] font-extrabold text-emerald-800 leading-none tracking-tightest">{fmt(solVal)}{suffix && <span className="text-[11px] font-medium text-emerald-600 ml-0.5">{suffix}</span>}</div>
                            <div className="h-1.5 rounded-full overflow-hidden mt-2.5" style={{background:'#bbf7d0'}}>
                              <div className="h-full rounded-full" style={{width:`${wSol}%`, background:'linear-gradient(90deg,#10b981,#059669)', transition:'width 0.6s ease-out'}}></div>
                            </div>
                          </div>
                          {/* Référence : PER seul */}
                          <div className="rounded-xl p-3 text-center" style={{background:'#f7f6f5'}}>
                            <div className="text-[8.5px] uppercase tracking-widest font-bold text-stone-500 mb-1.5">{livLabel}</div>
                            <div className="num text-[18px] font-extrabold text-stone-600 leading-none tracking-tightest">{fmt(livVal)}{suffix && <span className="text-[11px] font-medium text-stone-400 ml-0.5">{suffix}</span>}</div>
                            <div className="h-1.5 rounded-full overflow-hidden mt-2.5" style={{background:'#e7e5e4'}}>
                              <div className="h-full rounded-full" style={{width:`${wLiv}%`, background:'#a8a29e', transition:'width 0.6s ease-out'}}></div>
                            </div>
                          </div>
                        </div>
                        {/* Badge gain */}
                        <div className="flex items-center justify-between rounded-xl px-3 py-2.5" style={{background:'linear-gradient(135deg,#ecfdf5,#f0fdf4)', border:'1px solid #a7f3d0'}}>
                          <div>
                            <div className="text-[9px] uppercase tracking-widest font-extrabold text-emerald-800">{gainLabel || 'Gain réintégration'}</div>
                            {gainSub && <div className="text-[9px] text-emerald-600 mt-0.5">{gainSub}</div>}
                          </div>
                          <div className="text-right">
                            <div className="num text-[18px] font-extrabold text-emerald-700 leading-none">+{fmt(gainVal)}</div>
                            {gainPct != null && <div className="text-[9px] font-bold text-emerald-600 mt-0.5">+{(gainPct*100).toFixed(0)} %</div>}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                };

                // === Calculs comparatifs ===
                // Pour PER : finalLivret = PER + Réintégration (le scénario premium, qui gagne)
                //            finalSolution = PER seul (le scénario baseline)
                // Pour AV/Capi : finalSolution = produit ; finalLivret = livret/CAT
                const isPERMode = inputs.produit === "per";
                const capSol = isPERMode ? finalLivret : finalSolution;       // gagnant
                const capLiv = isPERMode ? finalSolution : finalLivret;       // référence
                const capGain = capSol - capLiv;
                const capGainPct = capLiv > 0 ? capGain / capLiv : 0;

                // 2) Rente perpétuelle mensuelle
                const perpRente = (cap, taux) => cap > 0 && taux > 0 ? cap * (Math.pow(1 + taux, 1/12) - 1) : 0;
                const renteSolMois = perpRente(finalSolution, sim.rdt);
                const renteSolAn   = renteSolMois * 12;
                const renteLivMois = perpRente(finalLivret, isPERMode ? sim.rdt : inputs.livretTaux);
                const renteLivAn   = renteLivMois * 12;
                const renteGainMois = renteSolMois - renteLivMois;
                const renteGainPct = renteLivMois > 0 ? renteGainMois / renteLivMois : null;

                // 3) Succession (transmission nette)
                const succSol = sim.fisc?.direct ?? 0;
                const succLiv = sim.livretFisc?.net ?? 0;
                const succGain = succSol - succLiv;
                const succGainPct = succLiv > 0 ? succGain / succLiv : null;

                return (
                  <>
                    {isPERMode ? (
                      <PERCard
                        title="Capital à terme"
                        subtitle="PER + IR vs PER Seul"
                        solLabel="PER + IR"
                        livLabel="PER Seul"
                        solVal={capSol}
                        livVal={capLiv}
                        gainVal={capGain}
                        gainPct={capGainPct}
                        fmt={fmtEURc}
                        gainLabel="Bonus réintégration"
                        gainSub="capital supplémentaire à terme"
                      />
                    ) : (
                      <ComparisonCard
                        title={`${produitNomComplet} VS Livret · Capital`}
                        valSolution={capSol}
                        valLivret={capLiv}
                        gain={capGain}
                        gainPct={capGainPct}
                        valFmt={fmtEURc}
                        sub="à terme"
                      />
                    )}
                    {/* Rente comparison — masquée pour Capi (sans objet) ET pour PER
                        (fiscalité dépend du RFR du foyer, non chiffrable simplement) */}
                    {inputs.produit !== "capi" && !isPER && (
                      <ComparisonCard
                        title={`${produitNomComplet} VS Livret · Rente brute /mois`}
                        valSolution={renteSolMois}
                        valLivret={renteLivMois}
                        gain={renteGainMois}
                        gainPct={renteGainPct}
                        valFmt={fmtEUR}
                        sub={`${fmtEUR(renteSolAn)}/an vs ${fmtEUR(renteLivAn)}/an`}
                      />
                    )}
                    {inputs.produit !== "capi" && !isPER && (
                      <ComparisonCard
                        title={`${produitNomComplet} VS Livret · Transmission`}
                        valSolution={succSol}
                        valLivret={succLiv}
                        gain={succGain}
                        gainPct={succGainPct}
                        valFmt={fmtEURc}
                        sub={`${inputs.nbBeneficiaires} bénéf.`}
                      />
                    )}
                    {/* Pour PER : carte dédiée Rente brute premium */}
                    {isPER && sim.perReinvest && (
                      <PERCard
                        title="Rente brute à vie /mois"
                        subtitle="PER + IR vs PER Seul"
                        solLabel="PER + IR"
                        livLabel="PER Seul"
                        solVal={renteLivMois}
                        livVal={renteSolMois}
                        gainVal={renteLivMois - renteSolMois}
                        gainPct={renteSolMois > 0 ? (renteLivMois - renteSolMois) / renteSolMois : null}
                        fmt={fmtEUR}
                        gainLabel="Gain rente mensuelle"
                        gainSub={`${fmtEUR(renteLivMois*12)}/an vs ${fmtEUR(renteSolMois*12)}/an`}
                        suffix="/mois"
                      />
                    )}
                  </>
                );
              })()}
            </div>

            {/* CENTER — Chart */}
            <div className="col-span-12 md:col-span-6">
              <div className="bg-white border border-stone-200 rounded-2xl p-5 shadow-sm h-full flex flex-col">
                <div className="flex items-center justify-between flex-wrap gap-2 mb-4">
                  <div className="text-[12px] uppercase tracking-widest font-extrabold text-stone-900">Évolution comparée du capital</div>
                  <div className="flex items-center gap-3 text-[11px] flex-wrap">
                    <span className="flex items-center gap-1.5">
                      <span className="w-4 border-t border-dashed" style={{borderColor:'rgba(5,150,105,0.7)', borderTopWidth:2}}></span>
                      <span className="font-medium text-stone-500">Optimiste</span>
                    </span>
                    <span className="flex items-center gap-1.5">
                      <span className="w-4 h-1 rounded" style={{background:'#047857'}}></span>
                      <span className="font-bold text-stone-800">Médian (réf.)</span>
                    </span>
                    <span className="flex items-center gap-1.5">
                      <span className="w-4 border-t border-dashed" style={{borderColor:'rgba(180,83,9,0.7)', borderTopWidth:2}}></span>
                      <span className="font-medium text-stone-500">Pessimiste</span>
                    </span>
                    {scenarioSeries.map((s,i) => (
                      <span key={i} className="flex items-center gap-1.5"><span className="w-3 h-0.5 rounded" style={{background: s.color}}></span><span className="font-semibold text-stone-700 truncate max-w-[80px]">{s.nom}</span></span>
                    ))}
                    <span className="flex items-center gap-1.5"><span className="w-3 border-t border-dashed" style={{borderColor: isPER_Step5 ? '#0d9488' : '#a8a29e', borderTopWidth:2}}></span><span className={`font-semibold ${isPER_Step5 ? 'text-teal-700' : 'text-stone-500'}`}>{livretNom}</span></span>
                  </div>
                </div>
                <div style={{ height: '380px' }} className="flex-1">
                  <canvas ref={chartRef}></canvas>
                </div>
                {/* Note de bas de graphique — explique l'asterisque "AN 8" pour AV uniquement */}
                {inputs.produit !== "per" && inputs.produit !== "capi" && N >= 8 && (
                  <div className="mt-3 pt-3 border-t border-stone-100 text-[10px] text-stone-500 leading-snug">
                    <span className="font-bold text-stone-700">* AN 8 · Régime fiscal favorable :</span> en Assurance-Vie, à partir de la 8ᵉ année, les rachats bénéficient d'un abattement annuel de <span className="num font-semibold">4 600 €</span> (<span className="num font-semibold">9 200 €</span> pour un couple) sur les plus-values, puis un PFU de <span className="num font-semibold">7,5 %</span> au lieu de 12,8 % sur la fraction inférieure à 150 000 € de versements (+ prélèvements sociaux 17,2 %).
                  </div>
                )}
              </div>
            </div>

            {/* RIGHT — visuels adaptés au produit (donut transmission/réduction, compteur rente, allocation) */}
            <div className="col-span-12 md:col-span-3 space-y-3">
              {/* Carte 1 — Avantage fiscal selon produit (donut) */}
              {isPER ? (() => {
                // Donut Réduction d'impôt : part de l'épargne "récupérée" via fisc
                const ratio = totalVerseBrut > 0 ? Math.min(1, reductionImpotCumulee / totalVerseBrut) : 0;
                const r = 38, c = 2 * Math.PI * r;
                const dash = ratio * c;
                return (
                  <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-sm">
                    <div className="text-[10px] uppercase tracking-widest font-bold text-emerald-700 mb-2 text-center">Réduction d'impôt PER</div>
                    <div className="relative flex items-center justify-center" style={{height: '100px'}}>
                      <svg width="100" height="100" viewBox="0 0 100 100" style={{transform:'rotate(-90deg)'}}>
                        <circle cx="50" cy="50" r={r} fill="none" stroke="#f5f5f4" strokeWidth="9"/>
                        <circle cx="50" cy="50" r={r} fill="none" stroke="#047857" strokeWidth="9" strokeLinecap="round"
                          strokeDasharray={`${dash} ${c}`} style={{transition:'stroke-dasharray 0.6s ease-out'}} />
                      </svg>
                      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <div className="num text-[16px] font-extrabold text-emerald-700 leading-none tracking-tightest">{(ratio*100).toFixed(0)}%</div>
                        <div className="text-[8px] text-stone-500 mt-0.5">des versements</div>
                      </div>
                    </div>
                    <div className="mt-2 text-center">
                      <div className="num text-[20px] font-bold text-emerald-700 leading-none">{fmtEUR(reductionImpotCumulee)}</div>
                      <div className="text-[10px] text-stone-500 mt-1">Versements déductibles · TMI {(inputs.tauxIR*100).toFixed(0)}%</div>
                    </div>
                  </div>
                );
              })() : inputs.produit === "capi" ? (() => {
                // Donut Net après IS / Capital brut
                const netCapi = sim.fiscCapi?.netCapital || finalSolution;
                const ratio = finalSolution > 0 ? netCapi / finalSolution : 1;
                const r = 38, c = 2 * Math.PI * r;
                const dash = ratio * c;
                return (
                  <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-sm">
                    <div className="text-[10px] uppercase tracking-widest font-bold text-amber-700 mb-2 text-center">Net après IS</div>
                    <div className="relative flex items-center justify-center" style={{height: '100px'}}>
                      <svg width="100" height="100" viewBox="0 0 100 100" style={{transform:'rotate(-90deg)'}}>
                        <circle cx="50" cy="50" r={r} fill="none" stroke="#f5f5f4" strokeWidth="9"/>
                        <circle cx="50" cy="50" r={r} fill="none" stroke="#b45309" strokeWidth="9" strokeLinecap="round"
                          strokeDasharray={`${dash} ${c}`} style={{transition:'stroke-dasharray 0.6s ease-out'}} />
                      </svg>
                      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <div className="num text-[16px] font-extrabold text-amber-700 leading-none tracking-tightest">{(ratio*100).toFixed(0)}%</div>
                        <div className="text-[8px] text-stone-500 mt-0.5">conservé</div>
                      </div>
                    </div>
                    <div className="mt-2 text-center">
                      <div className="num text-[20px] font-bold text-amber-700 leading-none">{fmtEURc(netCapi)}</div>
                      <div className="text-[10px] text-stone-500 mt-1">IS {(inputs.tauxIS*100).toFixed(0)}% sur plus-values</div>
                    </div>
                  </div>
                );
              })() : (() => {
                // Donut Transmission AV — part exonérée vs taxée
                const ratioExo = sim.fisc.direct > 0 && sim.proj.capitalFin > 0 ? sim.fisc.direct / sim.proj.capitalFin : 1;
                const r = 38, c = 2 * Math.PI * r;
                const dash = ratioExo * c;
                return (
                  <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-sm">
                    <div className="text-[10px] uppercase tracking-widest font-bold text-emerald-700 mb-2 text-center">Transmission nette</div>
                    <div className="relative flex items-center justify-center" style={{height: '100px'}}>
                      <svg width="100" height="100" viewBox="0 0 100 100" style={{transform:'rotate(-90deg)'}}>
                        <circle cx="50" cy="50" r={r} fill="none" stroke="#f5f5f4" strokeWidth="9"/>
                        <circle cx="50" cy="50" r={r} fill="none" stroke="#047857" strokeWidth="9" strokeLinecap="round"
                          strokeDasharray={`${dash} ${c}`} style={{transition:'stroke-dasharray 0.6s ease-out'}} />
                      </svg>
                      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <div className="num text-[16px] font-extrabold text-emerald-700 leading-none tracking-tightest">{(ratioExo*100).toFixed(0)}%</div>
                        <div className="text-[8px] text-stone-500 mt-0.5">aux bénéf.</div>
                      </div>
                    </div>
                    <div className="mt-2 text-center">
                      <div className="num text-[20px] font-bold text-emerald-700 leading-none">{fmtEURc(sim.fisc.direct)}</div>
                      <div className="text-[10px] text-stone-500 mt-1">{inputs.nbBeneficiaires} bénéf. · abatt. {fmtEUR(ABATT_AV_70)}/pers.</div>
                    </div>
                  </div>
                );
              })()}

              {/* Carte 2 — Compteur Rente (masqué pour Capi PM ET pour PER : pas de calcul rente nette) */}
              {inputs.produit !== "capi" && !isPER && (() => {
                const renteMois = sim.proj.capitalFin > 0 && sim.rdt > 0
                  ? sim.proj.capitalFin * (Math.pow(1 + sim.rdt, 1/12) - 1)
                  : 0;
                const renteAn = renteMois * 12;
                const rente20 = renteAn * 20;
                // AV : rente nette précise (calcul forfaitaire classique)
                return (
                  <div className="bg-gradient-to-br from-emerald-50 to-white border border-emerald-200 rounded-2xl p-4 shadow-sm">
                    <div className="text-[10px] uppercase tracking-widest font-bold text-emerald-700 mb-2 text-center">Rente brute à vie</div>
                    <div className="num text-[28px] font-extrabold text-emerald-700 leading-none tracking-tightest text-center">{fmtEUR(renteMois)}</div>
                    <div className="text-[10px] text-stone-500 mt-0.5 text-center">/mois · capital préservé</div>
                    <div className="mt-3 pt-2 border-t border-emerald-100 grid grid-cols-2 gap-2 text-[10px] text-center">
                      <div>
                        <div className="text-stone-400 uppercase tracking-wider">Annuelle</div>
                        <div className="num font-bold text-stone-900">{fmtEUR(renteAn)}</div>
                      </div>
                      <div>
                        <div className="text-stone-400 uppercase tracking-wider">Sur 20 ans</div>
                        <div className="num font-bold text-stone-900">{fmtEUR(rente20)}</div>
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* Carte 3 — Allocation donut visuel (titre centré comme les blocs au-dessus) */}
              <div className="bg-white border border-stone-200 rounded-2xl p-4 shadow-sm">
                <div className="text-[10px] uppercase tracking-widest font-bold text-stone-500 mb-2 text-center">Allocation</div>
                {(() => {
                  // Mini donut allocation
                  const r = 32, c = 2 * Math.PI * r;
                  let cumulOffset = 0;
                  return (
                    <div className="flex items-center gap-3">
                      <svg width="80" height="80" viewBox="0 0 80 80" className="-rotate-90 flex-shrink-0">
                        <circle cx="40" cy="40" r={r} fill="none" stroke="#f5f5f4" strokeWidth="10"/>
                        {allocBar.map((s, idx) => {
                          const seg = s.poids * c;
                          const offset = -cumulOffset;
                          cumulOffset += seg;
                          return (
                            <circle key={s.id} cx="40" cy="40" r={r} fill="none" stroke={SUPPORT_META[s.type].color} strokeWidth="10"
                              strokeDasharray={`${seg} ${c}`} strokeDashoffset={offset} />
                          );
                        })}
                      </svg>
                      <div className="flex-1 min-w-0 space-y-1">
                        {allocBar.map(s => (
                          <div key={s.id} className="flex items-center justify-between text-[10px]">
                            <span className="flex items-center gap-1 min-w-0">
                              <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background: SUPPORT_META[s.type].color}}></span>
                              <span className="text-stone-700 truncate">{SUPPORT_META[s.type].label}</span>
                            </span>
                            <span className="num font-bold text-stone-900 flex-shrink-0">{(s.poids*100).toFixed(0)}%</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}
                <div className="mt-2 pt-2 border-t border-stone-100 flex items-center justify-between text-[10px]">

    // ============================================================
    // CLIENT PRESENTATION PRINT — A4 portrait, design directeur de création
    // ============================================================
    function ClientPresentationPrint({ inputs, sim, scenarios, clientLabel, totalVerseBrut, onClose }) {
      const isPER = inputs.produit === "per";
      const isCapi = inputs.produit === "capi";
      const livretNom = isPER ? "PER + Réintégration" : isCapi ? "Compte à terme" : (LIVRETS.find(p=>p.id===inputs.livretId)?.nom || "Livret");
      const N = Math.round(inputs.dureeAnnees);
      // Ref pour le canvas Chart.js (page 2 print)
      const printChartRef = useRef(null);
      const printChartInst = useRef(null);
      const pessData = useMemo(() => projectionSeries(inputs, sim.rdtPess), [inputs, sim.rdtPess]);
      const medData  = useMemo(() => projectionSeries(inputs, sim.rdtMed),  [inputs, sim.rdtMed]);
      const optData  = useMemo(() => projectionSeries(inputs, sim.rdtOpt),  [inputs, sim.rdtOpt]);
      // Pour PER : la courbe « livret » = PER + Réintégration (médian + réductions capitalisées)
      const livretData = useMemo(() => {
        if (isPER) {
          const aux = perReinvestSeries(inputs, sim.rdtMed, inputs.tauxIR ?? 0.30);
          return medData.map((v, i) => v + (aux[i] || 0));
        }
        return livretSeries(inputs);
      }, [inputs, sim.rdtMed, medData, isPER]);
      const finalSolution = medData[medData.length - 1];
      const finalLivret = livretData[livretData.length - 1];
      const finalPess = pessData[pessData.length - 1];
      const finalOpt  = optData[optData.length - 1];
      // En PER : finalLivret > finalSolution (par construction), gain = finalLivret - finalSolution
      const gainEUR = isPER ? (finalLivret - finalSolution) : (finalSolution - finalLivret);
      const gainPCT = isPER
        ? (finalSolution > 0 ? gainEUR / finalSolution : 0)
        : (finalLivret > 0 ? gainEUR / finalLivret : 0);
      const r50 = (n) => Math.round(n / 50) * 50;
      const renteSolMois = r50(sim.rente.nette / 12);
      const renteLivMois = r50((sim.livretRenteBrute || 0) / 12);
      const succSol = sim.fisc?.direct ?? 0;
      const succLiv = sim.livretFisc?.net ?? 0;

      const produitNomComplet = isPER ? "PER" : isCapi ? "Capi PM" : "Assurance-Vie";
      const reductionImpotCumulee = isPER ? (sim.fiscPER?.ecoFiscEntree || 0) : 0;
      const reductionImpotAnnuelle = isPER ? (inputs.versementInitial / Math.max(1, inputs.dureeAnnees) + inputs.versementMensuel * 12) * inputs.tauxIR : 0;

      const today = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });

      // === CHART.JS (page 2 print) — réplique du graphique de Step5Presentation ===
      // Dessine sur le canvas printChartRef. Pas d'animation, pas de tooltip (print).
      useEffect(() => {
        if (!printChartRef.current || typeof Chart === 'undefined') return;
        if (printChartInst.current) printChartInst.current.destroy();
        const ctx = printChartRef.current.getContext('2d');
        const labels = Array.from({length: N + 1}, (_, i) => i);
        // Gradient fill sous la courbe médiane (solution)
        const gradSol = ctx.createLinearGradient(0, 0, 0, 360);
        gradSol.addColorStop(0, 'rgba(4, 120, 87, 0.20)');
        gradSol.addColorStop(0.7, 'rgba(4, 120, 87, 0.04)');
        gradSol.addColorStop(1, 'rgba(4, 120, 87, 0)');
        // End-labels plugin : étiquette le bout de chaque courbe avec son nom + valeur, anti-chevauchement
        const endLabels = {
          id: 'endLabels',
          afterDatasetsDraw(chart) {
            const { ctx, chartArea } = chart;
            const items = [];
            chart.data.datasets.forEach((dataset, i) => {
              if (dataset._noEndLabel) return;
              const meta = chart.getDatasetMeta(i);
              const lastPoint = meta.data[meta.data.length - 1];
              if (!lastPoint) return;
              const value = dataset.data[dataset.data.length - 1];
              const suffix = dataset._endLabelSuffix || dataset.label || '';
              const label = suffix ? `${fmtEURc(value)} · ${suffix}` : fmtEURc(value);
              const isSoft = !!dataset._endLabelSoft;
              ctx.save(); ctx.font = isSoft ? '600 9px Inter' : '700 11px Inter';
              const tw = ctx.measureText(label).width; ctx.restore();
              const padX = isSoft ? 5 : 7;
              const w = tw + padX * 2;
              const h = isSoft ? 16 : 20;
              const x = lastPoint.x + (isSoft ? 5 : 7);
              const yIdeal = lastPoint.y - h / 2;
              items.push({ label, x, yIdeal, w, h, padX, isSoft, bg: isSoft ? (dataset._endLabelBg || dataset.borderColor) : dataset.borderColor });
            });
            items.sort((a, b) => a.yIdeal - b.yIdeal);
            const margin = 2;
            for (let i = 0; i < items.length; i++) {
              items[i].y = i === 0 ? items[i].yIdeal : Math.max(items[i].yIdeal, items[i - 1].y + items[i - 1].h + margin);
            }
            if (items.length > 0) {
              const lastBottom = items[items.length - 1].y + items[items.length - 1].h;
              const over = lastBottom - chartArea.bottom;
              if (over > 0) {
                for (let i = items.length - 1; i >= 0; i--) {
                  items[i].y -= over;
                  if (i > 0 && items[i].y < items[i - 1].y + items[i - 1].h + margin) {
                    items[i - 1].y -= (items[i - 1].y + items[i - 1].h + margin - items[i].y);
                  }
                }
              }
            }
            items.forEach(it => {
              ctx.save();
              ctx.font = it.isSoft ? '600 9px Inter' : '700 11px Inter';
              ctx.fillStyle = it.bg;
              if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(it.x, it.y, it.w, it.h, it.isSoft ? 8 : 10); ctx.fill(); }
              else { ctx.fillRect(it.x, it.y, it.w, it.h); }
              ctx.fillStyle = '#fff'; ctx.textBaseline = 'middle';
              ctx.fillText(it.label, it.x + it.padX, it.y + it.h / 2);
              ctx.restore();
            });
          },
        };
        const datasets = [
          // Optimiste (borne haute du tunnel)
          { label: 'Optimiste', data: optData, borderColor: 'rgba(5,150,105,0.65)', backgroundColor: 'rgba(16,185,129,0.10)', borderDash: [5,4], borderWidth: 1.75, fill: 2, tension: 0.35, pointRadius: 0, _endLabelSoft: true, _endLabelBg: '#059669' },
          // Médian (courbe principale)
          { label: isPER ? 'PER seul' : 'Médian', data: medData, borderColor: '#047857', backgroundColor: gradSol, borderWidth: 4, fill: true, tension: 0.35, pointRadius: 0 },
          // Pessimiste (borne basse du tunnel + remplissage blanc sous)
          { label: 'Pessimiste', data: pessData, borderColor: 'rgba(180,83,9,0.65)', backgroundColor: '#ffffff', borderDash: [5,4], borderWidth: 1.75, fill: 3, tension: 0.35, pointRadius: 0, _endLabelSoft: true, _endLabelBg: '#b45309' },
          // Référence (livret / PER+Réintégration) — label raccourci pour ne pas être coupé
          { label: isPER ? 'PER + Réinvest.' : livretNom, data: livretData, borderColor: isPER ? '#0d9488' : '#a8a29e', borderDash: isPER ? [4,4] : [6,5], borderWidth: isPER ? 2.5 : 2, fill: false, tension: 0.35, pointRadius: 0, _endLabelBg: isPER ? '#0d9488' : '#78716c' },
        ];
        printChartInst.current = new Chart(ctx, {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            interaction: { mode: 'index', intersect: false },
            /* padding right augmenté pour accueillir les end-labels longs (« PER + RÉINTÉGRATION ») */
            layout: { padding: { right: 195, top: 12, bottom: 8, left: 8 } },
            plugins: { legend: { display: false }, tooltip: { enabled: false } },
            scales: {
              y: { ticks: { callback: v => fmtEURc(v), font: { family: 'Inter', size: 10, weight: '500' }, color: '#78716c', padding: 6 }, grid: { color: '#f5f5f4', drawBorder: false }, border: { display: false } },
              x: { ticks: { callback: function(v, i) { return i % Math.ceil(N/8) === 0 || i === N ? `An ${this.getLabelForValue(v)}` : ''; }, font: { family: 'Inter', size: 10, weight: '500' }, color: '#78716c', padding: 6 }, grid: { display: false }, border: { display: false } },
            },
          },
          plugins: [endLabels],
        });
        return () => printChartInst.current?.destroy();
      }, [pessData, medData, optData, livretData, N, livretNom, isPER]);

      // === Mini-chart SVG (page 2) ===
      // padR augmenté pour accueillir les étiquettes longues comme "PER + RÉINTÉGRATION".
      const chartW = 720, chartH = 240, padL = 38, padR = 160, padT = 16, padB = 30;
      const allValues = [...pessData, ...medData, ...optData, ...livretData];
      const yMin = 0, yMax = Math.max(...allValues) * 1.05;
      const xs = (i) => padL + (i / N) * (chartW - padL - padR);
      const ys = (v) => padT + (1 - (v - yMin) / (yMax - yMin)) * (chartH - padT - padB);
      const buildPath = (data) => data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xs(i).toFixed(1)} ${ys(v).toFixed(1)}`).join(' ');
      const pathPess = buildPath(pessData);
      const pathMed = buildPath(medData);
      const pathOpt = buildPath(optData);
      const pathLiv = buildPath(livretData);
      // Tunnel fill : opt en haut → pess en bas → fermé
      const pathTunnel = optData.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xs(i).toFixed(1)} ${ys(v).toFixed(1)}`).join(' ')
        + ' ' + pessData.slice().reverse().map((v, i) => `L ${xs(N - i).toFixed(1)} ${ys(v).toFixed(1)}`).join(' ') + ' Z';

      // === Calculs comparaison ===
      const Bar = ({ name, value, fmt = fmtEURc, max, isWin, color = "green" }) => (
        <div className="pres-bar-row">
          <span className={`nm ${isWin ? 'win' : ''}`}>{name}</span>

          <span className="vl">{fmt(value)}</span>
        </div>
      );

      const ComparisonBlock = ({ title, valSol, valLiv, fmt = fmtEURc, sub }) => {
        const max = Math.max(valSol, valLiv, 1);
        const gain = valSol - valLiv;
        return (
          <div style={{marginBottom: '10pt'}}>
            <div style={{fontSize:'9pt', textTransform:'uppercase', letterSpacing:'0.16em', fontWeight:700, color:'#0c0a09', marginBottom:'5pt'}}>{title}</div>
            <Bar name={produitNomComplet} value={valSol} fmt={fmt} max={max} isWin color="green"/>
            <Bar name={livretNom} value={valLiv} fmt={fmt} max={max} color="gray"/>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginTop:'3pt', paddingTop:'3pt', borderTop:'1px dashed #e7e5e4'}}>
              <span style={{fontSize:'8pt', textTransform:'uppercase', letterSpacing:'0.14em', color:'#047857', fontWeight:800}}>Victoire {produitNomComplet}</span>
              <span style={{fontSize:'11pt', fontWeight:800, color:'#047857'}}>+{fmt(gain)}</span>
              {sub && <span style={{fontSize:'8pt', color:'#78716c'}}>{sub}</span>}
            </div>
          </div>
        );
      };

      // === Donut allocation ===
      const allocBar = inputs.allocation;

      // === Hero number selon produit (la statistique signature) ===
      const heroNum = isPER ? reductionImpotCumulee : isCapi ? (sim.fiscCapi?.netCapital || finalSolution) : gainEUR;
      const heroEyebrow = isPER ? "Réduction d'impôt cumulée" : isCapi ? "Capital net après IS" : `Avantage vs ${livretNom}`;
      const heroCaption = isPER
        ? `Économie fiscale totale sur ${N} ans, calculée au taux marginal d'imposition de ${(inputs.tauxIR*100).toFixed(0)} %.`
        : isCapi
        ? `Trésorerie d'entreprise après IS sur les plus-values. Optimisation de la fiscalité corporate.`
        : `Capital supplémentaire à terme face au ${livretNom.toLowerCase()}, scénario médian sur ${N} ans.`;

      // === Ligne décorative Figara (trait + étoile compas rouge au centre) — réutilisable ===
      const FigaraRule = ({ style }) => (
        <div className="pres-figara-rule" style={style}>
          <div className="line"></div>

            <circle cx="16" cy="16" r="0.8" fill="#DC2626"/>
          </svg>
          <div className="line"></div>
        </div>
      );

      return (
        <div className="pres-page">

              <span className="pres-brand" style={{display:'inline-flex', alignItems:'center', gap:'8px'}}>

                  <polygon points="16,31 15,17 16,16 17,17" fill="#DC2626"/>
                  <polygon points="1,16 15,15 16,16 15,17" fill="#DC2626"/>
                  <polygon points="16,5 17,15 16,16 15,15" fill="#DC2626" transform="rotate(45 16 16)"/>
                  <polygon points="16,5 17,15 16,16 15,15" fill="#DC2626" transform="rotate(135 16 16)"/>
                  <polygon points="16,5 17,15 16,16 15,15" fill="#DC2626" transform="rotate(225 16 16)"/>

                  <circle cx="16" cy="16" r="0.8" fill="#DC2626"/>
                </svg>
                Figara

          <div className="sheets-stack">

              <div className="pres-cover-photo-band">
                <img

                    let y = ys(it.v);

                      if (y - prevY < 18) y = prevY + 18;
                    }
                    it.__y = y;
                    // Boîtes agrandies pour accueillir « PER + RÉINTÉGRATION » + lisibilité accrue des montants

                        <text x={xs(N)+9} y={y + (it.bold ? 4 : 3.5)} fontSize={it.bold ? 10 : 9} fill="#f7f3ed" fontWeight={it.bold ? 700 : 600} fontFamily="JetBrains Mono" letterSpacing={it.bold ? "0.3" : "0.5"}>{fmtEURc(it.v)} · {it.lbl}</text>
                      </g>
                    );
                  })}
                </svg>
                </div>
              </div>

              {/* 3 modules dashboard : Multiplicateur · Allocation · (Rente AV/PER ou Net après IS Capi) — espacement homogène */}
              <div className="pres-modules-row" style={{gridTemplateColumns:'1fr 1.1fr 1fr', marginTop:'4mm', marginBottom:'2mm'}}>
                {/* DONUT Multiplicateur — cercle agrandi + ligne Figara + chiffres plus gros */}
                {(() => {

                  if (isPER) {

                            </svg>
                          </div>
                          {/* PER + IR */}
                          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'1mm'}}>
                            <div style={{fontSize:'6.5pt', textTransform:'uppercase', letterSpacing:'0.10em', fontWeight:700, color:'#047857', textAlign:'center', lineHeight:1}}>PER + IR</div>

                              <g transform="rotate(-90 50 50)">
                                <circle cx="50" cy="50" r={r} fill="none" stroke="#f5f5f4" strokeWidth="9"/>
                                <circle cx="50" cy="50" r={r} fill="none" stroke="#047857" strokeWidth="9" strokeLinecap="round" strokeDasharray={`${(pct2/100)*c} ${c}`}/>

                              <text x="50" y="50" textAnchor="middle" dominantBaseline="central"

                  // AV / Capi : donut unique
                  const multiple = multipleSeul;
                  const pct = Math.min(100, Math.max(0, (multiple - 1) / 2 * 100));

                  const dash = (pct / 100) * c;
                  return (
                    <div className="pres-donut-card">
                      <div className="dn-tag">Multiplicateur</div>
                      <FigaraRule style={{margin:'0 0 4mm'}}/>
                      <div style={{display:'flex', justifyContent:'center', margin:'2mm 0 2mm'}}>
                        <svg width="124" height="124" viewBox="0 0 124 124">
                          <g transform="rotate(-90 62 62)">
                            <circle cx="62" cy="62" r={r} fill="none" stroke="#f5f5f4" strokeWidth="10"/>
                            <circle cx="62" cy="62" r={r} fill="none" stroke="#047857" strokeWidth="10" strokeLinecap="round" strokeDasharray={`${dash} ${c}`}/>
                          </g>
                          <text x="62" y="58" textAnchor="middle" dominantBaseline="central"
                            fontFamily="Fraunces, 'Playfair Display', serif" fontSize="22" fontWeight="800" fill="#047857"
                            letterSpacing="-0.5">×{multiple.toFixed(2)}</text>
                          <text x="62" y="76" textAnchor="middle" dominantBaseline="central"
                            fontFamily="Inter, sans-serif" fontSize="8" fontWeight="600" fill="#78716c"
                            letterSpacing="0.3">capital versé</text>
                        </svg>
                      </div>
                      <div className="dn-foot">
                        Pour <strong style={{color:'#0a0908'}}>{fmtEURc(totalVerseBrut)}</strong> versés,<br/>vous récupérez <strong style={{color:'#047857'}}>{fmtEURc(finalSolution)}</strong>.
                      </div>
                    </div>
                  );
                })()}

                {/* DONUT Allocation + rendements */}
                {(() => {
                  const r = 28, c = 2 * Math.PI * r;
                  let cumulOffset = 0;
                  return (
                    <div className="pres-alloc-card">
                      <div className="al-tag">Allocation des supports</div>
                      <FigaraRule style={{margin:'0 0 4mm'}}/>
                      <div className="al-body">
                        <svg width="72" height="72" viewBox="0 0 72 72" style={{transform:'rotate(-90deg)'}}>
                          <circle cx="36" cy="36" r={r} fill="none" stroke="#f5f5f4" strokeWidth="9"/>
                          {allocBar.map((s, idx) => {
                            const seg = s.poids * c;
                            const offset = -cumulOffset;
                            cumulOffset += seg;
                            return <circle key={s.id} cx="36" cy="36" r={r} fill="none" stroke={SUPPORT_META[s.type].color} strokeWidth="9" strokeDasharray={`${seg} ${c}`} strokeDashoffset={offset} strokeLinecap="butt"/>;
                          })}
                        </svg>
                        <div className="al-supports">
                          {allocBar.map(s => (

                              <span className="pc">{(s.poids*100).toFixed(0)}<span className="unit">%</span></span>
                            </div>

                        </div>
                      </div>
                      {/* Bandeau Hypothèses de rendement avec SRI mis en valeur sur la même ligne */}
                      <div className="al-rdt">
                        <div className="al-rdt-tag" style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:'2mm'}}>

                            <span style={{fontSize:'6pt', color:'#78716c'}}>/7</span>
                          </span>
                        </div>
                        <div className="al-rdt-cells">
                          <div className="al-rdt-cell pess">
                            <div className="lab">Pess.</div>
                            <div className="val">{fmtPCT(sim.rdtPess).replace(' %','')}<span style={{fontSize:'7pt'}}>%</span></div>
                          </div>
                          <div className="al-rdt-cell med">

                            <div className="val">{fmtPCT(sim.rdtMed).replace(' %','')}<span style={{fontSize:'7pt'}}>%</span></div>

                          <div className="al-rdt-cell opt">

                            <div className="val">{fmtPCT(sim.rdtOpt).replace(' %','')}<span style={{fontSize:'7pt'}}>%</span></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* RENTE compteur (caché pour Capi PM — pas pertinent) */}
                {!isCapi ? (() => {
                  // Rente perpétuelle = capital × taux mensuel équivalent
                  const tm = sim.rdt > 0 ? (Math.pow(1 + sim.rdt, 1/12) - 1) : 0;
                  const renteSeulMois = finalSolution > 0 ? finalSolution * tm : 0;
                  const renteReinvMois = isPER && finalLivret > 0 ? finalLivret * tm : 0;
                  if (isPER) {
                    return (
                      <div className="pres-rente-card" style={{display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center'}}>
                        <div className="rt-tag" style={{textAlign:'center'}}>Rente à vie</div>
                        <FigaraRule style={{width:'100%', margin:'0 0 2mm'}}/>
                        {/* Deux blocs verticaux compacts — valeurs centrées */}
                        <div style={{display:'flex', flexDirection:'column', gap:'1.5mm', width:'100%', marginTop:'1mm'}}>
                          <div style={{padding:'1.5mm 2.5mm', border:'1px solid rgba(120,113,108,0.30)', borderRadius:'1.5mm', background:'rgba(245,245,244,0.45)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'2mm'}}>
                            <div style={{fontSize:'6.5pt', textTransform:'uppercase', letterSpacing:'0.10em', fontWeight:700, color:'#57534e'}}>PER seul</div>
                            <div style={{fontFamily:"'Fraunces','Playfair Display',serif", fontSize:'13pt', fontWeight:800, color:'#0a0908', letterSpacing:'-0.02em', lineHeight:1}}>{fmtEUR(renteSeulMois)}<span style={{fontSize:'6.5pt', color:'#78716c', marginLeft:'1mm', fontWeight:500}}>/mois</span></div>
                          </div>
                          <div style={{padding:'1.5mm 2.5mm', border:'2px solid #047857', borderRadius:'1.5mm', background:'linear-gradient(180deg, rgba(236,253,245,0.65) 0%, #ffffff 100%)', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'2mm'}}>
                            <div style={{fontSize:'6.5pt', textTransform:'uppercase', letterSpacing:'0.10em', fontWeight:700, color:'#047857'}}>PER + IR</div>
                            <div style={{fontFamily:"'Fraunces','Playfair Display',serif", fontSize:'13pt', fontWeight:800, color:'#047857', letterSpacing:'-0.02em', lineHeight:1}}>{fmtEUR(renteReinvMois)}<span style={{fontSize:'6.5pt', color:'#047857', marginLeft:'1mm', fontWeight:500}}>/mois</span></div>
                          </div>
                        </div>
                        <div style={{marginTop:'2mm', paddingTop:'1.5mm', width:'100%', fontSize:'6.5pt', color:'#57534e', textAlign:'center', fontStyle:'italic', lineHeight:1.4, borderTop:'1px solid rgba(167,243,208,0.6)'}}>
                          Annuel : {fmtEUR(renteSeulMois*12)} vs <strong style={{color:'#047857', fontStyle:'normal'}}>{fmtEUR(renteReinvMois*12)}</strong> · Capital préservé
                        </div>
                      </div>
                    );
                  }
                  const renteMois = renteSeulMois;
                  const renteAn = renteMois * 12;
                  const rente20 = renteAn * 20;
                  return (
                    <div className="pres-rente-card" style={{display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center'}}>
                      <div className="rt-tag">Rente brute à vie</div>
                      <FigaraRule style={{width:'100%', margin:'0 0 4mm'}}/>
                      <div style={{marginTop:'5mm', textAlign:'center'}}>
                        <span className="rt-num">{fmtEUR(renteMois)}</span>

                          <div className="v">{fmtEUR(renteAn)}</div>
                        </div>
                        <div>
                          <div className="k">Sur 20 ans</div>
                          <div className="v">{fmtEURc(rente20)}</div>
                        </div>
                      </div>
                    </div>
                  );
                })() : (
                  /* Pour Capi PM : Donut "Net après IS" à la place de la rente — text dans SVG */
                  (() => {
                    const netCapi = sim.fiscCapi?.netCapital || finalSolution;
                    const ratio = finalSolution > 0 ? netCapi / finalSolution : 1;
                    const r = 32, c = 2 * Math.PI * r;
                    const dash = ratio * c;
                    return (
                      <div className="pres-donut-card">
                        <div className="dn-tag" style={{color:'#b45309'}}>Net après IS</div>
