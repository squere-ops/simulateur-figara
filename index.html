    function Step4Resultats({ inputs, setInputs, sim, scenarioLvl, setScenarioLvl, scenarios, openBuilder, removeScen, loadScen, upd, autreAV, setAutreAV }) {
      // Pour Capi PM (personne morale), le comparateur est un "Compte à terme" entreprise, pas un livret particulier
      const isCapiProduit = inputs.produit === "capi";
      const refLabel = isCapiProduit ? "Compte à terme" : "Livret";
      const livretNom = isCapiProduit ? "Compte à terme" : (LIVRETS.find(p=>p.id===inputs.livretId)?.nom || "Livret");
      const totalVerseBrut = inputs.versementInitial + inputs.versementMensuel * 12 * inputs.dureeAnnees + totalComplementaires(inputs);

      // Mesure dynamique de la hauteur du bandeau "Hypothèse principale" pour positionner exactement le bandeau "Détail" juste en dessous (sans chevauchement, sans gap)
      const hypotheseRef = useRef(null);
      const [hypotheseH, setHypotheseH] = useState(60);
      useLayoutEffect(() => {
        if (!hypotheseRef.current) return;
        const update = () => {
          if (hypotheseRef.current) setHypotheseH(hypotheseRef.current.offsetHeight);
        };
        update();
        const ro = new ResizeObserver(update);
        ro.observe(hypotheseRef.current);
        window.addEventListener('resize', update);
        return () => { ro.disconnect(); window.removeEventListener('resize', update); };
      }, [scenarios.length, inputs.produit]);

      // Build columns
      // Column 1: LIVRET (figé) — uses current inputs (livretTaux, durée, versements, nbBeneficiaires)
      //  ↳ Pour PER : remplacé par "PER + Réintégration des réductions d'impôt"
      // Column 2: SOLUTION ACTUELLE — current inputs at current scenario level
      // Columns 3+: SCÉNARIOS — each scenario's inputs run at current scenario level
      const isPERProduit = inputs.produit === "per";
      const livretCol = useMemo(() => {
        const ligne = inputs.successionLine ?? 'directe';
        const txIndirect = inputs.successionTauxIndirect ?? TX_SUCC_INDIRECT;
        const txDirect = inputs.successionTauxDirect ?? 0.30;
        const livretProj = projLivret(inputs);
        const livretFisc = fiscaliteLivret(livretProj.capitalFin, inputs.nbBeneficiaires, ligne, txIndirect, txDirect);
        const renteBruteAn = livretProj.capitalFin * inputs.livretTaux;
        // Description abattement selon ligne
        const abattDetail = ligne === 'directe'
          ? `Taux forfaitaire ${((txDirect)*100).toFixed(0)} % sur capital brut (ligne directe)`
          : `Aucun abattement (ligne indirecte — ${((txIndirect)*100).toFixed(0)} %)`;
        return {
          type: "livret",
          name: livretNom,
          subtitle: `Taux ${fmtPCT(inputs.livretTaux)}`,
          capital: livretProj.capitalFin,
          versements: livretProj.totVerse,
          plusValue: livretProj.plusValue,
          fraisSouscription: 0,
          fraisDe: 0,
          rdt: inputs.livretTaux,
          // Succession
          capitalDeces: livretProj.capitalFin,
          abattement: livretFisc.abattTotal,
          abattDetail,
          imposable: livretFisc.imposableTotal,
          taxe: livretFisc.droits,
          taxeLabel: "Droits de succession",
          netTransmis: livretFisc.net,
          // Rente
          renteBrute: renteBruteAn,
          renteImpot: 0,
          renteImpotIR: 0,
          renteImpotPS: 0,
          renteAb: 0,
          rentePlus8: false,
          renteNetteAn: renteBruteAn,
          renteNetteMois: renteBruteAn / 12,
          renteRegime: "Exonéré (livret réglementé)",
          // Réduction d'impôt (n/a livret)
          isPER: false,
          reductionImpotAnnuelle: 0,
          reductionImpotAnnee1: 0,
          reductionImpotCumulee: 0,
          tauxIRPct: 0,
          coutReel: livretProj.totVerse,  // pas d'avantage fiscal — coût = versements
        };
      }, [inputs.versementInitial, inputs.versementMensuel, inputs.dureeAnnees, inputs.livretTaux, inputs.nbBeneficiaires, inputs.successionLine, inputs.successionTauxIndirect, inputs.successionTauxDirect, inputs.versementsComplementaires, livretNom]);

      // === Colonne PER + Réintégration des réductions d'impôt ===
      // L'épargnant réinvestit chaque année sa réduction d'impôt dans le PER.
      // Ce réinvestissement génère lui-même une nouvelle réduction (effet levier composé).
      const perReinvestCol = useMemo(() => {
        if (!isPERProduit) return null;
        const ligne = inputs.successionLine ?? 'directe';
        const txIndirect = inputs.successionTauxIndirect ?? TX_SUCC_INDIRECT;
        const txDirect = inputs.successionTauxDirect ?? 0.30;
        const auxCap = sim.perReinvest?.auxCap || 0;
        const totReduc = sim.perReinvest?.totReduc || 0;         // total réductions (y.c. sur réinvest.)
        const totReinvesti = sim.perReinvest?.totReinvesti || 0; // montant total réinvesti dans PER
        const auxPV = Math.max(0, auxCap - totReinvesti);
        const perCap = sim.proj.capitalFin;
        const totalCap = perCap + auxCap;
        // Réduction d'impôt : année 1 (initial + mensuel) vs années suivantes
        // Dans PER+Réintégration, la réduction de l'année précédente est réinvestie,
        // ce qui génère une réduction supplémentaire → on utilise totReduc (compoundé).
        const tmi = inputs.tauxIR || 0;
        const redAnnee1 = (inputs.versementInitial + inputs.versementMensuel * 12) * tmi;
        const redAnnuelleCourante = inputs.versementMensuel * 12 * tmi;
        // === Succession (cas décès) ===
        const fiscSucc = fiscaliteAV(totalCap, sim.proj.totVerseNet + totReinvesti, inputs.nbBeneficiaires, inputs.ageSouscripteur, txIndirect, sim.proj.totVerseBrut + totReinvesti, ligne, txDirect);
        const renteRef = rente(totalCap, sim.proj.totVerseNet + totReinvesti, sim.rdt, inputs.dureeAnnees, inputs.situationFamiliale);
        return {
          type: "perReinvest",
          name: "PER + Réintégration",
          subtitle: `Réductions réinvesties · levier fiscal composé`,
          capital: totalCap,
          // Total physiquement investi dans le PER = contributions directes + réductions réinvesties
          versements: sim.proj.totVerseBrut + totReinvesti,
          // Plus-value réelle = capital total − tout ce qui a été versé (direct + réinvesti)
          plusValue: Math.max(0, totalCap - sim.proj.totVerseBrut - totReinvesti),
          fraisSouscription: sim.proj.fraisSousPay,
          fraisDe: 0,
          rdt: sim.rdt,
          // Succession
          capitalDeces: totalCap,
          abattement: fiscSucc.abattTotal,
          abattDetail: fiscSucc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${inputs.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`,
          imposable: fiscSucc.imposableTotal,
          taxe: fiscSucc.taxe,
          taxeLabel: "Taxe PER+AV (art. 990 I)",
          netTransmis: fiscSucc.direct,
          renteBrute: renteRef.brute,
          renteImpot: renteRef.imp,
          renteImpotIR: renteRef.impIR,
          renteImpotPS: renteRef.impPS,
          renteAb: renteRef.ab,
          rentePlus8: renteRef.plus8,
          renteNetteAn: renteRef.nette,
          renteNetteMois: renteRef.nette / 12,
          renteRegime: renteRef.regime + " (sur PER + réinvest.)",
          // PER reinvest specifics
          isPER: true,
          auxCap,
          totReduc,
          totReinvesti,
          perCap,
          // Réduction d'impôt : l'effet de levier composé génère PLUS de réductions que le PER seul
          reductionImpotAnnee1: redAnnee1,
          reductionImpotAnnuelle: redAnnuelleCourante,
          reductionImpotCumulee: totReduc,    // total réductions (avec levier composé)
          tauxIRPct: tmi,
          // COÛT RÉEL : l'épargnant réinvestit ses réductions → il ne les "garde" pas
          // Son effort net = versements directs bruts (les réductions alimentent le système)
          coutReel: sim.proj.totVerseBrut,
          coutReelLabel: "Versements directs (réductions réinvesties)",
        };
      }, [isPERProduit, sim, inputs.versementInitial, inputs.versementMensuel, inputs.dureeAnnees, inputs.tauxIR, inputs.successionLine, inputs.successionTauxIndirect, inputs.successionTauxDirect, inputs.ageSouscripteur, inputs.nbBeneficiaires, inputs.situationFamiliale]);

      const produitLabel = inputs.produit === "per" ? "PER" : inputs.produit === "capi" ? "Capi PM" : "Ass Vie";
      const solutionCol = useMemo(() => {
        const isPER = inputs.produit === "per";
        const isCapi = inputs.produit === "capi";
        // Détermination de l'abattement et du label de taxe selon le produit
        // Pour la phase DÉCÈS : PER comme AV → 152 500 € par bénéficiaire avant 70 ans (régime art. 990 I).
        // La fiscalité de SORTIE (TMI + PFU) s'applique en cas de VIE, pas au décès.
        let abattement = sim.fisc.abattTotal;
        let abattDetail = sim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${inputs.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`;
        let taxeLabel = "Taxe AV (art. 990 I)";
        let netTransmis = sim.fisc.direct;
        if (isPER) {
          // PER en cas de décès : assimilé à l'AV — abattement 152 500 € par bénéficiaire (avant 70 ans)
          // ou 30 500 € global après 70 ans. On garde sim.fisc.* qui est calculé via fiscaliteAV().
          taxeLabel = "Taxe PER (art. 990 I)";
        } else if (isCapi) {
          abattement = 0;
          abattDetail = `Personne morale — capital brut à terme`;
          taxeLabel = "Impôt sur les sociétés";
          netTransmis = sim.fiscCapi?.netCapital || sim.fisc.direct;
        }
        // Réduction d'impôt PER :
        //   • Année 1 : (versement initial + 12 × mensuel) × TMI — le versement initial est
        //     déductible en totalité l'année de la souscription.
        //   • Années suivantes : 12 × mensuel × TMI (versements récurrents uniquement).
        //   • Cumulée : totVerseBrut × TMI (= ecoFiscEntree de fiscalitePER).
        const tmi = isPER ? inputs.tauxIR : 0;
        const reductionImpotAnnee1    = isPER ? (inputs.versementInitial + inputs.versementMensuel * 12) * tmi : 0;
        const reductionImpotAnnuelle  = isPER ? (inputs.versementMensuel * 12) * tmi : 0;
        const reductionImpotCumulee   = isPER ? (sim.fiscPER?.ecoFiscEntree || 0) : 0;
        // COÛT RÉEL Solution PER : l'épargnant GARDE chaque année sa réduction d'impôt
        // → son effort net = versements − réductions perçues sur la période.
        const coutReel = isPER ? Math.max(0, sim.proj.totVerseBrut - reductionImpotCumulee) : sim.proj.totVerseBrut;
        const coutReelLabel = isPER ? "Versements − réductions d'impôt perçues" : "Versements bruts";
        return ({
          type: "solution",
          isPER,
          isCapi,
          name: isCapi ? "Solution Capi PM" : isPER ? "Solution PER" : `Solution assurance vie${inputs.cabinetNom ? ' · ' + inputs.cabinetNom : ''}`,
          subtitle: `Rdt ${fmtPCT(sim.rdt)} · ${scenarioLvl === "med" ? "médian" : scenarioLvl === "pess" ? "pessimiste" : "optimiste"}`,
          capital: sim.proj.capitalFin,
          versements: sim.proj.totVerseBrut,
          plusValue: Math.max(0, sim.proj.capitalFin - sim.proj.totVerseBrut),
          fraisSouscription: sim.proj.fraisSousPay,
          rdt: sim.rdt,
          capitalDeces: sim.proj.capitalFin,
          abattement,
          abattDetail,
          imposable: sim.fisc.imposableTotal,
          taxe: sim.fisc.taxe,
          taxeLabel,
          netTransmis,
          renteBrute: isPER && sim.fiscPER?.modeSortie === "rente" ? sim.fiscPER.renteBruteAn : sim.rente.brute,
          renteImpot: isPER && sim.fiscPER?.modeSortie === "rente" ? sim.fiscPER.taxeRenteAn : sim.rente.imp,
          renteImpotIR: isPER ? 0 : sim.rente.impIR,
          renteImpotPS: isPER ? 0 : sim.rente.impPS,
          renteAb: isPER ? 0 : sim.rente.ab,
          rentePlus8: isPER ? false : sim.rente.plus8,
          renteNetteAn: isPER && sim.fiscPER?.modeSortie === "rente" ? sim.fiscPER.renteNetteAn : sim.rente.nette,
          renteNetteMois: (isPER && sim.fiscPER?.modeSortie === "rente" ? sim.fiscPER.renteNetteAn : sim.rente.nette) / 12,
          renteRegime: isPER ? "RVTO (PER)" : isCapi ? "Non applicable (PM)" : sim.rente.regime,
          reductionImpotAnnee1,
          reductionImpotAnnuelle,
          reductionImpotCumulee,
          tauxIRPct: tmi,
          coutReel,
          coutReelLabel,
        });
      }, [sim, scenarioLvl, inputs.nbBeneficiaires, inputs.produit, inputs.tauxIR, inputs.tauxIS, inputs.perModeSortie, inputs.versementInitial, inputs.versementMensuel, inputs.dureeAnnees, produitLabel, inputs.cabinetNom]);

      const scenarioCols = useMemo(() => scenarios.map((s, idx) => {
        const sSim = runSimulation(s.inputs, scenarioLvl);
        const sIsPER = s.inputs.produit === "per";
        const sTmi = sIsPER ? (s.inputs.tauxIR || 0) : 0;
        const sRedAnnee1   = sIsPER ? (s.inputs.versementInitial + s.inputs.versementMensuel * 12) * sTmi : 0;
        const sRedAnnuelle = sIsPER ? (s.inputs.versementMensuel * 12) * sTmi : 0;
        const sRedCumulee  = sIsPER ? (sSim.fiscPER?.ecoFiscEntree || 0) : 0;
        return {
          type: "scenario",
          colorIndex: (idx % 4) + 1,
          name: s.nom,
          subtitle: `Rdt ${fmtPCT(sSim.rdt)}`,
          idx,
          inputs: s.inputs,
          isPER: sIsPER,
          capital: sSim.proj.capitalFin,
          versements: sSim.proj.totVerseBrut,
          plusValue: Math.max(0, sSim.proj.capitalFin - sSim.proj.totVerseBrut),
          fraisSouscription: sSim.proj.fraisSousPay,
          rdt: sSim.rdt,
          capitalDeces: sSim.proj.capitalFin,
          abattement: sSim.fisc.abattTotal,
          abattDetail: sSim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${s.inputs.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`,
          imposable: sSim.fisc.imposableTotal,
          taxe: sSim.fisc.taxe,
          taxeLabel: "Taxe AV (art. 990 I)",
          netTransmis: sSim.fisc.direct,
          renteBrute: sSim.rente.brute,
          renteImpot: sSim.rente.imp,
          renteImpotIR: sIsPER ? 0 : sSim.rente.impIR,
          renteImpotPS: sIsPER ? 0 : sSim.rente.impPS,
          renteAb: sIsPER ? 0 : sSim.rente.ab,
          rentePlus8: sIsPER ? false : sSim.rente.plus8,
          renteNetteAn: sSim.rente.nette,
          renteNetteMois: sSim.rente.nette / 12,
          renteRegime: sSim.rente.regime,
          reductionImpotAnnee1: sRedAnnee1,
          reductionImpotAnnuelle: sRedAnnuelle,
          reductionImpotCumulee: sRedCumulee,
          tauxIRPct: sTmi,
          coutReel: sIsPER ? Math.max(0, sSim.proj.totVerseBrut - sRedCumulee) : sSim.proj.totVerseBrut,
          coutReelLabel: sIsPER ? "Versements − réductions d'impôt perçues" : "Versements bruts",
        };
      }), [scenarios, scenarioLvl]);

      // === Colonne « Autre assurance vie » (comparateur concurrent, activable) ===
      // Mêmes versements / durée / bénéficiaires que la solution, mais rendement saisi
      // librement. Fiscalité AV complète (abattements 152 500 € / art. 990 I).
      const [avPop, setAvPop] = useState(false);
      const [livretActive, setLivretActive] = useState(true);
      const autreAVCol = useMemo(() => {
        if (!autreAV.active || isPERProduit || isCapiProduit) return null;
        const aInputs = {
          ...inputs,
          produit: 'av',
          allocation: [{ id: 1, type: 'fondsEuro', poids: 1, rendement: autreAV.rdt, sri: 1 }],
        };
        const aSim = runSimulation(aInputs, scenarioLvl);
        // Rente : régime fiscal selon l'ancienneté du contrat concurrent (≥ 8 ans → PFL 7,5 %)
        const aRente = rente(aSim.proj.capitalFin, aSim.proj.totVerseNet, aSim.rdt, autreAV.plus8ans ? 8 : 0, inputs.situationFamiliale);
        return {
          type: 'autreAV',
          name: 'Assurance vie concurrence',
          subtitle: `Rdt ${fmtPCT(aSim.rdt)}`,
          capital: aSim.proj.capitalFin,
          versements: aSim.proj.totVerseBrut,
          plusValue: Math.max(0, aSim.proj.capitalFin - aSim.proj.totVerseBrut),
          fraisSouscription: aSim.proj.fraisSousPay,
          rdt: aSim.rdt,
          capitalDeces: aSim.proj.capitalFin,
          abattement: aSim.fisc.abattTotal,
          abattDetail: aSim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${inputs.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`,
          imposable: aSim.fisc.imposableTotal,
          taxe: aSim.fisc.taxe,
          taxeLabel: 'Taxe AV (art. 990 I)',
          netTransmis: aSim.fisc.direct,
          renteBrute: aRente.brute,
          renteImpot: aRente.imp,
          renteImpotIR: aRente.impIR,
          renteImpotPS: aRente.impPS,
          renteAb: aRente.ab,
          rentePlus8: aRente.plus8,
          renteNetteAn: aRente.nette,
          renteNetteMois: aRente.nette / 12,
          renteRegime: aRente.regime,
          reductionImpotAnnee1: 0, reductionImpotAnnuelle: 0, reductionImpotCumulee: 0, tauxIRPct: 0,
          coutReel: aSim.proj.totVerseBrut, coutReelLabel: 'Versements bruts',
        };
      }, [autreAV, inputs, scenarioLvl]);
      const removeAutreAV = () => setAutreAV(p => ({ ...p, active: false }));

      // Colonne de référence : pour PER → PER + Réintégration ; sinon → Livret/CAT
      const referenceCol = isPERProduit ? perReinvestCol : livretCol;
      // En PER : la Solution PER seul est placée à GAUCHE, le bonus « PER + Réintégration » à DROITE
      // (logique pédagogique : on part de la situation de référence puis on montre l'amélioration).
      // Dans les autres produits, l'ordre historique reste : référence (livret/CAT) à gauche.
      const autreAVArr = autreAVCol ? [autreAVCol] : [];
      const livretArr = livretActive ? [referenceCol] : [];
      // Comparateur actif pour le tableau benchmark : livret si coché, sinon l'assurance vie concurrence, sinon le livret par défaut.
      const benchRefCol = isPERProduit ? referenceCol : (livretActive ? livretCol : (autreAVCol || livretCol));
      const benchRefLabel = isPERProduit ? "PER seul" : (livretActive ? (isCapiProduit ? "CAT" : "livret") : (autreAVCol ? "ass. vie concurrence" : (isCapiProduit ? "CAT" : "livret")));
      const allCols = isPERProduit
        ? [solutionCol, referenceCol, ...autreAVArr, ...scenarioCols]
        : [...livretArr, ...autreAVArr, solutionCol, ...scenarioCols];

      // Best column for net transmis (winner badge)
      const bestNetTransmis = Math.max(...allCols.map(c => c.netTransmis));
      const bestRente = Math.max(...allCols.map(c => c.renteNetteMois));

      return (
        <div className="max-w-screen-xl mx-auto page-enter">
          <div className="text-center mb-4">
            <div className="text-[10px] tracking-widest font-semibold text-red-600 uppercase mb-1.5">Étape 4 sur 4</div>
            <h1 className="text-xl md:text-2xl font-bold text-stone-900 tracking-tightest">Comparaison des solutions</h1>
            <p className="mt-1.5 text-[13px] text-stone-500">Le {isCapiProduit ? "compte à terme" : "livret"} reste fixé. Ajoutez des scénarios pour comparer plusieurs allocations côte-à-côte.</p>
          </div>

          {/* Bandeau rappel des hypothèses — sticky permanent. Chaque ligne (base + scénarios) a le même format pour faciliter la comparaison */}
          <div ref={hypotheseRef} className="sticky mb-4 -mx-2 px-2 no-print" style={{top: '175px', zIndex: 25, background: '#fafaf9'}}>
            <div style={{paddingTop: '6px', paddingBottom: '6px', background: '#fafaf9'}}>
            <div className="bg-white border border-stone-200 rounded-xl overflow-hidden shadow-lg">
              <div className="h-[2px] bg-gradient-to-r from-red-700 via-red-500 to-red-700"></div>

              {/* Ligne base — Hypothèse principale (Solution Ass Vie) */}
              <div className="px-4 py-2.5 flex items-center gap-4 flex-wrap">
                <div className="flex items-center gap-2 flex-shrink-0 w-44">
                  <span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-red-50 text-red-600 ring-2 ring-red-200 flex-shrink-0">
                    <I.lock/>
                  </span>
                  <div className="min-w-0">
                    <div className="text-[11px] uppercase tracking-widest font-bold text-red-600 truncate">Hypothèse principale</div>
                    <div className="text-[9px] text-stone-500 truncate">Solution {produitLabel}</div>
                  </div>
                </div>
                <div className="flex items-center gap-4 md:gap-5 flex-wrap text-[12px]">
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-stone-500">Initial</span>
                    <span className="num font-bold text-stone-900">{fmtEUR(inputs.versementInitial)}</span>
                  </div>
                  <span className="text-stone-300">·</span>
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-stone-500">Mensuel</span>
                    <span className="num font-bold text-stone-900">{fmtEUR(inputs.versementMensuel)}<span className="text-[10px] text-stone-500">/mois</span></span>
                  </div>
                  <span className="text-stone-300">·</span>
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-stone-500">Durée</span>
                    <span className="num font-bold text-stone-900">{inputs.dureeAnnees} ans</span>
                  </div>
                  <span className="text-stone-300">·</span>
                  <div className="flex items-baseline gap-1.5">
                    <span className="text-stone-500">Hypothèse de rendement</span>
                    <span className="num font-bold text-stone-900">{fmtPCT(sim.rdt)}</span>
                  </div>
                  <span className="text-stone-300">·</span>
                  <div className="flex items-baseline gap-1.5 border-l border-stone-200 pl-4">
                    <span className="text-emerald-700 font-bold">Total versé</span>
                    <span className="num font-extrabold text-emerald-700">{fmtEUR(totalVerseBrut)}</span>
                  </div>
                </div>
              </div>

              {/* Ligne « Autre assurance vie » — comparateur concurrent */}
              {autreAVCol && (
                <div className="border-t border-stone-100 px-4 py-2.5 flex items-center gap-4 flex-wrap">
                  <div className="flex items-center gap-2 flex-shrink-0 w-44">
                    <span className="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-600 ring-2 ring-slate-200 flex-shrink-0">
                      <I.lock/>
                    </span>
                    <div className="min-w-0">
                      <div className="text-[11px] uppercase tracking-widest font-bold text-slate-600 truncate">Assurance vie concurrence</div>
                      <div className="text-[9px] text-stone-500 truncate">Comparateur</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-4 md:gap-5 flex-wrap text-[12px]">
                    <div className="flex items-baseline gap-1.5">
                      <span className="text-stone-500">Initial</span>
                      <span className="num font-bold text-stone-900">{fmtEUR(inputs.versementInitial)}</span>
                    </div>
                    <span className="text-stone-300">·</span>
                    <div className="flex items-baseline gap-1.5">
                      <span className="text-stone-500">Mensuel</span>
                      <span className="num font-bold text-stone-900">{fmtEUR(inputs.versementMensuel)}<span className="text-[10px] text-stone-500">/mois</span></span>
                    </div>
                    <span className="text-stone-300">·</span>
                    <div className="flex items-baseline gap-1.5">
                      <span className="text-stone-500">Durée</span>
                      <span className="num font-bold text-stone-900">{inputs.dureeAnnees} ans</span>
                    </div>
                    <span className="text-stone-300">·</span>
                    <div className="flex items-baseline gap-1.5">
                      <span className="text-stone-500">Hypothèse de rendement</span>
                      <span className="num font-bold text-stone-900">{fmtPCT(autreAVCol.rdt)}</span>
                    </div>
                    <span className="text-stone-300">·</span>
                    <div className="flex items-baseline gap-1.5 border-l border-stone-200 pl-4">
                      <span className="text-emerald-700 font-bold">Total versé</span>
                      <span className="num font-extrabold text-emerald-700">{fmtEUR(totalVerseBrut)}</span>
                    </div>
                    <button onClick={removeAutreAV} title="Retirer la comparaison"

    // ============================================================
    // BUILD COMPARATIF COLS — calcul partagé des colonnes (solution / référence / scénarios)

      const ligne = inputs.successionLine ?? 'directe';
      const txIndirect = inputs.successionTauxIndirect ?? TX_SUCC_INDIRECT;
      const txDirect = inputs.successionTauxDirect ?? 0.30;

      // --- LIVRET / CAT ---

      const livretCol = {
        type: "livret", name: livretNom, subtitle: `Taux ${fmtPCT(inputs.livretTaux)}`,

        imposable: livretFisc.imposableTotal, taxe: livretFisc.droits, taxeLabel: "Droits de succession",

        renteRegime: "Exonéré (livret réglementé)", isPER: false, reductionImpotCumulee: 0, coutReel: livretProj.totVerse,
      };

      // --- PER + RÉINTÉGRATION ---
      let perReinvestCol = null;
      if (isPERProduit) {
        const auxCap = sim.perReinvest?.auxCap || 0;
        const totReduc = sim.perReinvest?.totReduc || 0;
        const totReinvesti = sim.perReinvest?.totReinvesti || 0;
        const totalCap = sim.proj.capitalFin + auxCap;
        const fiscSucc = fiscaliteAV(totalCap, sim.proj.totVerseNet + totReinvesti, inputs.nbBeneficiaires, inputs.ageSouscripteur, txIndirect, sim.proj.totVerseBrut + totReinvesti, ligne, txDirect);
        const renteRef = rente(totalCap, sim.proj.totVerseNet + totReinvesti, sim.rdt, inputs.dureeAnnees, inputs.situationFamiliale);
        perReinvestCol = {
          type: "perReinvest", name: "PER + Réintégration", subtitle: "Réductions réinvesties · levier fiscal composé",

          plusValue: Math.max(0, totalCap - sim.proj.totVerseBrut - totReinvesti), rdt: sim.rdt, capitalDeces: totalCap,
          abattement: fiscSucc.abattTotal,

          renteImpotPS: renteRef.impPS, renteAb: renteRef.ab, rentePlus8: renteRef.plus8,
          renteRegime: renteRef.regime + " (sur PER + réinvest.)", isPER: true,

      // --- SOLUTION ACTUELLE ---
      let s_abattement = sim.fisc.abattTotal;
      let s_abattDetail = sim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${inputs.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`;
      let s_taxeLabel = "Taxe AV (art. 990 I)";

      const s_reductionImpotCumulee = isPERProduit ? (sim.fiscPER?.ecoFiscEntree || 0) : 0;
      const s_coutReel = isPERProduit ? Math.max(0, sim.proj.totVerseBrut - s_reductionImpotCumulee) : sim.proj.totVerseBrut;
      const solutionCol = {
        type: "solution", isPER: isPERProduit, isCapi: isCapiProduit, name: `Solution ${produitLabel}`,

        renteRegime: isPERProduit ? "RVTO (PER)" : isCapiProduit ? "Non applicable (PM)" : sim.rente.regime,
        reductionImpotCumulee: s_reductionImpotCumulee, coutReel: s_coutReel,
      };

      // --- SCÉNARIOS ---
      const scenarioCols = scenarios.map((s, idx) => {
        const sSim = runSimulation(s.inputs, scenarioLvl);
        const sIsPER = s.inputs.produit === "per";
        const sRedCumulee = sIsPER ? (sSim.fiscPER?.ecoFiscEntree || 0) : 0;
        return {
          type: "scenario", name: s.nom, subtitle: `Rdt ${fmtPCT(sSim.rdt)}`, idx, isPER: sIsPER,
          capital: sSim.proj.capitalFin, versements: sSim.proj.totVerseBrut,
          plusValue: Math.max(0, sSim.proj.capitalFin - sSim.proj.totVerseBrut), rdt: sSim.rdt, capitalDeces: sSim.proj.capitalFin,

          renteImpotPS: sIsPER ? 0 : sSim.rente.impPS, renteAb: sIsPER ? 0 : sSim.rente.ab, rentePlus8: sIsPER ? false : sSim.rente.plus8,
          reductionImpotCumulee: sRedCumulee, coutReel: sIsPER ? Math.max(0, sSim.proj.totVerseBrut - sRedCumulee) : sSim.proj.totVerseBrut,
        };
      });

      const referenceCol = isPERProduit ? perReinvestCol : livretCol;
      const allCols = isPERProduit ? [solutionCol, referenceCol, ...scenarioCols] : [referenceCol, solutionCol, ...scenarioCols];
      return { isPERProduit, isCapiProduit, produitLabel, livretNom, refLabel, livretCol, perReinvestCol, solutionCol, scenarioCols, referenceCol, allCols };
    }

    // ============================================================
    // CLIENT WOW SCREEN — Mode présentation client (deck de slides plein écran)
    // Palette claire & chic. Rendu en PORTAL (document.body) pour échapper au
    // contexte d'empilement du simulateur (sinon le header/breadcrumb traverse).
    // ============================================================
    const WOW_GOLD = "#b8924e", WOW_INK = "#1d2735", WOW_TEAL = "#0f766e", WOW_SUB = "#6b7280";
    function ClientWowScreen({ inputs, sim, scenarios, scenarioLvl, onClose, autreAV, prime, setPrime, comparOn, setComparOn }) {
      const [i, setI] = useState(0);
      // Scénario « prime périodique majorée » — état remonté (App) pour être partagé avec le PDF
      // Toggles de la projection — remontés ici pour ne PAS se réinitialiser à chaque re-rendu (ProjSlide est recréé)
      const [showReint, setShowReint] = useState(false);
      const [showLivret, setShowLivret] = useState(true);
      const [showScen, setShowScen] = useState(true);
      const cb = buildComparatifCols(inputs, sim, scenarios, scenarioLvl);
      const { isPERProduit, isCapiProduit, produitLabel, livretNom, livretCol, perReinvestCol, solutionCol, referenceCol } = cb;

      const produitNom = produitLabel === "Ass Vie" ? `Assurance vie${inputs.cabinetNom ? ' · ' + inputs.cabinetNom : ''}` : produitLabel === "Capi PM" ? "Capitalisation" : "PER";
      // Comparateur « Assurance vie client » (autre AV) — remplace le livret si renseigné
      const useAutreAV = !isPERProduit && !isCapiProduit && autreAV && autreAV.active;
      const autreAVColP = useAutreAV ? (() => {
        const aInputs = { ...inputs, produit: 'av', allocation: [{ id: 1, type: 'fondsEuro', poids: 1, rendement: autreAV.rdt, sri: 1 }] };
        const aSim = runSimulation(aInputs, scenarioLvl);
        const aR = rente(aSim.proj.capitalFin, aSim.proj.totVerseNet, aSim.rdt, autreAV.plus8ans ? 8 : 0, inputs.situationFamiliale);
        return {
          capital: aSim.proj.capitalFin, netTransmis: aSim.fisc.direct, rdt: aSim.rdt,
          renteNetteMois: aR.nette / 12, renteNetteAn: aR.nette, versements: aSim.proj.totVerseBrut,
          renteBrute: aR.brute, renteImpotPS: aR.impPS, renteAb: aR.ab, rentePlus8: aR.plus8,
          capitalDeces: aSim.proj.capitalFin, abattement: aSim.fisc.abattTotal, taxe: aSim.fisc.taxe,
          abattDetail: aSim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${inputs.nbBeneficiaires} bénéf.` : 'Abatt. global après 70 ans',
        };
      })() : null;
      // En PER, « PER + réintégration IR » n'est la solution que si l'utilisateur coche le toggle (showReint).
      // Sinon la solution mise en avant = PER seul (cohérent avec la courbe de projection).
      const perReint = isPERProduit && showReint;
      const win = isPERProduit ? (perReint ? perReinvestCol : solutionCol) : solutionCol;
      // Réduction d'impôt PER (cumulée) — pour l'afficher dans la présentation
      const reductionPER = isPERProduit ? ((solutionCol && solutionCol.reductionImpotCumulee) || (win && win.reductionImpotCumulee) || 0) : 0;
      const refCol = isPERProduit ? solutionCol : (useAutreAV ? autreAVColP : livretCol);
      const refNom = isPERProduit ? "PER seul" : (useAutreAV ? "Assurance vie client" : livretNom);
      // Nom de la solution mise en avant
      const winNom = isPERProduit ? (perReint ? "PER + réintégration IR" : "PER") : produitNom;
      // Colonne « prime majorée » — même solution recalculée avec le versement mensuel choisi dans la projection
      const baseMensuelWow = inputs.versementMensuel;
      const primeActive = comparOn && prime > 0 && Math.round(prime) !== Math.round(baseMensuelWow);
      const primeCol = primeActive ? (() => {
        const pInputs = { ...inputs, versementMensuel: prime };
        const pSim = runSimulation(pInputs, scenarioLvl);

      })() : null;
      const primeNom = `Prime ${fmtEUR(prime)}/mois`;
      const basePP = `PP ${fmtEUR(inputs.versementMensuel)}/mois`;   // prime périodique de base
      const primePP = `PP ${fmtEUR(prime)}/mois`;                     // prime périodique majorée
      // La colonne de référence (livret / assurance vie client) n'apparaît sur décès/rente/synthèse
      // QUE si l'utilisateur a coché le comparatif correspondant. En PER, la référence (PER seul) est intrinsèque.
      const showRef = isPERProduit ? perReint : showLivret;
      const gainCapital = win.capital - refCol.capital;
      const gainNet = win.netTransmis - refCol.netTransmis;
      const gainRente = win.renteNetteMois - refCol.renteNetteMois;
      const plusValue = Math.max(0, win.capital - win.versements);
      const compl = (typeof totalComplementaires === "function") ? totalComplementaires(inputs) : 0;
      const totalVerse = inputs.versementInitial + inputs.versementMensuel * 12 * inputs.dureeAnnees + compl;
      const age = inputs.ageSouscripteur;
      const av70 = age < 70;
      const rdtAlloc = rdtPondere(inputs.allocation);
      const sriAlloc = Math.max(1, Math.min(7, Math.round(sriPondere(inputs.allocation))));
      const dateStr = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
      const clientLabel = (() => {
        if (inputs.clientSelected) return `${inputs.clientSelected.nom || ""} ${inputs.clientSelected.prenom || ""}`.trim() || "Votre client";
        if (inputs.clientNom) return `${inputs.clientNom} ${inputs.clientPrenom || ""}`.trim();
        return "Votre client";
      })();
      const kEUR = v => v == null || isNaN(v) ? "—" : (Math.abs(v) >= 1000 ? `${Math.round(v / 1000)} k€` : `${Math.round(v)} €`);

      const S = {};
      try { S.med = projectionSeries(inputs, sim.rdtMed ?? sim.rdt) || []; } catch (e) { S.med = []; }
      try { S.pess = projectionSeries(inputs, sim.rdtPess ?? sim.rdt) || []; } catch (e) { S.pess = []; }
      try { S.opt = projectionSeries(inputs, sim.rdtOpt ?? sim.rdt) || []; } catch (e) { S.opt = []; }
      try { S.livret = isPERProduit ? [] : (useAutreAV ? (projectionSeries(inputs, autreAV.rdt) || []) : (livretSeries(inputs) || [])); } catch (e) { S.livret = []; }
      const lastOf = a => (a && a.length ? a[a.length - 1] : 0);
      const medF = lastOf(S.med) || win.capital, pessF = lastOf(S.pess), optF = lastOf(S.opt), livF = lastOf(S.livret) || refCol.capital;

      const isAV = !isPERProduit && !isCapiProduit;
      // Capi (personne morale / entreprise) = placement pur : pas de transmission (décès) ni de rente viagère.
      const slideDefs = [["cover", "Couverture"], ...(isAV ? [["piliers", "Pourquoi"]] : []), ["projet", "Le projet"], ["alloc", "Allocation"], ["proj", "Projection"], ...(isCapiProduit ? [] : [["succ", "Décès"], ["rente", "Rente"]]), ["synth", "Synthèse"]];
      const titles = slideDefs.map(d => d[1]);
      const N = slideDefs.length;
      const skey = slideDefs[i] ? slideDefs[i][0] : "cover";
      const go = (d) => setI((v) => Math.min(N - 1, Math.max(0, v + d)));
      useEffect(() => {
        const h = (e) => { if (e.key === "Escape") onClose(); else if (e.key === "ArrowRight" || e.key === "PageDown") go(1); else if (e.key === "ArrowLeft" || e.key === "PageUp") go(-1); };
        window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
      }, [onClose, N]);

      const soft = "rounded-2xl ring-1 ring-black/[0.05]";
      const softStyle = { background: "rgba(255,255,255,0.62)", boxShadow: "0 1px 2px rgba(29,39,53,0.04)" };
      const Eyebrow = ({ children }) => <div className="text-[11px] tracking-[0.28em] font-bold uppercase mb-3" style={{ color: WOW_GOLD }}>{children}</div>;
      const H = ({ children, className }) => <h1 className={`font-bold tracking-tightest leading-[1.04] ${className || "text-4xl md:text-5xl"}`} style={{ color: WOW_INK }}>{children}</h1>;
      // Trame unique : liste verticale label (+ sous-texte) → valeur, filets fins.
      const RowList = ({ rows }) => (
        <div className="max-w-2xl">
          {rows.map((r, k) => (
            <div key={k} className="flex items-center justify-between gap-6 py-5" style={{ borderTop: k === 0 ? "none" : (r.sep === "gold" ? `2px solid ${WOW_GOLD}55` : "1px solid rgba(29,39,53,0.1)") }}>
              <div className="flex items-center gap-3.5 min-w-0">
                {r.ic ? <span className="flex-shrink-0" style={{ color: WOW_GOLD }}>{r.ic}</span> : r.dot ? <span className="w-3 h-3 rounded-full flex-shrink-0" style={{ background: r.dot }}></span> : null}
                <div className="min-w-0"><div className="text-[16px] font-medium" style={{ color: WOW_INK }}>{r.l}</div>{r.s && <div className="text-[12.5px] mt-0.5 leading-snug" style={{ color: WOW_SUB }}>{r.s}</div>}</div>
              </div>
              <span className="num font-bold tracking-tightest flex-shrink-0" style={{ color: r.c || WOW_INK, fontSize: r.big ? 34 : 26 }}>{r.v}</span>
            </div>
          ))}
        </div>
      );

      const Donut = ({ size = 150 }) => {
        const R = 54, CX = 70, C = 2 * Math.PI * R; let acc = 0;
        return (
          <svg viewBox="0 0 140 140" style={{ width: size, height: size }}>
            <circle r={R} cx={CX} cy={CX} fill="none" stroke="#eadfce" strokeWidth="13" />
            {inputs.allocation.map((s) => { const len = s.poids * C; const el = <circle key={s.id} r={R} cx={CX} cy={CX} fill="none" stroke={SUPPORT_META[s.type].color} strokeWidth="13" strokeDasharray={`${len} ${C - len}`} strokeDashoffset={-acc} transform="rotate(-90 70 70)" />; acc += len; return el; })}
          </svg>
        );
      };

      const ProjChart = ({ height = 360, series, refLabel, heroLabel, comparLabel, scenLabel, medSub, comparSub }) => {
        const Sx = series || { med: S.med, pess: S.pess, opt: S.opt, ref: S.livret };
        const rLabel = refLabel || refNom;
        const hLabel = heroLabel || "ASSURANCE-VIE";
        const lastOf2 = a => (a && a.length ? a[a.length - 1] : 0);
        const medF2 = lastOf2(Sx.med), pessF2 = lastOf2(Sx.pess), optF2 = lastOf2(Sx.opt), refF2 = lastOf2(Sx.ref), comparF2 = lastOf2(Sx.compar);
        const all = [Sx.med, Sx.pess, Sx.opt, Sx.ref, Sx.compar].filter(a => a && a.length >= 2);
        if (!all.length) return null;
        const n = Math.max(...all.map(a => a.length));
        const maxV = (Math.max(...all.flatMap(a => a)) || 1) * 1.06;
        const W = 820, Hh = height, pl = 56, pr = 250, pt = 30, pb = 34;
        const x = idx => pl + (idx / (n - 1)) * (W - pl - pr);
        const y = v => Hh - pb - (v / maxV) * (Hh - pt - pb);
        const poly = d => d.map((v, idx) => `${x(idx).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
        const area = d => `${x(0)},${Hh - pb} ${poly(d)} ${x(d.length - 1)},${Hh - pb}`;
        const tunnel = (Sx.opt && Sx.opt.length >= 2 && Sx.pess && Sx.pess.length >= 2) ? `${poly(Sx.opt)} ${Sx.pess.map((v, idx) => `${x(Sx.pess.length - 1 - idx).toFixed(1)},${y(Sx.pess[Sx.pess.length - 1 - idx]).toFixed(1)}`).join(" ")}` : null;
        const labels = [];
        if (Sx.compar && Sx.compar.length) labels.push({ v: comparF2, t: scenLabel || comparLabel || "Médian", pp: comparSub, c: WOW_GOLD, b: true });
        if (Sx.med && Sx.med.length) labels.push({ v: medF2, t: scenLabel || "Médian", pp: medSub, c: WOW_TEAL, b: true });
        if (Sx.opt && Sx.opt.length) labels.push({ v: optF2, t: "Optimiste", c: "#16a34a", sec: true });
        if (Sx.pess && Sx.pess.length) labels.push({ v: pessF2, t: "Prudent", c: "#b45309", sec: true });
        if (Sx.ref && Sx.ref.length) labels.push({ v: refF2, t: rLabel, c: "#9a948c" });
        // Placement anti-chevauchement SÉPARÉ pour chaque colonne (primaire = médian/comparatif ; secondaire = optimiste/prudent, décalés à droite)
        const place = (arr) => { arr.sort((a, b) => b.v - a.v); let pv = -Infinity; return arr.map(l => { let yy = y(l.v); const gap = 44; if (yy < pv + gap) yy = pv + gap; pv = yy; return { ...l, yy }; }); };

            <text x={W - pr} y={Hh - 8} textAnchor="middle" fontSize="12" fill={WOW_SUB}>{inputs.dureeAnnees} ans</text>
            {tunnel && <polygon points={tunnel} fill="rgba(15,118,110,0.07)" />}
            {Sx.med && Sx.med.length >= 2 && <polygon points={area(Sx.med)} fill="url(#wgrad)" />}
            {Sx.ref && Sx.ref.length >= 2 && <polyline points={poly(Sx.ref)} fill="none" stroke="#b8b2a8" strokeWidth="2.2" strokeDasharray="7 5" />}
            {Sx.opt && Sx.opt.length >= 2 && <polyline points={poly(Sx.opt)} fill="none" stroke="#16a34a" strokeWidth="1.6" strokeDasharray="2 4" opacity="0.7" />}
            {Sx.pess && Sx.pess.length >= 2 && <polyline points={poly(Sx.pess)} fill="none" stroke="#b45309" strokeWidth="1.6" strokeDasharray="2 4" opacity="0.7" />}
            {Sx.med && Sx.med.length >= 2 && <polyline points={poly(Sx.med)} fill="none" stroke={WOW_TEAL} strokeWidth="4" strokeLinejoin="round" />}
            {Sx.compar && Sx.compar.length >= 2 && <polyline points={poly(Sx.compar)} fill="none" stroke={WOW_GOLD} strokeWidth="4" strokeLinejoin="round" />}

            {placed.map((l, k) => {
              const tx = l.sec ? x(n - 1) + 150 : x(n - 1) + 19;
              return (<g key={k}>
                <circle cx={x(n - 1)} cy={y(l.v)} r="4" fill={l.c} stroke="#fdfbf6" strokeWidth="1.5" />
                <line x1={x(n - 1) + 4} y1={y(l.v)} x2={x(n - 1) + 16} y2={l.yy} stroke={l.c} strokeWidth="1" opacity="0.45" />
                {l.sec && <line x1={x(n - 1) + 20} y1={l.yy} x2={tx - 6} y2={l.yy} stroke={l.c} strokeWidth="1.2" strokeDasharray="1.5 3" opacity="0.55" />}
                <text x={tx} y={l.yy - 1} fontSize="13" fontWeight={l.b ? "800" : "600"} fill={l.c} className="num">{fmtEUR(l.v)}</text>
                <text x={tx} y={l.yy + 12} fontSize="9.5" fontWeight="700" fill={l.b ? l.c : WOW_SUB}>{l.t}</text>
                {l.pp && (hasSec
                  ? <text x={tx} y={l.yy + 23} fontSize="10" fontWeight="800" fill={l.c} className="num">{l.pp}</text>
                  : <>
                      <line x1={tx + 96} y1={l.yy - 4} x2={W - 96} y2={l.yy - 4} stroke={l.c} strokeWidth="1.2" strokeDasharray="1.5 3" opacity="0.6" />
                      <text x={W - 8} y={l.yy} textAnchor="end" fontSize="12.5" fontWeight="800" fill={l.c} className="num">{l.pp}</text>
                    </>
                )}
              </g>);
            })}
            {/* Repères — chaque pastille placée à l'aplomb de sa ligne pointillée (année) ; décalée en ligne si collision */}
            {(() => {
              const comps = (inputs.versementsComplementaires || []).filter(v => (Number(v.montant) || 0) > 0 && (Number(v.annee) || 0) >= 0 && (Number(v.annee) || 0) <= (n - 1));
              if (!comps.length) return null;
              const by = pt;
              const hH = 17, gap = 5, pW = 78, pH = 27;
              const headerW = comps.length > 1 ? 164 : 156;
              const firstRowY = by + hH + gap;
              // sommet de courbe (optimiste sinon médian) à une année
              const curveTopVal = (yr) => {
                const idx = Math.min((Sx.med ? Sx.med.length : 1) - 1, Math.round(yr));
                const cands = [Sx.opt, Sx.med].filter(s => s && s.length).map(s => s[idx] || 0);
                return cands.length ? Math.max(...cands) : 0;
              };
              const sorted = comps.map(v => ({ v, yr: Number(v.annee) || 0 })).sort((a, b) => a.yr - b.yr);
              // détection de collision par rectangles : rien ne se pose sur l'en-tête ni sur une autre pastille
              const rects = [{ x: pl + 6, y: by, w: headerW, h: hH }];
              const hit = (a, b) => !(a.x + a.w <= b.x || b.x + b.w <= a.x || a.y + a.h <= b.y || b.y + b.h <= a.y);
              const findRow = (px, startY, maxY) => { let yy = startY; while (yy <= maxY) { const r = { x: px, y: yy, w: pW, h: pH }; if (!rects.some(q => hit(r, q))) return yy; yy += (pH + gap); } return null; };
              const placed = sorted.map(({ v, yr }) => {
                const xc = pl + (yr / (n - 1)) * (W - pl - pr);
                const mv = (Sx.med && Sx.med.length) ? (Sx.med[Math.min(Sx.med.length - 1, Math.round(yr))] || 0) : 0;
                const yv = y(mv);
                // 1) aplomb, dans l'espace au-dessus de la courbe
                const xt = Math.max(pl + pW / 2 + 2, Math.min(W - pr - pW / 2 - 2, xc));
                const px = xt - pW / 2;
                const maxYA = y(curveTopVal(yr)) - pH - 6;
                let py = (maxYA >= firstRowY) ? findRow(px, firstRowY, maxYA) : null;
                if (py != null) { rects.push({ x: px, y: py, w: pW, h: pH }); return { v, yr, xc, yv, mode: 'aplomb', xt, px, py }; }
                // 2) repli colonne gauche, empilé sans chevauchement
                const pxL = pl + 6;
                py = findRow(pxL, firstRowY, yv - pH - 4);
                if (py == null) py = firstRowY;
                rects.push({ x: pxL, y: py, w: pW, h: pH });
                return { v, yr, xc, yv, mode: 'left', xt: pxL + pW / 2, px: pxL, py };
              });
              return (
                <g>
                  {/* traits de rappel + points sur la courbe */}
                  {placed.map((p, k) => (
                    <g key={`cd${k}`}>
                      {p.mode === 'aplomb'
                        ? <line x1={p.xc} y1={p.py + pH} x2={p.xc} y2={p.yv} stroke={WOW_GOLD} strokeWidth="1.1" strokeDasharray="3 3" opacity="0.5" />
                        : <line x1={p.px + pW} y1={p.py + pH / 2} x2={p.xc} y2={p.yv} stroke={WOW_GOLD} strokeWidth="1.1" strokeDasharray="3 3" opacity="0.45" />}
                      <circle cx={p.xc} cy={p.yv} r="4" fill={WOW_GOLD} stroke="#fdfbf6" strokeWidth="1.5" />
                    </g>
                  ))}
                  {/* En-tête à gauche */}
                  <rect x={pl + 6} y={by} width={headerW} height={hH} rx="7" fill={WOW_GOLD} />
                  <text x={pl + 6 + headerW / 2} y={by + hH / 2 + 3} textAnchor="middle" fontSize="8.5" fontWeight="700" fill="#fff" style={{ letterSpacing: '0.06em', textTransform: 'uppercase' }}>{comps.length > 1 ? 'Versements complémentaires' : 'Versement complémentaire'}</text>
                  {/* Pastilles apports */}
                  {placed.map((p, k) => (
                    <g key={`cp${k}`}>
                      <rect x={p.px} y={p.py} width={pW} height={pH} rx="6" fill="#fff" stroke={WOW_GOLD} strokeWidth="1.5" />
                      <text x={p.xt} y={p.py + 12} textAnchor="middle" fontSize="10.5" fontWeight="800" fill={WOW_GOLD} className="num">+{fmtEUR(Number(p.v.montant) || 0)}</text>
                      <text x={p.xt} y={p.py + 21} textAnchor="middle" fontSize="8" fontWeight="700" fill="#a07f3f" style={{ textTransform: 'uppercase', letterSpacing: '0.04em' }}>année {p.v.annee}</text>
                    </g>
                  ))}
                </g>
              );
            })()}
          </svg>
        );
      };

      // Slide Projection interactive : rappel des versements + comparatif prime périodique (courbe en +) + (PER) réintégration
      const ProjSlide = () => {
        const baseMensuel = inputs.versementMensuel;
        // showReint / showLivret / showScen remontés dans ClientWowScreen (persistent entre re-rendus)
        // Courbes de BASE (versement mensuel réel, inchangé)
        const med = projectionSeries(inputs, sim.rdtMed ?? sim.rdt) || [];
        const pess = showScen ? (projectionSeries(inputs, sim.rdtPess ?? sim.rdt) || []) : [];
        const opt = showScen ? (projectionSeries(inputs, sim.rdtOpt ?? sim.rdt) || []) : [];
        let ref = [];

        }
        // Courbe COMPARATIVE : si le client verse plus, une courbe SUPPLÉMENTAIRE apparaît (on garde la base)
        const comparActive = comparOn && prime > 0 && Math.round(prime) !== Math.round(baseMensuel);
        const compar = comparActive ? (projectionSeries({ ...inputs, versementMensuel: prime }, sim.rdtMed ?? sim.rdt) || []) : [];
        const medFinal = med.length ? med[med.length - 1] : 0;
        const comparFinal = compar.length ? compar[compar.length - 1] : 0;
        const heroLabel = isPERProduit ? "PER" : isCapiProduit ? "CAPITALISATION" : "ASSURANCE-VIE";
        return (
          <div>

            {/* Rappel des versements sous le titre */}
            <div className="flex flex-wrap items-baseline gap-x-5 gap-y-1 mb-5 text-[13.5px]" style={{ color: WOW_SUB }}>
              <span>Versement initial <span className="num font-bold" style={{ color: WOW_INK }}>{fmtEUR(inputs.versementInitial)}</span></span>
              <span>· versement mensuel <span className="num font-bold" style={{ color: WOW_INK }}>{fmtEUR(baseMensuel)}</span>/mois</span>
              <span>· durée <span className="num font-bold" style={{ color: WOW_INK }}>{inputs.dureeAnnees} ans</span></span>
              <span>· hypothèse de rendement médian <span className="num font-bold" style={{ color: WOW_TEAL }}>{fmtPCT(sim.rdtMed)}</span></span>
            </div>
            {/* Contrôles — deux blocs homogènes, chacun cochable */}
            <div className="text-[10px] uppercase tracking-widest font-bold mb-2" style={{ color: WOW_SUB }}>Comparer avec (cochez au choix)</div>
            <div className="flex flex-wrap items-stretch gap-3 mb-4">
              {/* Bloc 1 — Comparatif prime périodique */}
              <div className="inline-flex items-center gap-3 rounded-xl px-4 py-3 transition" style={comparOn ? { background: "rgba(184,146,78,0.12)", border: `1.5px solid ${WOW_GOLD}` } : { background: "rgba(255,255,255,0.62)", border: "1px solid rgba(29,39,53,0.15)" }}>
                <label className="inline-flex items-center gap-2.5 cursor-pointer select-none">
                  <input type="checkbox" checked={comparOn} onChange={e => { setComparOn(e.target.checked); if (e.target.checked && Math.round(prime) === Math.round(baseMensuel)) setPrime(Math.round((baseMensuel + 100) / 50) * 50); }} className="w-4 h-4 cursor-pointer" style={{ accentColor: WOW_GOLD }} />
                  <span className="text-[12px] font-bold uppercase tracking-wider" style={{ color: comparOn ? WOW_GOLD : WOW_SUB }}>Prime périodique majorée</span>
                </label>
                {comparOn && (
                  <div className="flex items-center bg-white rounded-lg border" style={{ borderColor: "rgba(29,39,53,0.15)" }}>
                    <input type="number" defaultValue={Math.round(prime)} step={50} min={0} inputMode="numeric"
                      key={`prime-${Math.round(prime)}`}
                      onBlur={e => setPrime(Math.max(0, parseFloat(e.target.value) || 0))}
                      onKeyDown={e => { if (e.key === 'Enter') e.currentTarget.blur(); }}
                      className="num w-20 px-2 py-1 text-right text-[14px] font-bold bg-transparent focus:outline-none" style={{ color: WOW_INK }} />
                    <span className="px-2 text-[10px]" style={{ color: WOW_SUB }}>€/mois</span>

              </div>
              {/* Bloc 2 — Livret (AV) ou PER + réintégration (PER) */}
              {isPERProduit ? (
                <label className="inline-flex items-center gap-2.5 rounded-xl px-4 py-3 cursor-pointer select-none transition" style={showReint ? { background: "rgba(15,118,110,0.12)", border: `1.5px solid ${WOW_TEAL}` } : { background: "rgba(255,255,255,0.62)", border: "1px solid rgba(29,39,53,0.15)" }}>
                  <input type="checkbox" checked={showReint} onChange={e => setShowReint(e.target.checked)} className="w-4 h-4 cursor-pointer" style={{ accentColor: WOW_TEAL }} />
                  <span className="text-[12px] font-bold uppercase tracking-wider" style={{ color: showReint ? WOW_TEAL : WOW_SUB }}>PER + réintégration</span>
                </label>
              ) : !isCapiProduit && (
                <label className="inline-flex items-center gap-2.5 rounded-xl px-4 py-3 cursor-pointer select-none transition" style={showLivret ? { background: "rgba(120,113,108,0.14)", border: "1.5px solid #78716c" } : { background: "rgba(255,255,255,0.62)", border: "1px solid rgba(29,39,53,0.15)" }}>
                  <input type="checkbox" checked={showLivret} onChange={e => setShowLivret(e.target.checked)} className="w-4 h-4 cursor-pointer" style={{ accentColor: "#78716c" }} />
                  <span className="text-[12px] font-bold uppercase tracking-wider" style={{ color: showLivret ? "#57534e" : WOW_SUB }}>{useAutreAV ? "Assurance vie client" : livretNom}</span>
                </label>
              )}
              {/* Bloc 3 — Scénarios prudent / optimiste (décochables pour alléger) */}
              <label className="inline-flex items-center gap-2.5 rounded-xl px-4 py-3 cursor-pointer select-none transition" style={showScen ? { background: "rgba(22,163,74,0.10)", border: "1.5px solid #16a34a" } : { background: "rgba(255,255,255,0.62)", border: "1px solid rgba(29,39,53,0.15)" }}>
                <input type="checkbox" checked={showScen} onChange={e => setShowScen(e.target.checked)} className="w-4 h-4 cursor-pointer" style={{ accentColor: "#16a34a" }} />
                <span className="text-[12px] font-bold uppercase tracking-wider" style={{ color: showScen ? "#15803d" : WOW_SUB }}>Prudent · Optimiste</span>
              </label>
            </div>
            {comparActive && (
              <div className="mb-3 rounded-xl px-4 py-2.5 inline-block" style={{ background: "rgba(184,146,78,0.12)", border: `1px solid ${WOW_GOLD}66` }}>
                <span className="text-[13px]" style={{ color: WOW_INK }}>En passant à <span className="num font-bold" style={{ color: WOW_GOLD }}>{fmtEUR(prime)}/mois</span>, votre capital atteint <span className="num font-bold" style={{ color: WOW_GOLD }}>{fmtEUR(comparFinal)}</span> — soit <span className="num font-extrabold" style={{ color: WOW_GOLD }}>+{fmtEUR(comparFinal - medFinal)}</span> au terme.</span>
              </div>
            )}
            <div className={`${soft} p-6`} style={softStyle}><ProjChart height={400} series={{ med, pess, opt, ref, compar }} refLabel={refLabel} heroLabel={heroLabel} scenLabel={`${isPERProduit ? 'PER' : isCapiProduit ? 'Capitalisation' : 'Ass. vie'} — médian`} medSub={comparActive ? `PP ${fmtEUR(baseMensuel)}/mois` : undefined} comparSub={comparActive ? `PP ${fmtEUR(prime)}/mois` : undefined} /></div>
            <div className="mt-3 text-[12.5px]" style={{ color: WOW_SUB }}>Courbes <span className="font-bold" style={{ color: WOW_TEAL }}>{produitNom}</span> (médian · optimiste · prudent){comparActive ? <>, et en <span className="font-bold" style={{ color: WOW_GOLD }}>doré</span> la projection si vous versez {fmtEUR(prime)}/mois</> : ''}{isPERProduit ? (showReint ? <>, avec <span className="font-semibold">PER + réintégration</span> (pointillés).</> : <>. Active « PER + réintégration » pour l'effet du réinvestissement des réductions.</>) : (showLivret ? <>, comparées à <span className="font-semibold">{refLabel.toLowerCase()}</span> (pointillés gris).</> : '.')}</div>
          </div>
        );
      };

      // Carte rente ajustable — portage fidèle de la cellule rente du comparatif
      // (rente brute + curseur + fiscalité/CSG + rente nette + durée de distribution)
      const RenteAdjust = ({ col, nom, accent, primary, hero, pp }) => {
        const rm = col.capital > 0 && col.rdt > 0 ? Math.pow(1 + col.rdt, 1/12) - 1 : 0;
        const perp = col.capital * rm;
        const [r, setR] = useState(perp);
        useEffect(() => { setR(perp); }, [perp]);
        const rMin = Math.max(0, Math.floor(perp));
        // Horizon = durée d'investissement. Le curseur est BLOQUÉ à la rente qui épuise
        // exactement le capital sur cet horizon → au-delà, il ne resterait plus rien à distribuer.
        const Hmois = Math.max(1, Math.round((inputs.dureeAnnees || 15) * 12));
        const maxRente = rm > 0 ? col.capital * rm / (1 - Math.pow(1 + rm, -Hmois)) : col.capital / Hmois;
        const rMax = Math.max(Math.floor(maxRente), rMin + 1);
        const dur = distributionYears(col.capital, col.rdt, r);
        const perpetual = !isFinite(dur);
        const durYears = perpetual ? null : Math.floor(dur);
        const durMonths = perpetual ? null : Math.round((dur - durYears) * 12);
        // Fiscalité (IR) — même moteur que le comparatif : quote-part de PV, abattement, seuil 150 k€
        const qpv = col.renteBrute > 0 ? ((col.renteImpotPS || 0) / col.renteBrute) / PS : 0;
        const ab = col.renteAb || 0;
        const annualPV = r * 12 * qpv;
        const primes = col.versements || 0;
        const frac128 = primes > 150000 ? (primes - 150000) / primes : 0;
        const tauxPFL = PFL_AV_8 * (1 - frac128) + 0.128 * frac128;
        const irMois = col.rentePlus8 ? Math.max(0, annualPV - ab) * tauxPFL / 12 : annualPV * 0.128 / 12;
        const netMois = r - irMois;
        // Capital restant à l'horizon (même durée que l'investissement) : au niveau « à vie » il est préservé,
        // au-delà il s'érode jusqu'à 0 quand la rente atteint le maximum du curseur.
        const growthH = Math.pow(1 + rm, Hmois);
        const capRestant = rm > 0 ? Math.max(0, col.capital * growthH - r * ((growthH - 1) / rm)) : Math.max(0, col.capital - r * Hmois);
        const capPct = col.capital > 0 ? Math.max(0, Math.min(100, (capRestant / col.capital) * 100)) : 0;
        // Mois écoulés entre l'horizon (dureeAnnees) et l'épuisement total du capital
        const totalMonths = perpetual ? Infinity : Math.round(dur * 12);
        const monthsAfterH = perpetual ? 0 : Math.max(0, totalMonths - Hmois);
        return (
          <div className={`rounded-2xl p-6 relative ${hero ? '' : 'ring-1 ring-black/[0.05]'}`} style={hero
            ? { background: "linear-gradient(180deg, rgba(15,118,110,0.10) 0%, rgba(255,255,255,0.72) 42%)", border: `2px solid ${WOW_TEAL}`, boxShadow: "0 18px 44px -20px rgba(15,118,110,0.45)" }
            : { background: "rgba(255,255,255,0.55)", boxShadow: "0 1px 2px rgba(29,39,53,0.04)" }}>
            {hero && (
              <div className="absolute -top-3 left-1/2 -translate-x-1/2 inline-flex items-center gap-1 px-3 py-1 rounded-full text-white text-[10px] font-extrabold uppercase tracking-widest shadow-md whitespace-nowrap" style={{ background: `linear-gradient(135deg,#0f766e,#12897f)` }}>★ Solution proposée</div>
            )}
            <div className="text-center mt-2 mb-3 rounded-xl px-2.5 py-2" style={{ background: hero ? "rgba(15,118,110,0.14)" : `${accent}22`, border: `1px solid ${hero ? "rgba(15,118,110,0.35)" : `${accent}55`}` }}>
              <div className="text-[13px] uppercase tracking-wide font-extrabold leading-tight" style={{ color: hero ? WOW_TEAL : accent }}>{nom}</div>
              {pp && <div className="text-[13px] uppercase tracking-widest font-extrabold mt-1" style={{ color: hero ? WOW_TEAL : accent }}>{pp}</div>}
            </div>
            {/* Rente brute */}
            <div className="text-center">
              <div className="text-[10.5px] uppercase tracking-widest font-bold" style={{ color: WOW_SUB }}>Rente mensuelle brute</div>
              <div className="num font-bold tracking-tightest leading-none mt-1" style={{ color: WOW_INK, fontSize: primary ? 38 : 34 }}>{fmtEUR(r)}<span className="text-base font-medium" style={{ color: WOW_SUB }}> /mois</span></div>
            </div>
            {/* Curseur — la partie à gauche du curseur se remplit en vert */}
            <input type="range" min={rMin} max={rMax} step={1} value={Math.min(Math.max(r, rMin), rMax)}
              onChange={e => { const v = parseFloat(e.target.value); setR(v - rMin <= 100 ? v : Math.round(v / 50) * 50); }}
              className="slider w-full mt-4"
              style={{ background: `linear-gradient(to right, ${WOW_TEAL} 0%, #34d399 ${rMax > rMin ? ((Math.min(Math.max(r, rMin), rMax) - rMin) / (rMax - rMin)) * 100 : 0}%, #e7e5e4 ${rMax > rMin ? ((Math.min(Math.max(r, rMin), rMax) - rMin) / (rMax - rMin)) * 100 : 0}%, #e7e5e4 100%)` }} />
            <div className="flex justify-between text-[10px] mt-1.5" style={{ color: WOW_SUB }}><span>à vie</span><span className="num">{fmtEUR(rMax)} /mois</span></div>
            {/* Fiscalité + CSG/RDS + rente nette — masqués en PER (rente brute indicative uniquement, comme le simulateur) */}
            {!col.isPER && (<>
              <div className="flex items-stretch gap-2 mt-3">
                <div className="flex-1 rounded-lg px-3 py-1.5" style={{ background: "rgba(29,39,53,0.04)" }}>
                  <div className="flex items-center justify-between gap-2">
                    <span className="text-[11.5px]" style={{ color: WOW_SUB }}>Fiscalité</span>
                    <span className="num font-bold text-[13px]" style={{ color: WOW_INK }}>{irMois <= 0.5 ? '0 €' : `−${fmtEUR(irMois * 12)} /an`}</span>
                  </div>
                  <div className="text-[9.5px] font-bold leading-snug" style={{ color: WOW_INK, minHeight: '13px' }}>{col.rentePlus8 && irMois <= 0.5 ? `Exonéré — abattement ${fmtEUR(ab)}/an` : ' '}</div>
                </div>
                <div className="flex items-center font-bold text-[15px]" style={{ color: WOW_SUB }}>+</div>
                <div className="rounded-lg px-3 py-1.5 flex flex-col justify-center text-center" style={{ background: "rgba(29,39,53,0.04)" }}>
                  <span className="text-[11px] leading-none" style={{ color: WOW_SUB }}>CSG/RDS</span>
                  <span className="num font-bold text-[12px] leading-none mt-0.5" style={{ color: WOW_INK }}>17,2 %</span>
                </div>
              </div>
              <div className="rounded-lg px-4 py-1.5 text-center mt-2 border" style={{ background: primary ? "rgba(15,118,110,0.10)" : "rgba(29,39,53,0.03)", borderColor: primary ? "rgba(15,118,110,0.35)" : "rgba(29,39,53,0.12)" }}>
                <div className="flex items-baseline justify-center gap-2">
                  <span className="text-[10px] uppercase tracking-widest font-bold" style={{ color: primary ? WOW_TEAL : WOW_SUB }}>Rente nette</span>
                  <span className="num font-bold tracking-tightest" style={{ color: primary ? WOW_TEAL : WOW_INK, fontSize: 22 }}>{fmtEUR(netMois)}<span className="text-xs font-medium" style={{ color: WOW_SUB }}> /mois</span></span>
                </div>
              </div>
            </>)}
            {/* Durée de distribution + érosion du capital — MIS EN VALEUR */}
            <div className="mt-4 pt-4" style={{ borderTop: "1px solid rgba(29,39,53,0.1)" }}>
              <div className="text-[10.5px] uppercase tracking-widest font-bold text-center" style={{ color: WOW_SUB }}>Durée de distribution</div>
              <div className="num font-bold tracking-tightest leading-none mt-1 text-center" style={{ color: WOW_INK, fontSize: 28 }}>
                {perpetual ? <>À vie <span style={{ color: WOW_SUB }}>∞</span></>
                  : durYears >= 1 ? <>{durYears}<span className="text-sm font-medium" style={{ color: WOW_SUB }}> {durYears > 1 ? 'ans' : 'an'}</span>{durMonths > 0 && <> {durMonths}<span className="text-sm font-medium" style={{ color: WOW_SUB }}> mois</span></>}</>
                  : <>{Math.max(1, Math.round(dur * 12))}<span className="text-sm font-medium" style={{ color: WOW_SUB }}> mois</span></>}
              </div>
              {/* Capital restant — présenté comme la durée, avec une barre qui diminue quand la rente augmente */}
              <div className="mt-4">
                <div className="flex items-baseline justify-between mb-1.5">

            const cards = [

              { ic: <Ico d={<><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></>} />, l: "Durée du placement", v: `${inputs.dureeAnnees} ans`, c: WOW_TEAL },

                    <span className="text-[12px]" style={{ color: "rgba(255,255,255,0.7)" }}>net de frais d'entrée</span>
                  </div>
                )}
              </div>
            );
          }
          case "alloc": {
            const alloc = inputs.allocation;
            const totP = alloc.reduce((s, a) => s + (a.poids || 0), 0) || 1;
            const R = 76, CIRC = 2 * Math.PI * R;
            let accF = 0;
            const donutSegs = alloc.map((s, idx) => {
              const frac = (s.poids || 0) / totP;
              const seg = { color: SUPPORT_META[s.type].color, dash: frac * CIRC, offset: accF * CIRC };
              accF += frac;
              return seg;

            return (
              <div>
                <Eyebrow>Profil &amp; supports</Eyebrow>
                <H className="text-4xl md:text-5xl mb-6">Votre allocation</H>
                {/* Donut + légende */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center mb-8">
                  <div className="flex justify-center">
                    <div className="relative" style={{ width: 210, height: 210 }}>
                      <svg width="210" height="210" viewBox="0 0 200 200">
                        <circle cx="100" cy="100" r={R} fill="none" stroke="rgba(29,39,53,0.06)" strokeWidth="26" />
                        {donutSegs.map((sg, k) => (
                          <circle key={k} cx="100" cy="100" r={R} fill="none" stroke={sg.color} strokeWidth="26"
                            strokeDasharray={`${sg.dash} ${CIRC - sg.dash}`} strokeDashoffset={-sg.offset}

                      </svg>
                      <div className="absolute inset-0 flex flex-col items-center justify-center">
                        <div className="num text-[30px] font-extrabold tracking-tightest leading-none" style={{ color: WOW_INK }}>{sriAlloc}<span className="text-[15px] font-bold" style={{ color: WOW_SUB }}>/7</span></div>
                        <div className="text-[10px] uppercase tracking-widest font-bold mt-1" style={{ color: WOW_SUB }}>{SRI_LABELS[sriAlloc]}</div>

                            </div>
                            <span className="num text-[20px] font-extrabold tracking-tightest" style={{ color: WOW_INK }}>{pct.toFixed(0)} %</span>

                        </div>

                    })}
                  </div>
                </div>

                {/* SRI + rendement — côte à côte, compact */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div className="rounded-2xl p-5" style={{ ...softStyle, background: "rgba(255,255,255,0.55)" }}>
                    <div className="text-[12px] uppercase tracking-widest font-bold mb-8" style={{ color: WOW_SUB }}>Niveau de risque (SRI)</div>
                    <div className="relative h-2.5 rounded-full" style={{ background: "linear-gradient(90deg,#7BD0CF,#A5DC54,#F0CD3F,#F08C92)" }}>
                      <div className="absolute -top-7 -translate-x-1/2 whitespace-nowrap text-[12px] font-bold" style={{ left: `${((sriAlloc - 0.5) / 7) * 100}%`, color: WOW_INK }}>{sriAlloc}/7 · {SRI_LABELS[sriAlloc]}</div>
                      <div className="absolute -top-1.5 w-5 h-5 rounded-full bg-white shadow-md -translate-x-1/2" style={{ left: `${((sriAlloc - 0.5) / 7) * 100}%`, border: `3px solid ${SRI_COLORS[sriAlloc]}` }}></div>
                    </div>
                    <div className="flex justify-between text-[10px] mt-3" style={{ color: WOW_SUB }}><span>Prudent</span><span>Offensif</span></div>
                  </div>
                  <div className="rounded-2xl p-5" style={{ background: "rgba(15,118,110,0.06)", border: "1px solid rgba(15,118,110,0.25)" }}>
                    <div className="text-[12px] uppercase tracking-widest font-bold mb-3" style={{ color: WOW_TEAL }}>Hypothèse de rendement annuel</div>
                    <div className="flex items-end justify-between">
                      <div><div className="num text-[36px] font-extrabold tracking-tightest leading-none" style={{ color: WOW_TEAL }}>{fmtPCT(sim.rdtMed)}</div><div className="text-[11px] font-semibold mt-0.5" style={{ color: WOW_TEAL }}>médian</div></div>
                      <div className="text-right text-[12px] leading-relaxed">
                        <div style={{ color: "#b45309" }}>prudent <span className="num font-bold">{fmtPCT(sim.rdtPess)}</span></div>
                        <div style={{ color: "#059669" }}>optimiste <span className="num font-bold">{fmtPCT(sim.rdtOpt)}</span></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          }
          case "proj": return <ProjSlide />;
          case "succ": {
            const maxNet = Math.max(win.netTransmis, primeCol ? primeCol.netTransmis : 0, showRef ? refCol.netTransmis : 0, 1);
            const droitsNote = (c) => {
              const ab = `${fmtEUR(c.abattement || 0)}${c.abattDetail ? ` (${c.abattDetail})` : ''}`;
              return (c.taxe || 0) > 0
                ? `Base ${fmtEUR(c.capitalDeces)} − abattement ${ab} → ${fmtEUR(c.taxe)} de droits`
                : `Base ${fmtEUR(c.capitalDeces)} − abattement ${ab} → aucun droit de succession`;
            };
            // Lignes classées : contrat actuel → solution → prime majorée (progression pédagogique)
            const succRows = [];
            if (showRef) succRows.push({ nom: refNom, pp: basePP, col: refCol, c: WOW_SUB, grad: "linear-gradient(90deg,#b0a99e,#c6c0b6)", muted: true });
            succRows.push({ nom: winNom, pp: basePP, col: win, c: WOW_TEAL, grad: "linear-gradient(90deg,#0f766e,#34d399)", hero: true });
            if (primeCol) succRows.push({ nom: winNom, pp: primePP, col: primeCol, c: WOW_GOLD, grad: `linear-gradient(90deg,#a07f3f,${WOW_GOLD})` });
            const gainVsRef = showRef ? (win.netTransmis - refCol.netTransmis) : null;
            return (
              <div>
                <Eyebrow>Transmission</Eyebrow>

                      <div className="rounded-2xl px-5 py-4" style={{ border: `1.5px solid ${r.c}55`, background: r.hero ? "rgba(15,118,110,0.06)" : "rgba(255,255,255,0.5)" }}>

                  })}

          }
          case "rente": {
            const cumul = win.renteNetteMois * 12 * inputs.dureeAnnees;

                  </div>
                )}

          case "synth": {

              { t: "Capital à terme", sub: `à ${inputs.dureeAnnees} ans`, av: win.capital, liv: refCol.capital, pr: primeCol ? primeCol.capital : null, fmt: v => fmtEUR(v) },

            return (
              <div>
                <Eyebrow>Synthèse</Eyebrow>
                <H className="text-4xl md:text-5xl mb-5">{clientLabel}</H>

                {/* État des lieux du projet */}
                <div className={`${soft} p-6 mb-6`} style={{ ...softStyle, border: `1.5px solid ${WOW_GOLD}`, boxShadow: `0 0 0 3px ${WOW_GOLD}1a, 0 1px 2px rgba(29,39,53,0.04)` }}>

                  <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
                    <EL k="Versement initial" v={fmtEUR(inputs.versementInitial)} c="#0f766e" />

                    <EL k="Hypothèse de rendement médian" v={fmtPCT(sim.rdtMed)} s={`prudent ${fmtPCT(sim.rdtPess)} · opt. ${fmtPCT(sim.rdtOpt)}`} c="#047857" />
                    <EL k="Frais d'entrée" v={`${((inputs.fraisSouscription||0)*100).toFixed(2).replace('.',',')} %`} c="#b45309" />

                <div className={`grid grid-cols-1 gap-5 ${metrics.length >= 3 ? 'md:grid-cols-3' : metrics.length === 2 ? 'md:grid-cols-2 md:max-w-3xl md:mx-auto' : 'md:max-w-xl md:mx-auto'}`}>
                  {metrics.map((m, k) => {

                        <div className="mb-3"><div className="flex justify-between items-center text-[13px] mb-1"><span className="font-bold px-2 py-0.5 rounded-md" style={{ color: WOW_TEAL, background: "rgba(15,118,110,0.10)", border: "1px solid rgba(15,118,110,0.3)" }}>{winNom.length > 22 ? "Votre solution" : winNom}</span><span className="num font-extrabold text-[16px]" style={{ color: WOW_TEAL }}>{m.fmt(m.av)}</span></div><div className="text-[10.5px] uppercase tracking-widest font-extrabold text-center mb-1.5" style={{ color: WOW_TEAL }}>{basePP}</div><div className="h-3 rounded-full" style={{ width: `${(m.av / max) * 100}%`, background: "linear-gradient(90deg,#0f766e,#34d399)" }}></div></div>
                        {m.pr != null && (

                        {showRef && <div className="mb-4"><div className="flex justify-between items-center text-[13px] mb-1"><span className="font-semibold px-2 py-0.5 rounded-md" style={{ color: WOW_SUB, background: "rgba(29,39,53,0.05)", border: "1px solid rgba(29,39,53,0.15)" }}>{refNom}</span><span className="num font-semibold" style={{ color: WOW_SUB }}>{m.fmt(m.liv)}</span></div><div className="text-[10.5px] uppercase tracking-widest font-extrabold text-center mb-1.5" style={{ color: WOW_SUB }}>{basePP}</div><div className="h-3 rounded-full bg-black/[0.05] overflow-hidden"><div className="h-full rounded-full" style={{ width: `${(m.liv / max) * 100}%`, background: "#b0a99e" }}></div></div></div>}
                        {showRef ? (
                        <div className="rounded-xl px-3 py-2 text-center" style={{ background: "rgba(15,118,110,0.1)" }}>
