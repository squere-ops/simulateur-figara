                            <text x="46" y="60" textAnchor="middle" dominantBaseline="central"
                              fontFamily="Inter, sans-serif" fontSize="7" fontWeight="500" fill="#78716c"
                              letterSpacing="0.2">conservé</text>
                          </svg>
                        </div>
                        <div className="dn-amount" style={{color:'#b45309', textAlign:'center'}}>{fmtEURc(netCapi)}</div>
                        <div className="dn-foot">IS {(inputs.tauxIS*100).toFixed(0)}% sur les plus-values<br/>Trésorerie d'entreprise (PM)</div>
                      </div>
                    );
                  })()
                )}
              </div>

              {/* Pagination centrée tout en bas */}
              <div className="pres-cover-foot">
                <span>II <strong>/ III</strong></span>
              </div>
            </div>

            {/* ============== PAGE 3 — COMPARATIF & DONUT PRODUIT ============== */}
            <div className="pres-sheet pres-spread">
              <div className="pres-spread-watermark">III</div>

              {/* Head — sans pagination (déplacée en bas) */}
              <div className="pres-spread-head">
                <div>
                  <div className="pres-spread-pretitle">{isPER ? `PER · Avec ou sans réintégration des réductions · ${N} ans` : `${produitNomComplet} VS ${livretNom} · ${N} ans`}</div>
                  <h2 className="pres-spread-title"><em>En synthèse.</em></h2>
                </div>
              </div>

              {/* Comparison cards — réplique exact du module Step 5 (descendues pour aérer le titre) */}
              {!isCapi ? (
                <div className="pres-modules-row" style={{gridTemplateColumns:'1fr 1fr 1fr', marginTop:'12mm'}}>
                  {(() => {
                    const CmpCard = ({ title, valSol, valLiv, fmt = fmtEURc, sub, gainPct, solLabel, livLabel, winLabel }) => {
                      const max = Math.max(valSol, valLiv, 1);
                      const gain = valSol - valLiv;
                      const wSol = (valSol / max) * 100;
                      const wLiv = (valLiv / max) * 100;
                      return (
                        <div className="pres-cmp-card">
                          <div className="cmp-title">{title}</div>
                          <div className="pres-cmp-row">
                            <div className="head">
                              <span className="nm win">{solLabel || produitNomComplet}</span>
                              <span className="vl win">{fmt(valSol)}</span>
                            </div>
                            <div className="bar"><span className="green" style={{width: `${wSol}%`}}></span></div>
                          </div>
                          <div className="pres-cmp-row">
                            <div className="head">
                              <span className="nm">{livLabel || livretNom}</span>
                              <span className="vl">{fmt(valLiv)}</span>
                            </div>
                            <div className="bar"><span className="gray" style={{width: `${wLiv}%`}}></span></div>
                          </div>
                          <div className="pres-cmp-foot">
                            <span className="label">{winLabel || `Victoire ${produitNomComplet}`}</span>
                            <div className="win-side">
                              <div className="win-val">+{fmt(gain)}</div>
                              {gainPct != null && <div className="win-pct">+{(gainPct*100).toFixed(0)} %</div>}
                            </div>
                          </div>
                          {sub && <div className="cmp-sub">{sub}</div>}
                        </div>
                      );
                    };
                    // Rente perpétuelle = capital × tm — formule cohérente avec l'onglet Comparatif (pas d'arrondi 50€)
                    const perpRenteM = (cap, taux) => cap > 0 && taux > 0 ? cap * (Math.pow(1 + taux, 1/12) - 1) : 0;
                    const renteSolM = perpRenteM(finalSolution, sim.rdt);
                    const renteLivM = perpRenteM(finalLivret, isPER ? sim.rdt : inputs.livretTaux);
                    if (isPER) {
                      // === En PER : 3 cartes pédagogiques ===
                      // valSol = scénario gagnant (PER + Réintégration, barre verte en haut)
                      // valLiv = scénario de référence (PER seul, barre grise en bas)
                      const renteSeulMois = perpRenteM(finalSolution, sim.rdt);
                      const renteReinvMois = perpRenteM(finalLivret, sim.rdt);
                      // Transmission nette : abattement AV art. 990 I appliqué sur capital total
                      // → fiscaliteAV calculée dans perReinvestCol pour PER+Réintégration
                      const succReinv = (() => {
                        const ligne = inputs.successionLine ?? 'directe';
                        const txIndirect = inputs.successionTauxIndirect ?? TX_SUCC_INDIRECT;
                        const txDirect = inputs.successionTauxDirect ?? 0.30;
                        const auxCap = sim.perReinvest?.auxCap || 0;
                        const totReinvesti = sim.perReinvest?.totReinvesti || 0;
                        const f = fiscaliteAV(finalSolution + auxCap, sim.proj.totVerseNet + totReinvesti, inputs.nbBeneficiaires, inputs.ageSouscripteur, txIndirect, sim.proj.totVerseBrut + totReinvesti, ligne, txDirect);
                        return f.direct;
                      })();
                      return (
                        <>
                          {/* CARTE 1 — Capital final à terme */}
                          <CmpCard
                            title="Capital final à terme"
                            solLabel="PER + Réintégration"
                            livLabel="PER seul"
                            winLabel="Gain de la réintégration"
                            valSol={finalLivret}
                            valLiv={finalSolution}

                  )}
                  <div style={{display:'flex', alignItems:'flex-start', gap:'2mm', marginTop:'1mm', paddingTop:'1.5mm', borderTop:'1px dashed rgba(120,113,108,0.30)'}}>
                    <span style={{flexShrink:0, fontWeight:700, color:'#0a0908'}}>{!isCapi ? (!isPER && N >= 8 ? '4' : '3') : '2'} /</span>
                    <span><em>Confidentialité · </em>Document strictement personnel à {clientLabel || "ce destinataire"}. Émis le {today}.</span>
                  </div>
                </div>
              </div>

              {/* Pagination centrée en bas */}
              <div className="pres-cover-foot">
                <span>III <strong>/ III</strong></span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Helper : id d'étude formaté
    function clientId(inputs) {
      const y = new Date().getFullYear();
      return inputs.clientSelected?.id || `${(inputs.produit||'AV').toUpperCase()}-${y}-${(inputs.clientNom||'NEW').slice(0,4).toUpperCase()}`;
    }

    function SidePanel({ label, sub, value, subValue, accent = "stone" }) {
      const isEm = accent === "emerald";
      return (
        <div className={`p-4 rounded-2xl border ${isEm ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-stone-200'}`}>
          <div className={`text-[10px] uppercase tracking-widest font-bold mb-2 ${isEm ? 'text-emerald-700' : 'text-stone-500'}`}>{label}</div>
          <div className="flex items-baseline gap-2 flex-wrap">
            <div className={`num text-2xl font-bold tracking-tightest ${isEm ? 'text-emerald-700' : 'text-stone-900'}`}>{value}</div>
            {subValue && <div className={`num text-base font-bold ${isEm ? 'text-emerald-600' : 'text-stone-500'}`}>{subValue}</div>}
          </div>
          {sub && <div className="text-[11px] text-stone-500 mt-1">{sub}</div>}
        </div>
      );
    }

    function LegendPill({ color, label, value, dashed, thick }) {
      return (
        <div className="flex items-center gap-2.5">
          <div className="flex items-center" style={{ width: 28 }}>
            {dashed
              ? <div style={{ width: 28, borderTop: `2px dashed ${color}` }}></div>
              : <div style={{ width: 28, height: thick ? 4 : 2.5, background: color, borderRadius: 2 }}></div>}
          </div>
          <div>
            <div className="text-[12px] font-bold text-stone-900">{label}</div>
            <div className="num text-[11px] text-stone-500 font-semibold">{value}</div>
          </div>
        </div>
      );
    }

    function PresentationKPI({ label, value, sub, highlight }) {
      return (
        <div className={`p-5 rounded-2xl ${highlight ? 'bg-emerald-50 border-2 border-emerald-300' : 'bg-white border border-stone-200'}`}>
          <div className="text-[10px] uppercase tracking-widest font-bold text-stone-500 mb-2">{label}</div>
          <div className={`num text-2xl md:text-3xl font-bold tracking-tightest ${highlight ? 'text-emerald-700' : 'text-stone-900'}`}>{value}</div>
          <div className="text-[11px] text-stone-500 mt-1">{sub}</div>
        </div>
      );
    }

    // ============================================================
    // FINAL CHART (legacy, unused)
    // ============================================================
    function FinalChart({ inputs, sim, scenarios, scenarioLvl, livretCol, solutionCol, livretNom }) {
      const chartRef = useRef(null);
      const chartInst = useRef(null);

      useEffect(() => {
        if (!chartRef.current || typeof Chart === 'undefined') return;
        if (chartInst.current) chartInst.current.destroy();

        const N = Math.round(inputs.dureeAnnees);
        const labels = Array.from({length: N+1}, (_, i) => `An ${i}`);

        const livretData = livretSeries(inputs);
        const solutionData = projectionSeries(inputs, sim.rdt);
        const scenarioDatas = scenarios.map((s, idx) => ({
          name: s.nom,
          color: ['#10b981','#3b82f6','#a855f7','#f97316'][idx % 4],
          data: projectionSeries(s.inputs, runSimulation(s.inputs, scenarioLvl).rdt),
        }));

        const ctx = chartRef.current.getContext('2d');
        // Gradient fill for solution
        const gradSol = ctx.createLinearGradient(0, 0, 0, 400);
        gradSol.addColorStop(0, 'rgba(16, 185, 129, 0.25)');
        gradSol.addColorStop(1, 'rgba(16, 185, 129, 0)');

        const datasets = [
          {
            label: livretNom,
            data: livretData,
            borderColor: '#a8a29e',
            borderDash: [6, 4],
            borderWidth: 2,
            fill: false,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: '#a8a29e',
          },
          {
            label: 'Solution Ass Vie',
            data: solutionData,
            borderColor: '#0c0a09',
            backgroundColor: gradSol,
            borderWidth: 3.5,
            fill: true,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: '#0c0a09',
          },
          ...scenarioDatas.map(s => ({
            label: s.name,
            data: s.data,
            borderColor: s.color,
            borderWidth: 2,
            fill: false,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 5,
            pointHoverBackgroundColor: s.color,
            borderDash: [],
          })),
        ];

        chartInst.current = new Chart(ctx, {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: {
                position: 'bottom',
                labels: { font: { size: 12, family: "Inter", weight: "600" }, usePointStyle: true, pointStyle: 'line', padding: 18, color: '#44403c' },
              },
              tooltip: {
                backgroundColor: '#0c0a09',
                titleColor: '#fff',
                bodyColor: '#e7e5e4',
                titleFont: { family: 'Inter', weight: '700', size: 13 },
                bodyFont: { family: 'Inter', size: 12 },
                padding: 12,
                cornerRadius: 10,
                borderColor: '#44403c',
                borderWidth: 1,
                displayColors: true,
                boxPadding: 4,
                callbacks: {
                  label: (c) => `${c.dataset.label} : ${fmtEUR(c.parsed.y)}`,
                },
              },
            },
            scales: {
              y: {
                ticks: { callback: v => fmtEURc(v), font: { family: 'Inter', size: 11, weight: '500' }, color: '#78716c' },
                grid: { color: '#f5f5f4', drawBorder: false },
              },
              x: {
                ticks: { font: { family: 'Inter', size: 11, weight: '500' }, color: '#78716c', maxTicksLimit: 12 },
                grid: { display: false },
              },
            },
          },
        });

        return () => chartInst.current?.destroy();
      }, [inputs, sim, scenarios, scenarioLvl, livretNom]);

      const gainCapital = solutionCol.capital - livretCol.capital;
      const gainPct = livretCol.capital > 0 ? (gainCapital / livretCol.capital) : 0;

      return (
        <div className="bg-white border border-stone-200 rounded-2xl overflow-hidden">
          {/* HERO TOP */}
          <div className="bg-gradient-to-br from-stone-900 via-stone-900 to-stone-800 px-6 py-7 text-white relative overflow-hidden">
            <div className="absolute -right-12 -top-12 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl"></div>
            <div className="absolute right-20 bottom-0 w-32 h-32 bg-emerald-400/5 rounded-full blur-2xl"></div>
            <div className="relative">
              <div className="text-[11px] uppercase tracking-widest font-bold text-emerald-400 mb-2">Évolution comparée du capital</div>
              <div className="flex items-baseline gap-3 flex-wrap">
                <div className="num text-5xl md:text-6xl font-bold tracking-tightest text-white">+{fmtEUR(gainCapital)}</div>
                <div className="num text-2xl font-bold text-emerald-400">+{(gainPct*100).toFixed(0)} %</div>
              </div>
              <div className="text-[14px] text-stone-300 mt-2">de capital supplémentaire vs <strong className="text-white">{livretNom}</strong> à terme — sur {inputs.dureeAnnees} ans</div>
            </div>
          </div>

          {/* CHART */}
          <div className="px-5 py-5">
            <div style={{ height: '420px' }}>
              <canvas ref={chartRef}></canvas>
            </div>
          </div>

          {/* FOOTER STATS — milestones */}
          <div className="px-6 pb-6 grid grid-cols-2 md:grid-cols-4 gap-4">
            <Milestone year={Math.min(8, inputs.dureeAnnees)} label="An 8 — régime fiscal favorable" valueAV={projectionSeries(inputs, sim.rdt)[Math.min(8, inputs.dureeAnnees)]} valueLivret={livretSeries(inputs)[Math.min(8, inputs.dureeAnnees)]} />
            <Milestone year={Math.min(10, inputs.dureeAnnees)} label={`An ${Math.min(10, inputs.dureeAnnees)}`} valueAV={projectionSeries(inputs, sim.rdt)[Math.min(10, inputs.dureeAnnees)]} valueLivret={livretSeries(inputs)[Math.min(10, inputs.dureeAnnees)]} />
            <Milestone year={Math.min(15, inputs.dureeAnnees)} label={`An ${Math.min(15, inputs.dureeAnnees)}`} valueAV={projectionSeries(inputs, sim.rdt)[Math.min(15, inputs.dureeAnnees)]} valueLivret={livretSeries(inputs)[Math.min(15, inputs.dureeAnnees)]} />
            <Milestone year={inputs.dureeAnnees} label={`An ${inputs.dureeAnnees} — terme`} valueAV={solutionCol.capital} valueLivret={livretCol.capital} highlight />
          </div>
        </div>
      );
    }

    function Milestone({ year, label, valueAV, valueLivret, highlight }) {
      const gain = (valueAV || 0) - (valueLivret || 0);
      return (
        <div className={`p-4 rounded-xl ${highlight ? 'bg-emerald-50 border-2 border-emerald-300' : 'bg-stone-50 border border-stone-200'}`}>
          <div className="text-[10px] uppercase tracking-wider font-bold text-stone-500 mb-1">{label}</div>
          <div className={`num text-xl font-bold tracking-tightest ${highlight ? 'text-emerald-700' : 'text-stone-900'}`}>+{fmtEURc(gain)}</div>
          <div className="text-[10px] text-stone-500 mt-1">vs livret · AV : <span className="num font-semibold text-stone-700">{fmtEURc(valueAV)}</span></div>
        </div>
      );
    }

    // ============================================================
    // SCENARIO BUILDER (slide-over panel)
    // ============================================================
    function ScenarioBuilder({ open, initialInputs, scenariosCount, onClose, onSave }) {
      const [name, setName] = useState("");
      const [b, setB] = useState(initialInputs || DEFAULT_INPUTS);

      // Re-init when opening with new initialInputs
      useEffect(() => {
        if (open && initialInputs) {
          setB(JSON.parse(JSON.stringify(initialInputs)));
          setName(`Scénario ${scenariosCount + 1}`);
        }
      }, [open, initialInputs, scenariosCount]);

      const upd = (k, v) => setB(p => ({ ...p, [k]: v }));
      const updAllocItem = (id, field, v) => {
        setB(p => {
          if (field === "poids") {
            const otherSum = p.allocation.filter(item => item.id !== id).reduce((s, x) => s + x.poids, 0);
            const maxAllowed = Math.max(0, 1 - otherSum);
            v = Math.max(0, Math.min(maxAllowed, v));
          }
          return {
            ...p,
            allocation: p.allocation.map(item => item.id === id ? { ...item, [field]: v } : item)
          };
        });
      };
      const addAllocItem = (type = "fondsActions") => {
        setB(p => {
          const newId = (p.allocation.length ? Math.max(...p.allocation.map(x => x.id)) : 0) + 1;
          const meta = SUPPORT_META[type];
          return {
            ...p,
            allocation: [...p.allocation, { id: newId, type, poids: 0, rendement: meta.rdtNetDef, sri: meta.sriDef }]
          };
        });
      };
      const removeAllocItem = (id) => {
        setB(p => ({
          ...p,
          allocation: p.allocation.length > 1 ? p.allocation.filter(item => item.id !== id) : p.allocation
        }));
      };
      const changeAllocType = (id, newType) => {
        const meta = SUPPORT_META[newType];
        setB(p => ({
          ...p,
          allocation: p.allocation.map(item =>
            item.id === id
              ? { ...item, type: newType, rendement: meta.rdtNetDef, sri: meta.sriDef }
              : item
          )
        }));
      };

      // Live simulation of builder state
      const sim = useMemo(() => runSimulation(b), [b]);
      const totalP = b.allocation.reduce((s,v)=>s+v.poids, 0);
      const isOK = Math.abs(totalP - 1) < 0.001;

      const totalVerseBrut = b.versementInitial + b.versementMensuel * 12 * b.dureeAnnees;
      const reductionCommerciale = (FRAIS_SOUSC_MAX - b.fraisSouscription) * totalVerseBrut;
      const reductionPCT = FRAIS_SOUSC_MAX > 0 ? (FRAIS_SOUSC_MAX - b.fraisSouscription) / FRAIS_SOUSC_MAX : 0;

      // Build preview column
      const previewLivret = projLivret(b.versementInitial, b.versementMensuel, b.dureeAnnees, b.livretTaux);
      const previewLivretFisc = fiscaliteLivret(previewLivret.capitalFin, b.nbBeneficiaires);
      const previewCol = {
        type: "scenario", colorIndex: 1,
        name: name || `Scénario ${scenariosCount + 1}`,
        subtitle: `Rdt ${fmtPCT(sim.rdt)}`,
        capital: sim.proj.capitalFin,
        versements: sim.proj.totVerseBrut,
        plusValue: Math.max(0, sim.proj.capitalFin - sim.proj.totVerseBrut),
        fraisSouscription: sim.proj.fraisSousPay,
        rdt: sim.rdt,
        capitalDeces: sim.proj.capitalFin,
        abattement: sim.fisc.abattTotal,
        abattDetail: sim.fisc.av70 ? `${ABATT_AV_70.toLocaleString('fr-FR')} € × ${b.nbBeneficiaires} bénéf.` : `Abatt. global après 70 ans`,
        imposable: sim.fisc.imposableTotal,
        taxe: sim.fisc.taxe,
        taxeLabel: "Taxe AV (art. 990 I)",
        netTransmis: sim.fisc.direct,
        renteBrute: sim.rente.brute,
        renteImpot: sim.rente.imp,
        renteNetteAn: sim.rente.nette,
        renteNetteMois: sim.rente.nette / 12,
        renteRegime: sim.rente.regime,
      };

      const handleSave = () => {
        const finalName = name.trim() || `Scénario ${scenariosCount + 1}`;
        onSave(finalName, b);
      };

      return (
        <>
          <div className={`builder-overlay ${open ? 'open' : ''} no-print`} onClick={onClose}></div>
          <div className={`builder-panel ${open ? 'open' : ''} no-print`}>
            {/* HEADER */}
            <div className="px-6 py-5 border-b border-stone-200 bg-white flex items-center justify-between flex-shrink-0">
              <div>
                <div className="text-[11px] uppercase tracking-widest font-bold text-emerald-700 mb-0.5">Nouveau scénario</div>
                <div className="text-[20px] font-bold text-stone-900 tracking-tight">Configurer la nouvelle solution</div>
              </div>
              <button onClick={onClose} className="p-2 text-stone-400 hover:text-stone-900 hover:bg-stone-100 rounded-lg transition"><I.close/></button>
            </div>

            {/* BODY */}
            <div className="flex-1 overflow-y-auto p-6">
              <div className="builder-grid">
                {/* LEFT: Form */}
                <div className="space-y-5">
                  {/* Name */}
                  <div>
                    <label className="label">Nom du scénario</label>
                    <input type="text" value={name} onChange={e=>setName(e.target.value)} className="field text-[16px] font-semibold" placeholder={`Scénario ${scenariosCount + 1}`} />
                  </div>

                  {/* Versements + durée */}
                  <div>
                    <div className="text-[11px] uppercase tracking-widest font-bold text-stone-500 mb-3">Paramètres financiers</div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="label">Versement initial</label>
                        <div className="flex items-center field" style={{ padding: 0 }}>
                          <input type="number" value={b.versementInitial} onChange={e=>upd("versementInitial", parseFloat(e.target.value)||0)} step={1000} className="num flex-1 px-3 py-2.5 bg-transparent text-[15px] font-semibold focus:outline-none" />
                          <span className="px-3 text-[12px] text-stone-500">€</span>
                        </div>
                      </div>
                      <div>
                        <label className="label">Versement mensuel</label>
                        <div className="flex items-center field" style={{ padding: 0 }}>
                          <input type="number" value={b.versementMensuel} onChange={e=>upd("versementMensuel", parseFloat(e.target.value)||0)} step={50} className="num flex-1 px-3 py-2.5 bg-transparent text-[15px] font-semibold focus:outline-none" />
                          <span className="px-3 text-[12px] text-stone-500">€/mois</span>
                        </div>
                      </div>
                      <div>
                        <label className="label">Durée</label>
                        <div className="flex items-center field" style={{ padding: 0 }}>
                          <input type="number" value={b.dureeAnnees} onChange={e=>upd("dureeAnnees", parseInt(e.target.value)||1)} min={1} max={50} className="num flex-1 px-3 py-2.5 bg-transparent text-[15px] font-semibold focus:outline-none" />
                          <span className="px-3 text-[12px] text-stone-500">ans</span>
                        </div>
                      </div>
                      {b.produit !== "capi" && (
                      <div>
                        <label className="label">Bénéficiaires</label>
                        <div className="flex items-center field" style={{ padding: 0 }}>
                          <button onClick={()=>upd("nbBeneficiaires", Math.max(1, b.nbBeneficiaires-1))} className="px-3 py-2.5 text-stone-500 hover:text-stone-900 font-bold">−</button>
                          <input type="number" value={b.nbBeneficiaires} onChange={e=>upd("nbBeneficiaires", Math.max(1, parseInt(e.target.value)||1))} className="num flex-1 text-center bg-transparent text-[15px] font-semibold focus:outline-none" />
                          <button onClick={()=>upd("nbBeneficiaires", b.nbBeneficiaires+1)} className="px-3 py-2.5 text-stone-500 hover:text-stone-900 font-bold">+</button>
                        </div>
                      </div>
                      )}
                    </div>
                  </div>

                  {/* Frais souscription */}
                  <div>
                    <div className="flex items-end justify-between mb-2">
                      <label className="label" style={{marginBottom:0}}>Frais sur versement</label>
                      <div className="flex items-baseline gap-2">
                        <span className="num text-xl font-bold text-stone-900 tracking-tightest">{(b.fraisSouscription*100).toFixed(2).replace('.',',')}<span className="text-sm font-medium text-stone-500"> %</span></span>
                      </div>
                    </div>
                    <input type="range" min="0" max="4.75" step="0.05" value={(b.fraisSouscription*100).toFixed(2)}
                      onChange={e=>upd("fraisSouscription", parseFloat(e.target.value)/100)} className="slider" />
                    {reductionCommerciale > 0 && (
                      <div className="mt-2 flex items-center justify-between text-[11px] bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">
                        <span className="text-stone-600">Économie commerciale</span>
                        <span className="num font-bold text-emerald-700">−{fmtEUR(reductionCommerciale)} <span className="text-stone-400 font-medium">·</span> −{(reductionPCT*100).toFixed(0)} %</span>
                      </div>
                    )}
                  </div>

                  {/* Allocation */}
                  <div>
                    <div className="flex items-center justify-between mb-3">
                      <div className="text-[11px] uppercase tracking-widest font-bold text-stone-500">Allocation des supports</div>
                      <span className={`num text-[11px] font-bold ${isOK ? 'text-emerald-700' : 'text-red-700'}`}>{(totalP*100).toFixed(0)} %</span>
                    </div>
                    <div className="alloc-bar mb-3">
                      {b.allocation.map(s => (
                        <div key={s.id} className="alloc-segment" style={{ width:`${s.poids*100}%`, background: SUPPORT_META[s.type].color }}></div>
                      ))}
                    </div>
                    <div className="space-y-3">
                      {b.allocation.map(item => {
                        const m = SUPPORT_META[item.type];
                        const otherSum = b.allocation.filter(x => x.id !== item.id).reduce((s, x) => s + x.poids, 0);
                        const maxPct = Math.max(0, Math.round((1 - otherSum) * 100));
                        return (
                          <div key={item.id} className="bg-white border border-stone-200 rounded-xl p-3">
                            <div className="flex items-center justify-between mb-2 gap-2">
                              <div className="flex items-center gap-2 flex-1 min-w-0">
                                <div className="w-1 h-7 rounded-full flex-shrink-0" style={{background: m.color}}></div>
                                <select value={item.type} onChange={e=>changeAllocType(item.id, e.target.value)}
                                  className="text-[12px] font-bold text-stone-900 bg-stone-50 border border-stone-200 rounded px-2 py-1 focus:outline-none focus:border-stone-900 cursor-pointer">
                                  {Object.entries(SUPPORT_META).map(([k,mm]) => (
                                    <option key={k} value={k}>{mm.label}</option>
                                  ))}
                                </select>
                              </div>
                              <div className="flex items-center gap-2 flex-shrink-0">
                                <span className="num text-[15px] font-bold tracking-tightest">{(item.poids*100).toFixed(0)}%</span>
                                {b.allocation.length > 1 && (
                                  <button onClick={() => removeAllocItem(item.id)} className="p-1 text-stone-400 hover:text-red-600 hover:bg-red-50 rounded transition" title="Supprimer">
                                    <I.x/>
                                  </button>
                                )}
                              </div>
                            </div>
                            <div className="flex items-center justify-between mb-1">
                              <span className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">Poids</span>
                              <span className="num text-[10px] text-stone-400">max {maxPct} %</span>
                            </div>
                            <input type="range" min="0" max={maxPct} step="1" value={(item.poids*100).toFixed(0)}
                              onChange={e=>updAllocItem(item.id, "poids", parseFloat(e.target.value)/100)}
                              className="slider mb-2" />
                            <div className="grid grid-cols-2 gap-2">
                              <div>
                                <div className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold mb-1">Rdt net</div>
                                <div className="flex items-center bg-stone-50 rounded border border-stone-200">
                                  <input type="number" value={(item.rendement*100).toFixed(2)} step={0.50}
                                    onChange={e=>updAllocItem(item.id, "rendement", parseFloat(e.target.value)/100||0)}
                                    className="num w-full px-2 py-1.5 text-right text-[13px] font-bold bg-transparent focus:outline-none" />
                                  <span className="px-2 text-[10px] text-stone-400">%</span>
                                </div>
                              </div>
                              <div>
                                <div className="flex items-center justify-between mb-1">
                                  <span className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">SRI</span>
                                  <span className="num text-[11px] font-bold" style={{color: SRI_COLORS[item.sri]}}>{item.sri}/7</span>
                                </div>
                                <input type="range" min="1" max="7" step="1" value={item.sri}
                                  onChange={e=>updAllocItem(item.id, "sri", parseInt(e.target.value))}
                                  className="sri-slider" style={{height: 6}} />
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    <button onClick={() => addAllocItem("fondsActions")}
                      className="mt-3 w-full bg-white border-2 border-dashed border-stone-300 hover:border-stone-900 hover:bg-stone-50 rounded-xl px-4 py-2.5 flex items-center justify-center gap-2 text-[12px] font-bold text-stone-700 transition">
                      <I.plus/> Ajouter un support
                    </button>
                    <div className="mt-3 grid grid-cols-2 gap-3 text-[11px]">
                      <div className="bg-stone-50 border border-stone-200 rounded-lg px-3 py-2">
                        <span className="text-stone-500 uppercase tracking-wider font-semibold text-[10px]">Rdt pondéré</span>
                        <div className="num font-bold text-stone-900">{fmtPCT(sim.rdtBrut)}</div>
                      </div>
                      <div className="bg-stone-50 border border-stone-200 rounded-lg px-3 py-2">
                        <span className="text-stone-500 uppercase tracking-wider font-semibold text-[10px]">SRI moyen</span>
                        <div className="num font-bold" style={{color: SRI_COLORS[Math.round(sim.sri)]}}>{sim.sri.toFixed(1)} / 7</div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* RIGHT: Live preview column */}
                <div className="md:sticky md:top-0 self-start">
                  <div className="text-[11px] uppercase tracking-widest font-bold text-stone-500 mb-3">Aperçu de la colonne</div>
                  <ResultColumn col={previewCol} isBestSuccession={false} isBestRente={false} onLoad={null} onRemove={null} inputs={b} />
                </div>
              </div>
            </div>

            {/* FOOTER */}
            <div className="px-6 py-4 border-t border-stone-200 bg-white flex items-center justify-between gap-3 flex-shrink-0">
              <div className="text-[11px] text-stone-500">{isOK ? "Allocation à 100% — prêt à confirmer" : `Total allocation : ${(totalP*100).toFixed(0)}% (doit être 100%)`}</div>
              <div className="flex items-center gap-2">
                <button onClick={onClose} className="btn btn-light">Annuler</button>
                <button onClick={handleSave} disabled={!isOK} className="btn btn-emerald disabled:opacity-40 disabled:cursor-not-allowed"><I.check/> Confirmer le scénario</button>
              </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
