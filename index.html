                          <div className="num text-[18px] font-extrabold" style={{ color: WOW_TEAL }}>+{m.fmt(m.av - m.liv)}</div>
                        </div>
                        ) : m.pr != null && (
                        <div className="rounded-xl px-3 py-2 text-center" style={{ background: "rgba(184,146,78,0.12)" }}>
                          <div className="text-[9.5px] uppercase tracking-wider font-bold" style={{ color: "#a07f3f" }}>Prime majorée vs votre solution</div>
                          <div className="num text-[18px] font-extrabold" style={{ color: WOW_GOLD }}>+{m.fmt(m.pr - m.av)}</div>
                        </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                {isPERProduit && reductionPER > 0 && (
                  <div className="mt-5 rounded-2xl px-6 py-5 flex items-center justify-center gap-4 flex-wrap text-center" style={{ background: "linear-gradient(135deg, rgba(124,58,237,0.10), rgba(139,92,246,0.05))", border: "1.5px solid rgba(124,58,237,0.4)" }}>
                    <span className="text-[15px] font-semibold" style={{ color: WOW_INK }}>Une réduction d'impôt de</span>
                    <span className="num text-3xl font-extrabold tracking-tightest" style={{ color: "#6d28d9" }}>{fmtEUR(reductionPER)}</span>
                    <span className="text-[15px] font-semibold" style={{ color: WOW_INK }}>sur {inputs.dureeAnnees} années</span>
                  </div>
                )}
              </div>
            );
          }
          default: return null;
        }
      };

      const content = (
        <div className="wow-screen fixed inset-0 z-[2147483600] flex flex-col" style={{ background: "radial-gradient(1100px 700px at 78% -10%, #fdfbf6 0%, #f5efe3 55%, #ece3d3 100%)", color: WOW_INK, WebkitPrintColorAdjust: "exact", printColorAdjust: "exact" }}>
          <style>{`@media print {
            body { background:#f5efe3 !important; }
            body * { visibility:hidden !important; }
            .wow-screen, .wow-screen * { visibility:visible !important; }
            .wow-screen { position:absolute !important; inset:0 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
            .wow-no-print { display:none !important; }
          }`}</style>

          <div className="flex items-center justify-between px-6 py-3 flex-shrink-0 border-b" style={{ borderColor: "rgba(29,39,53,0.08)" }}>
            <div className="flex items-center gap-2.5 flex-shrink-0"><I.logo/><div className="serif text-[13px] font-semibold tracking-[0.2em]" style={{ color: WOW_INK }}>FIGARA</div></div>
            <div className="hidden md:flex items-center gap-0.5 overflow-x-auto wow-no-print">
              {titles.map((t, k) => (<button key={k} onClick={() => setI(k)} className="px-2 py-1 text-[11px] tracking-wide transition whitespace-nowrap" style={{ color: k === i ? WOW_GOLD : WOW_SUB, fontWeight: k === i ? 700 : 500 }}>{t}</button>))}
            </div>
            <div className="flex items-center gap-1.5 flex-shrink-0 wow-no-print">
              <button onClick={() => { window.location.href = `mailto:?subject=${encodeURIComponent('Proposition patrimoniale — ' + clientLabel)}`; }} title="Envoyer par email" className="inline-flex items-center justify-center w-9 h-9 rounded-lg hover:bg-black/[0.05] transition" style={{ color: WOW_SUB }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg></button>
              <button onClick={() => window.print()} title="Imprimer / PDF" className="inline-flex items-center justify-center w-9 h-9 rounded-lg hover:bg-black/[0.05] transition" style={{ color: WOW_SUB }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button>
              <button onClick={onClose} title="Fermer" className="inline-flex items-center justify-center w-9 h-9 rounded-lg hover:bg-black/[0.05] transition" style={{ color: WOW_SUB }}><I.close/></button>
            </div>
          </div>

          <div className="flex-1 overflow-auto flex flex-col justify-center"><div key={i} className="page-enter w-full max-w-5xl mx-auto px-8 py-8"><Slide/></div></div>

          <div className="flex-shrink-0 border-t px-6 py-3.5 flex items-center justify-between wow-no-print" style={{ borderColor: "rgba(29,39,53,0.08)", background: "rgba(255,255,255,0.5)" }}>
            <button onClick={() => go(-1)} disabled={i === 0} className="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-[13px] font-semibold hover:bg-black/[0.04] transition disabled:opacity-30 disabled:cursor-not-allowed" style={{ color: WOW_SUB }}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Précédent</button>
            <div className="text-[12px] num font-semibold" style={{ color: WOW_SUB }}>{i + 1} / {N}</div>
            {i < N - 1 ? (
              <button onClick={() => go(1)} className="inline-flex items-center gap-2 px-5 py-2 rounded-lg text-[13px] font-bold text-white shadow transition" style={{ background: `linear-gradient(135deg,#a07f3f,${WOW_GOLD})` }}>Suivant <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
            ) : (
              <button onClick={onClose} className="inline-flex items-center gap-2 px-5 py-2 rounded-lg text-[13px] font-bold text-white shadow transition" style={{ background: WOW_TEAL }}>Terminer</button>
            )}
          </div>
        </div>
      );
      return ReactDOM.createPortal(content, document.body);
    }

    // ============================================================
    // BENCHMARK TABLE — vue d'ensemble visuelle (3 KPI clés en barres)
    // ============================================================
    function BenchmarkTable({ allCols, livretCol, refLabel, inputs, scenarioLvl }) {
      const refWord = inputs.produit === "per" ? "PER seul" : (refLabel || (inputs.produit === "capi" ? "CAT" : "livret"));
      const KPIS = inputs.produit === "capi"
        ? [
            { key: 'capital',  label: 'Capital final',       sub: 'à terme',                    getValue: c => c.capital,        suffix: '' },
            { key: 'pv',       label: 'Plus-value',          sub: 'capitalisée sur la durée',   getValue: c => Math.max(0, c.capital - c.versements), suffix: '' },
          ]
        : inputs.produit === 'per'
        ? [
            { key: 'capital', label: 'Capital final', sub: 'dont coût réel pour l\'épargnant (barre inférieure)',
              getValue: c => c.capital, suffix: '', barOverride: null,
              // Barre secondaire : coût réel sur la même échelle que le capital
              secondary: {
                key: 'coutReel', label: 'Coût réel pour l\'épargnant',
                getValue: c => c.coutReel ?? c.versements,
                pctOf: c => c.capital > 0 ? (c.coutReel ?? c.versements) / c.capital : null,
                barOverride: () => 'linear-gradient(135deg, #c4bfbb, #a8a29e)',
              },
            },
            { key: 'reduc', label: 'Réduction d\'impôt', sub: 'économie fiscale cumulée',
              getValue: c => c.reductionImpotCumulee || 0, suffix: '',
              barOverride: col => col.type === 'livret'     ? 'linear-gradient(135deg, #a8a29e, #78716c)'
                : col.type === 'perReinvest' ? 'linear-gradient(135deg, #7c3aed, #6d28d9)'
                : col.type === 'solution'    ? 'linear-gradient(135deg, #8b5cf6, #7c3aed)'
                : 'linear-gradient(135deg, #a78bfa, #8b5cf6)',
            },
            { key: 'rente', label: 'Rente brute', sub: 'à vie, par mois', getValue: c => c.renteNetteMois, suffix: '/mois', barOverride: null },
          ]
        : [
            { key: 'capital',  label: 'Capital final',         sub: 'à terme du contrat',   getValue: c => c.capital,        suffix: '', barOverride: null },
            { key: 'transmis', label: 'Transmission nette',    sub: 'aux bénéficiaires',    getValue: c => c.netTransmis,    suffix: '', barOverride: null },
            { key: 'rente',    label: 'Rente brute',           sub: 'à vie, par mois', getValue: c => c.renteNetteMois, suffix: '/mois', barOverride: null },
          ];
      // Palette riche, gradients pour les barres ; couleur unie pour les pastilles de légende
      const colBar = (col) => col.type === 'livret' ? 'linear-gradient(135deg, #a8a29e, #78716c)'
        : col.type === 'autreAV' ? 'linear-gradient(135deg, #64748b, #475569)'  // ardoise — autre AV
        : col.type === 'perReinvest' ? 'linear-gradient(135deg, #14b8a6, #0d9488)'  // teal — PER+Réintégration
        : col.type === 'solution' ? 'linear-gradient(135deg, #10b981, #0d9488)'
        : [
            'linear-gradient(135deg, #6366f1, #8b5cf6)',  // indigo → violet
            'linear-gradient(135deg, #ec4899, #f43f5e)',  // pink → rose
            'linear-gradient(135deg, #f59e0b, #ef4444)',  // amber → red
            'linear-gradient(135deg, #06b6d4, #3b82f6)',  // cyan → blue
          ][(col.colorIndex || 1) - 1];
      const colDot = (col) => col.type === 'livret' ? '#78716c'
        : col.type === 'autreAV' ? '#475569'
        : col.type === 'perReinvest' ? '#0d9488'
        : col.type === 'solution' ? '#0d9488'
        : ['#6366f1','#ec4899','#f59e0b','#06b6d4'][(col.colorIndex || 1) - 1];
      const lvlLabel = scenarioLvl === 'med' ? 'médian' : scenarioLvl === 'pess' ? 'pessimiste' : 'optimiste';

      return (
        <div className="bg-white border border-stone-200 rounded-2xl p-5 md:p-6 mb-2 shadow-sm relative overflow-hidden">
          {/* Liseré rouge brand Figara en haut */}
          <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-red-700 via-red-500 to-red-700"></div>
          {/* Petit filigrane rouge en haut-droite */}
          <svg className="absolute top-1 right-0 pointer-events-none" width="180" height="120" viewBox="0 0 180 120" fill="none" style={{opacity: 0.35}}>
            {Array.from({length: 10}).map((_, i) => {
              const yBase = 12 + i * 8;
              return (
                <path
                  key={i}
                  d={`M 180 ${yBase} C 130 ${yBase - 6}, 80 ${yBase + 14}, 30 ${yBase - 4} S -20 ${yBase + 6}, -50 ${yBase}`}
                  stroke="#DC2626"
                  strokeWidth="0.6"
                  strokeOpacity={Math.max(0.1, 0.6 - i * 0.05)}
                  fill="none"
                />
              );
            })}
          </svg>

          <div className="relative flex items-baseline justify-between mb-5 flex-wrap gap-2">
            <div>
              <div className="text-[11px] uppercase tracking-widest font-bold text-red-600 mb-0.5">Tableau comparatif</div>
              <div className="text-[14px] font-bold text-stone-900">Vue d'ensemble en un coup d'œil</div>
            </div>
            <div className="text-[11px] text-stone-500">Sur <strong className="text-stone-900 num">{inputs.dureeAnnees} ans</strong> · scénario <strong className="text-stone-900">{lvlLabel}</strong></div>
          </div>

          <div className="space-y-6">
            {KPIS.map(kpi => {
              const values = allCols.map(c => kpi.getValue(c));
              const max = Math.max(...values, 1);
              // En PER, le delta de référence pour mesurer le bonus = la SOLUTION (PER seul).
              // En AV/Capi, le delta de référence = le livret/CAT.
              const refForDelta = inputs.produit === 'per'
                ? (allCols.find(c => c.type === 'solution') || livretCol)
                : livretCol;
              const livretValue = kpi.getValue(refForDelta);
              // En PER, le "gagnant" se choisit parmi toutes les colonnes y compris la PER+Réintégration.
              const winnerVal = Math.max(...allCols.filter(c => inputs.produit === 'per' ? true : c !== livretCol).map(kpi.getValue));

              return (
                <div key={kpi.key}>
                  <div className="flex items-center justify-between mb-4 pb-3 border-b border-stone-100">
                    {/* Titre KPI encadré gras façon brand Figara */}
                    <div className="inline-flex items-center gap-2 px-3 py-1.5 bg-stone-900 rounded-lg shadow-sm">
                      <div className="w-1 h-4 bg-red-500 rounded-full"></div>
                      <div className="text-[13px] font-extrabold uppercase tracking-wide text-white">{kpi.label}</div>
                    </div>
                  </div>

                  <div className="space-y-2.5">
                    {allCols.map((col, i) => {
                      const val = kpi.getValue(col);
                      const pct = (val / max) * 100;
                      const delta = val - livretValue;
                      const ratio = livretValue > 0 ? val / livretValue : null;
                      const isLivret = col === livretCol;
                      const isPerRef = col.type === 'perReinvest';
                      const isReference = isLivret;
                      const isWinner = inputs.produit === 'per'
                        ? (val === winnerVal && allCols.length > 1 && val > 0)
                        : (!isLivret && val === winnerVal && allCols.length > 1 && val > livretValue);
                      // Utiliser la couleur spécifique au KPI si définie (ex. jauge réduction d'impôt)
                      const bg = kpi.barOverride ? kpi.barOverride(col) : colBar(col);

                      const deltaColor = delta > 0 ? 'text-emerald-700' : delta < 0 ? 'text-red-600' : 'text-stone-500';
                      return (
                        <div key={i} className={`flex items-center gap-3 transition ${isWinner ? '-mx-2 px-2 py-1.5 rounded-xl bg-gradient-to-r from-amber-50/80 via-amber-50/40 to-emerald-50/60 ring-1 ring-amber-200' : ''}`}>
                          {/* Label */}
                          <div className="w-28 md:w-40 flex items-center gap-1.5 flex-shrink-0">
                            <span className="w-1.5 h-7 rounded-full flex-shrink-0" style={{background: bg}}></span>
                            <div className="min-w-0">
                              <div className={`text-[12px] font-bold truncate ${isLivret ? 'text-stone-500' : 'text-stone-900'}`}>{col.name}</div>
                              <div className="text-[10px] text-stone-400 truncate">{isLivret ? '' : isPerRef ? 'avec réinvest. réductions' : col.type === 'solution' ? 'votre proposition' : 'scénario'}</div>
                            </div>
                          </div>

                          {/* Bar(s) — barre principale + éventuelle barre secondaire (coût réel) */}
                          <div className="flex-1 flex flex-col gap-1">
                            {/* Barre principale */}
                            <div className="relative h-9 rounded-lg overflow-hidden bg-gradient-to-r from-stone-50 to-stone-100 ring-1 ring-stone-200/60">
                              <div className="absolute inset-0 flex pointer-events-none">
                                {[0,1,2,3].map(t => (
                                  <div key={t} className="flex-1 border-l border-stone-300/50" style={{borderLeftStyle: t === 0 ? 'none' : 'solid'}}></div>
                                ))}
                              </div>
                              <div className="absolute inset-y-0 left-0 transition-all duration-500 flex items-center justify-end pr-2.5 shadow-sm"
                                style={{ width: `${Math.max(2, pct)}%`, background: bg }}>
                                {pct >= 35 && (
                                  <span className="num text-[12px] font-bold text-white whitespace-nowrap drop-shadow-sm">
                                    {fmtEUR(val)}{kpi.suffix}
                                  </span>
                                )}
                              </div>
                              {pct < 35 && (
                                <span className="num absolute top-1/2 -translate-y-1/2 text-[12px] font-bold text-stone-900 whitespace-nowrap"
                                  style={{ left: `calc(${Math.max(2, pct)}% + 8px)` }}>
                                  {fmtEUR(val)}{kpi.suffix}
                                </span>
                              )}
                            </div>
                            {/* Barre secondaire (coût réel) — même échelle que la barre principale */}
                            {kpi.secondary && (() => {
                              const secVal = kpi.secondary.getValue(col);
                              const secPct = (secVal / max) * 100;
                              const secBg = kpi.secondary.barOverride ? kpi.secondary.barOverride(col) : colBar(col);
                              return (
                                <div className="relative h-5 rounded-md overflow-hidden ring-1 ring-stone-200/40" style={{background:'#f8f7f6'}}>
                                  <div className="absolute inset-0 flex pointer-events-none">
                                    {[0,1,2,3].map(t => (
                                      <div key={t} className="flex-1 border-l border-stone-200/40" style={{borderLeftStyle: t === 0 ? 'none' : 'solid'}}></div>
                                    ))}
                                  </div>
                                  {/* Barre colorée sans texte dedans */}
                                  <div className="absolute inset-y-0 left-0"
                                    style={{width:`${Math.max(1, secPct)}%`, background: secBg}}>
                                  </div>
                                  {/* Valeur + libellé toujours à l'extérieur, après la barre */}
                                  <span className="absolute top-1/2 -translate-y-1/2 whitespace-nowrap flex items-baseline gap-1"
                                    style={{left:`calc(${Math.max(1, secPct)}% + 6px)`}}>
                                    <span className="num text-[10px] font-semibold text-stone-700">{fmtEUR(secVal)}</span>
                                    <span className="text-[9px] text-stone-400 font-normal">· coût réel pour l'épargnant</span>
                                  </span>
                                </div>
                              );
                            })()}
                          </div>

                          {/* Bloc droit : % coût réel/capital pour KPI avec secondary ; trophée+delta pour les autres */}
                          <div className="w-44 md:w-60 flex-shrink-0 flex justify-end items-center">
                            {(!isLivret || inputs.produit === 'per') && (() => {
                              // KPI avec barre secondaire (capital + coût réel) → affiche % du capital en badge coloré
                              if (kpi.secondary) {
                                const secVal = kpi.secondary.getValue(col);
                                const pctNum = col.capital > 0 ? Math.round(secVal / col.capital * 100) : null;
                                const pctColor = pctNum !== null
                                  ? (pctNum < 40 ? 'text-emerald-700' : pctNum < 60 ? 'text-amber-700' : 'text-stone-500')
                                  : 'text-stone-400';
                                return (
                                  <div className="text-right">
                                    <div className={`num font-extrabold text-[17px] ${pctColor} leading-none`}>
                                      {pctNum !== null ? `${pctNum}%` : '—'}
                                    </div>
                                    <div className="text-[10px] text-stone-400 mt-0.5">coût réel / capital</div>
                                  </div>
                                );
                              }
                              // KPI standard → trophée + delta
                              return isWinner ? (
                                <div className="inline-flex items-center gap-2 px-2 py-1.5 rounded-lg bg-gradient-to-r from-amber-50 via-amber-50/70 to-emerald-50/70 border border-amber-300 shadow-sm">
                                  <span className="inline-flex items-center justify-center gap-1 px-2 py-1 rounded-md bg-white border-2 border-stone-900 text-stone-900 text-[10px] font-black uppercase tracking-wide whitespace-nowrap shadow-sm" title="Meilleur sur ce critère">
                                    <I.trophy/>
                                    <span>{isPerRef ? 'PER+Réinvest' : col.type === 'solution' ? (inputs.produit === 'per' ? 'PER' : inputs.produit === 'capi' ? 'Capi PM' : 'Ass Vie') : col.name}</span>
                                  </span>
                                  <div className="text-right">
                                    <div className="num text-[15px] font-extrabold text-emerald-700 leading-none whitespace-nowrap">{delta >= 0 ? '+' : ''}{fmtEUR(delta)}</div>
                                    <div className="text-[10px] text-stone-500 font-semibold leading-tight mt-0.5">vs {refWord}</div>
                                  </div>
                                </div>
                              ) : (
                                <div className="text-right">
                                  <div className={`num font-bold text-[13px] ${deltaColor}`}>{delta > 0 ? '+' : ''}{fmtEUR(delta)}</div>
                                  <div className="text-[10px] text-stone-400">{ratio !== null ? `×${ratio.toFixed(2)} vs ${refWord}` : `vs ${refWord}`}</div>
                                </div>
                              );
                            })()}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {/* Échelle de référence sous les barres */}
                  <div className="flex items-center gap-3 mt-2 text-[9px] text-stone-400 font-medium">
                    <div className="w-28 md:w-40 flex-shrink-0"></div>
                    <div className="flex-1 flex justify-between px-1">
                      <span>0</span>
                      <span>{fmtEURc(max*0.25)}</span>
                      <span>{fmtEURc(max*0.5)}</span>
                      <span>{fmtEURc(max*0.75)}</span>
                      <span>{fmtEURc(max)}</span>
                    </div>
                    <div className="w-44 md:w-60 flex-shrink-0"></div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Légende */}
          <div className="mt-5 pt-4 border-t border-stone-100 flex items-center justify-between flex-wrap gap-3 text-[11px]">
            <div className="flex items-center gap-4 flex-wrap text-stone-500">
              {inputs.produit === 'per' ? (
                <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-teal-500"></span>PER + Réintégration des réductions</span>
              ) : (
                <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-stone-400"></span>Référence ({refWord})</span>
              )}
              <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-stone-900"></span>Solution {inputs.produit === 'per' ? 'PER' : inputs.produit === 'capi' ? 'Capi PM' : 'Ass Vie'}</span>
              <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-emerald-700"></span>Scénarios</span>
            </div>
            <div className="text-stone-400">Barres proportionnelles à la valeur la plus élevée par critère</div>
          </div>
        </div>
      );
    }

    // ============================================================
    // DETAIL — sous-composants partagés (titres uniques au centre)
    // ============================================================
    // En mode PER, on intervertit le styling pour que la SOLUTION PREMIUM (PER + Réintégration)
    // porte le dégradé émeraude (à droite) et que la Solution PER seule porte un fond blanc neutre (à gauche).
    // → `perReinvest` est traité comme une "solution" et `solution` dans le contexte PER prend le rôle "référence".
    const isSolutionVisual = (col) => col.type === 'perReinvest' || (col.type === 'solution' && !col.isPER);
    const isWhiteVisual = (col) => col.type === 'livret' || (col.type === 'solution' && col.isPER);

    function colAccent(col) {
      if (col.type === 'livret') return '#78716c';
      if (col.type === 'autreAV') return '#475569';
      if (col.type === 'perReinvest') return '#10b981';
      if (col.type === 'solution') return col.isPER ? '#78716c' : '#10b981';
      return ['#6366f1','#ec4899','#f59e0b','#06b6d4'][col.colorIndex - 1];
    }
    function colCardBg(col) {
      // Livret = fond blanc pur (encadré avec trait noir)
      if (col.type === 'livret') return '#ffffff';
      // Autre assurance vie (comparateur) = léger fond ardoise
      if (col.type === 'autreAV') return 'linear-gradient(180deg, #f1f5f9 0%, #ffffff 70%)';
      // Solution PER (mode PER) = fond blanc neutre (la "référence" du couple PER)
      if (col.type === 'solution' && col.isPER) return '#ffffff';
      // PER + Réintégration = dégradé émeraude joyeux (couleur de la solution premium)
      if (col.type === 'perReinvest') return 'linear-gradient(180deg, rgba(6, 95, 70, 0.95) 0%, rgba(4, 120, 87, 0.90) 60%, rgba(16, 185, 129, 0.85) 100%)';
      // Solution AV/Capi = dégradé émeraude joyeux
      if (col.type === 'solution') return 'linear-gradient(180deg, rgba(6, 95, 70, 0.95) 0%, rgba(4, 120, 87, 0.90) 60%, rgba(16, 185, 129, 0.85) 100%)';
      const gradients = [
        'linear-gradient(180deg, #eef2ff 0%, #ffffff 70%)',
        'linear-gradient(180deg, #fdf2f8 0%, #ffffff 70%)',
        'linear-gradient(180deg, #fffbeb 0%, #ffffff 70%)',
        'linear-gradient(180deg, #ecfeff 0%, #ffffff 70%)',
      ];
      return gradients[col.colorIndex - 1];
    }
    function colCardBorder(col) {
      // Livret : trait noir épais. Solution PER : trait noir épais (rôle référence). PER+Réinvest : émeraude foncé. Solution : émeraude. Scénarios : teinte d'accent.
      if (col.type === 'livret') return '#0c0a09';
      if (col.type === 'autreAV') return '#475569';
      if (col.type === 'solution' && col.isPER) return '#0c0a09';
      if (col.type === 'perReinvest') return '#047857';
      if (col.type === 'solution') return '#047857';
      return ['#6366f1','#ec4899','#f59e0b','#06b6d4'][col.colorIndex - 1];
    }
    const colTextMain = (col) => isSolutionVisual(col) ? 'text-white' : 'text-stone-900';
    const colTextSec  = (col) => isSolutionVisual(col) ? 'text-emerald-100' : 'text-stone-500';
    const colTextMuted = (col) => isSolutionVisual(col) ? 'text-emerald-200/70' : 'text-stone-400';
    const colDivider = (col) => isSolutionVisual(col) ? 'border-emerald-700/40' : 'border-stone-200';

    function ColCard({ col, children, className = '', noPadding = false, style = {} }) {
      return (
        <div className={`rounded-xl border-2 ${noPadding ? '' : 'p-5'} ${className}`} style={{background: colCardBg(col), borderColor: colCardBorder(col), ...style}}>
          {children}
        </div>
      );
    }

    function SharedSectionTitle({ children, sub, highlight, controls }) {
      // Variante highlight (Capital net pour les bénéficiaires) : gold/emerald — compact
      if (highlight) {
        return (
          <div className="my-3 px-4 py-2 rounded-xl text-center relative overflow-hidden bg-gradient-to-r from-amber-50 via-emerald-50 to-amber-50 border border-emerald-300 shadow-sm">
            <div className="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-amber-400 via-emerald-500 to-amber-400"></div>
            <div className="text-[11px] md:text-[12px] font-extrabold tracking-wider uppercase text-emerald-800">{children}</div>
            {sub && <div className="text-[10px] text-emerald-700/70 font-medium mt-0.5">{sub}</div>}
            {controls && <div className="mt-2 flex justify-center">{controls}</div>}
          </div>
        );
      }
      // Variante par défaut : bandeau noir transparent + liseré rouge + filigrane brand sur la droite
      return (
        <div className="my-5 rounded-2xl relative overflow-hidden shadow-lg"
          style={{background: 'linear-gradient(135deg, rgba(28, 25, 23, 0.93) 0%, rgba(41, 37, 36, 0.90) 50%, rgba(46, 33, 32, 0.93) 100%)'}}>
          {/* Liseré rouge brand en haut */}
          <div className="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-red-700 via-red-500 to-red-700"></div>
          {/* Filigrane rouge décoratif côté droit */}
          <svg className="absolute top-0 right-0 h-full pointer-events-none" width="260" height="100%" viewBox="0 0 260 80" preserveAspectRatio="xMaxYMid slice" fill="none" style={{opacity: 0.45}}>
            {Array.from({length: 14}).map((_, i) => {
              const yBase = 6 + i * 6;
              return (
                <path
                  key={i}
                  d={`M 260 ${yBase} C 200 ${yBase - 6}, 130 ${yBase + 14}, 60 ${yBase - 4} S -10 ${yBase + 6}, -50 ${yBase}`}
                  stroke="#EF4444"
                  strokeWidth="0.6"
                  strokeOpacity={Math.max(0.1, 0.75 - i * 0.05)}
                  fill="none"
                />
              );
            })}
          </svg>
          <div className="relative px-6 py-4">
            {controls ? (
              /* Avec contrôles : layout side-by-side (titre gauche + contrôles droite) — bandeau plus fin */
              <div className="flex items-center justify-between gap-4 flex-wrap">
                <div className="text-left">
                  <div className="text-[17px] md:text-[19px] font-extrabold tracking-tight uppercase text-white">{children}</div>
                  {sub && <div className="text-[11px] text-stone-300 font-medium mt-0.5">{sub}</div>}
                </div>
                <div className="flex-shrink-0">{controls}</div>
              </div>
            ) : (
              /* Sans contrôles : titre centré */
              <div className="text-center">
                <div className="text-[17px] md:text-[19px] font-extrabold tracking-tight uppercase text-white">{children}</div>
                {sub && <div className="text-[11px] text-stone-300 font-medium mt-1">{sub}</div>}
              </div>
            )}
          </div>
        </div>
      );
    }

    // Contrôles succession compacts (intégrés dans le titre dark "En cas de décès")
    // Ligne directe → taux forfaitaire barème (30 % par défaut)
    // Ligne indirecte → taux forfaitaire sélectionnable (60 % par défaut)
    function SuccessionControls({ inputs, upd }) {
      return (
        <div className="inline-flex items-center gap-2 flex-wrap bg-white/10 backdrop-blur-sm rounded-lg px-3 py-2 ring-1 ring-white/15">
          <span className="text-[10px] uppercase tracking-wider text-stone-200 font-bold">Droits succession</span>
          <div className="inline-flex bg-stone-900/40 rounded p-0.5 ring-1 ring-white/10">
            <button onClick={()=>upd('successionLine','directe')}
              className={`px-2.5 py-1 rounded text-[11px] font-bold transition whitespace-nowrap ${inputs.successionLine === 'directe' ? 'bg-white text-stone-900 shadow' : 'text-stone-300 hover:text-white'}`}>
              Directe
            </button>
            <button onClick={()=>upd('successionLine','indirecte')}
              className={`px-2.5 py-1 rounded text-[11px] font-bold transition whitespace-nowrap ${inputs.successionLine === 'indirecte' ? 'bg-white text-stone-900 shadow' : 'text-stone-300 hover:text-white'}`}>
              Indirecte
            </button>
          </div>
          {/* Ligne directe : taux du barème (30 % par défaut) */}
          {inputs.successionLine === 'directe' ? (
            <div className="flex items-center gap-1.5">
              <select
                value={inputs.successionTauxDirect ?? 0.30}
                onChange={e => upd('successionTauxDirect', parseFloat(e.target.value))}
                className="text-[11px] font-bold text-stone-900 px-2 py-1 bg-white border border-stone-200 rounded focus:outline-none">
                {[0.05, 0.10, 0.15, 0.20, 0.30, 0.40, 0.45].map(r => (
                  <option key={r} value={r}>{(r*100).toFixed(0)} %</option>
                ))}
              </select>
              <span className="text-[10px] text-white/70 italic">taux barème ligne directe</span>
            </div>
          ) : (
            /* Ligne indirecte : taux forfaitaire (60 % par défaut) */
            <select
              value={inputs.successionTauxIndirect ?? 0.60}
              onChange={e => upd('successionTauxIndirect', parseFloat(e.target.value))}
              className="text-[11px] font-bold text-stone-900 px-2 py-1 bg-white border border-stone-200 rounded focus:outline-none">
              {[0.35, 0.45, 0.55, 0.60].map(r => (
                <option key={r} value={r}>{(r*100).toFixed(0)} %</option>
              ))}
            </select>
          )}
        </div>
      );
    }

    // Block fusionné : header (badge + nom + rendement) + données En cas de vie (épargne, plus-value, capital + intérêts en hero)
    function DetailHeaderInvestCell({ col, onRemove }) {
      const isLivret = col.type === 'livret';
      const isPerRef = col.type === 'perReinvest';
      const isSolution = col.type === 'solution';
      const isScenario = col.type === 'scenario';
      const isAutreAV = col.type === 'autreAV';
      // Plus-value sur réductions d'impôt (uniquement colonne PER + Réintégration)
      // = auxCap (portion PER financée par réinvestissements) − totReinvesti (montant effectivement réinvesti)
      const auxPV = isPerRef ? Math.max(0, (col.auxCap || 0) - (col.totReinvesti || 0)) : 0;
      // Plus-value « pure » à afficher : pour PER seul = sim.proj.plusValue ; pour PER+Réintégration on garde
      // sim.proj.plusValue (la PV du PER) et on affiche séparément la plus-value sur réductions.
      const pvCorePER = isPerRef ? Math.max(0, col.capital - col.versements) : col.plusValue;
      return (
        <ColCard col={col} className="text-center relative" style={{height:'100%', display:'flex', flexDirection:'column'}}>
          {(isScenario || isAutreAV) && onRemove && (
            <button onClick={onRemove} className={`absolute top-3 right-3 p-1 rounded transition no-print ${colTextSec(col)} hover:text-red-500 hover:bg-red-50/60`}><I.x/></button>
          )}
          <div className="inline-flex items-center gap-1 text-[9px] font-bold uppercase tracking-widest mb-1" style={{color: colAccent(col)}}>
            {isLivret && <><I.lock/> Référence</>}
            {isAutreAV && <><I.lock/> Comparateur</>}
            {isPerRef && <><I.sparkle/> PER + Réinvest.</>}
            {isSolution && <><I.sparkle/> Solution</>}
            {isScenario && <>Scénario</>}
          </div>
          <div className={`text-[16px] font-bold tracking-tight ${colTextMain(col)}`}>{col.name}</div>
          <div className={`text-[11px] ${colTextSec(col)} mt-0.5`}>
            {isLivret ? <>Rendement moyen sur 10 ans <span className="num font-semibold">{fmtPCT(col.rdt)}</span></>
              : <>Hypothèse de rendement <span className="num font-semibold">{fmtPCT(col.rdt)}</span></>}
          </div>

          {/* Données En cas de vie — Épargne · Plus-value */}
          <div className={`mt-3 pt-2.5 border-t ${colDivider(col)} space-y-1.5`}>
            <Row textPrimary={colTextMain(col)} textSecondary={colTextSec(col)} lbl="Épargne investie" val={fmtEUR(col.versements)} />
            <Row textPrimary={colTextMain(col)} textSecondary={colTextSec(col)} lbl="Plus-value" val={`+${fmtEUR(pvCorePER)}`} positive />
          </div>

          {/* Hero "Capital + intérêts" — remonté au-dessus du bloc réduction d'impôt */}
          <div className={`mt-2.5 pt-2.5 ${isSolutionVisual(col) ? '' : `border-t ${colDivider(col)}`}`}>
            <div className={isSolutionVisual(col) ? 'border-2 border-stone-900 rounded-xl bg-white px-4 py-2.5 shadow-md text-center' : ''}>
              <div className={`text-[11px] uppercase tracking-widest font-extrabold ${isSolutionVisual(col) ? 'text-stone-900' : colTextMain(col)} mb-1`}>Capital + intérêts</div>
              <div className={`num text-[26px] md:text-[28px] font-extrabold tracking-tightest ${isSolutionVisual(col) ? 'text-stone-900' : colTextMain(col)} leading-none`}>{fmtEUR(col.capital)}</div>
            </div>
          </div>

          {/* Réduction d'impôt PER — SOUS le capital + intérêts */}
          {col.isPER && col.reductionImpotCumulee > 0 && (
            <div className="mt-3 rounded-xl overflow-hidden" style={{background:'linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%)', outline:'1.5px solid #c4b5fd'}}>
              <div className="px-3 pt-2.5 pb-2.5" style={{background:'linear-gradient(135deg, #7c3aed, #6d28d9)'}}>
                <div className="flex flex-col items-center gap-0.5 text-center">
                  <div className="text-[10px] font-extrabold text-white uppercase tracking-widest">Réduction d'impôt</div>
                  <div className="num text-[20px] font-extrabold text-white leading-none">+{fmtEUR(col.reductionImpotCumulee)}</div>
                  <div className="text-[9px] text-violet-200 font-normal">TMI {(col.tauxIRPct*100).toFixed(0)} %{isPerRef ? ' · levier composé' : ''}</div>
                </div>
              </div>
              <div className="flex items-stretch gap-0 px-2 py-2">
                <div className="flex-1 text-center px-2 py-1.5 rounded-lg" style={{background:'rgba(124,58,237,0.08)'}}>
                  <div className="num font-bold text-[13px]" style={{color:'#5b21b6'}}>{fmtEUR(col.reductionImpotAnnee1)}</div>
                  <div className="text-[9px] mt-0.5 font-medium" style={{color:'#7c3aed'}}>année 1</div>
                </div>
                <div className="flex items-center px-1" style={{color:'#c4b5fd', fontSize:'14px'}}>│</div>
                <div className="flex-1 text-center px-2 py-1.5 rounded-lg" style={{background:'rgba(124,58,237,0.08)'}}>
                  <div className="num font-bold text-[13px]" style={{color:'#5b21b6'}}>{fmtEUR(col.reductionImpotAnnuelle)}<span className="text-[10px] font-medium">/an</span></div>
                  <div className="text-[9px] mt-0.5 font-medium" style={{color:'#7c3aed'}}>années suivantes</div>
                </div>
              </div>
            </div>
          )}
        </ColCard>
      );
    }

    function DetailDecesCell({ col, isBest }) {
      const isLivret = col.type === 'livret';
      const isPerRef = col.type === 'perReinvest';
      const isSolution = col.type === 'solution';
      // En PER, l'inversion visuelle place le fond émeraude sur perReinvest et le fond blanc sur solution.
      // Sur les cadres verts (perReinvest / solution AV-Capi), le MONTANT du capital net est forcé en
      // noir + extrabold pour ressortir fortement sur le fond émeraude.
      const heritValueClass = isLivret
        ? 'text-stone-700'
        : isPerRef
        ? 'text-stone-900'    // cadre vert (PER + Réintégration) → noir gras
        : (isSolution && col.isPER)
        ? 'text-stone-900'    // sur fond blanc (solution PER = référence)
        : isSolution ? 'text-stone-900'  // cadre vert (solution AV/Capi) → noir gras
        : 'text-emerald-700';
      return (
        <ColCard col={col}>
          <div className="space-y-1.5">
            <Row textPrimary={colTextMain(col)} textSecondary={colTextSec(col)} lbl="Capital à transmettre" val={fmtEUR(col.capitalDeces)} />
            <div>
              <div className={`flex items-baseline justify-center gap-3 text-[12px] ${colTextSec(col)}`}>
                <span>Abattement</span>
                <span className={`num font-semibold ${colTextMain(col)}`}>{col.abattement === 0 ? '0 €' : `−${fmtEUR(col.abattement)}`}</span>
              </div>
              <div className={`text-[10px] mt-0.5 text-center ${colTextMuted(col)}`}>{col.abattDetail}</div>
            </div>
            <Row textPrimary={colTextMain(col)} textSecondary={colTextSec(col)} lbl="Droits de succession" val={col.taxe === 0 ? '0 €' : `−${fmtEUR(col.taxe)}`} negative={col.taxe > 0} muted={col.taxe === 0} />
          </div>
          {/* Capital net pour les héritiers — sur cadres verts, encadré noir épais + fond blanc */}
          <div className={`mt-2.5 pt-2.5 ${isSolutionVisual(col) ? '' : `border-t ${colDivider(col)}`} text-center`}>
            <div className={isSolutionVisual(col) ? 'border-2 border-stone-900 rounded-xl bg-white px-4 py-2.5 shadow-md' : ''}>
              <div className={`text-[11px] uppercase tracking-widest font-extrabold ${isSolutionVisual(col) ? 'text-stone-900' : colTextMain(col)} mb-1`}>Capital net pour les héritiers</div>
              <div className={`num text-[26px] md:text-[28px] font-extrabold tracking-tightest ${heritValueClass} leading-none`}>{fmtEUR(col.netTransmis)}</div>
            </div>
            {isBest && !isLivret && (
              <div className="mt-2 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-gradient-to-r from-amber-300 via-amber-400 to-amber-500 text-white text-[10px] font-bold shadow-md ring-2 ring-amber-300/40">
                <I.trophy/> Meilleur
              </div>
            )}
          </div>
        </ColCard>
      );
    }

    function DetailNetCell({ col, isBest }) {
      const isLivret = col.type === 'livret';
      const isPerRef = col.type === 'perReinvest';
      const isSolution = col.type === 'solution';
      const valueClass = isLivret
        ? 'text-stone-700'
        : isPerRef
        ? 'text-emerald-300'
        : (isSolution && col.isPER)
        ? 'text-stone-900'
        : isSolution ? 'text-emerald-300' : 'text-emerald-700';
      return (
        <ColCard col={col} className="text-center">
          <div className={`num text-[30px] md:text-[34px] font-bold tracking-tightest ${valueClass} leading-none`}>{fmtEUR(col.netTransmis)}</div>

    function DetailRenteCell({ col, isBest }) {
      // Rente perpétuelle réelle = capital × taux mensuel équivalent (cap × rm) — pas cap × rdt / 12 (génère une durée finie ~74 ans à cause de la capitalisation)
      const perpRenteMois = col.capital > 0 && col.rdt > 0 ? col.capital * (Math.pow(1 + col.rdt, 1/12) - 1) : 0;
      const [targetRente, setTargetRente] = useState(perpRenteMois);
      useEffect(() => { setTargetRente(perpRenteMois); }, [perpRenteMois]);
      // Slider : début à l'euro précis (perpRenteMois exact), step 1 €,
      // mais à partir de +100 € on snap automatiquement à des multiples de 50 €
      const sliderMin = Math.max(0, Math.floor(perpRenteMois));
      // Max du curseur = rente qui épuise le capital en 5 ans (formule d'annuité).
      // Au-delà de la rente perpétuelle, plus on monte, plus la durée de distribution baisse — jusqu'à 5 ans restants.
      const rmSlider = col.capital > 0 && col.rdt > 0 ? Math.pow(1 + col.rdt, 1/12) - 1 : 0;
      const N5 = 60; // 5 ans en mois
      const renteEpuise5 = rmSlider > 0 ? col.capital * rmSlider / (1 - Math.pow(1 + rmSlider, -N5)) : (col.capital / N5);
      const sliderMax = Math.max(Math.ceil(renteEpuise5 / 50) * 50, sliderMin + 1000);
      const dur = distributionYears(col.capital, col.rdt, targetRente);
      const isPerpetual = !isFinite(dur);
      const durYears = isPerpetual ? null : Math.floor(dur);
      const durMonths = isPerpetual ? null : Math.round((dur - durYears) * 12);
      // PER : la rente nette et la fiscalité dépendent du RFR du foyer (régime pensions)
      // → on n'affiche QUE la rente brute indicative
      const isPER_col = col.isPER === true;
      // Fraction de plus-value du contrat (assiette taxable), déduite de la CSG de base (linéaire, sans seuil)
      const qpvRente = (!isPER_col && col.renteBrute > 0) ? ((col.renteImpotPS || 0) / col.renteBrute) / PS : 0;
      const abRenteAnnuel = col.renteAb || 0;
      // Assiette annuelle de plus-value pour la rente CIBLE (slider) — recalculée à chaque valeur
      const annualPVRente = targetRente * 12 * qpvRente;
      // Seuil 150 000 € de primes (art. 200 A) : la fraction de gains rattachée aux primes
      //   ≤ 150 000 € est taxée à 7,5 %, l'excédent à 12,8 %. Taux PFL mixte pondéré.
      const primesTot = col.versements || 0;
      const frac128 = primesTot > 150000 ? (primesTot - 150000) / primesTot : 0;
      const tauxPFL = PFL_AV_8 * (1 - frac128) + 0.128 * frac128;
      // IR recalculé au niveau de la rente cible (respecte le seuil d'abattement 4 600 / 9 200 €).
      //   ≥ 8 ans → PFL mixte (7,5 %/12,8 %) sur la plus-value AU-DELÀ de l'abattement.
      //   < 8 ans → PFU, part IR 12,8 %.
      const targetIRMois = isPER_col ? 0 : (col.rentePlus8
        ? Math.max(0, annualPVRente - abRenteAnnuel) * tauxPFL / 12
        : annualPVRente * 0.128 / 12);
      const targetPSMois = isPER_col ? 0 : annualPVRente * PS / 12;
      const targetFiscMois = targetIRMois; // fiscalité affichée = impôt sur le revenu uniquement (hors CSG)
      const targetNetMois = targetRente - targetFiscMois;
      // Détermine si la cellule est visuellement émeraude (solution AV/Capi OU perReinvest en PER)
      const isDark = col.type === 'perReinvest' || (col.type === 'solution' && !col.isPER);

      return (
        <ColCard col={col}>
          <div className="space-y-3">
            {/* Rente mensuelle brute — label MIS EN VALEUR */}
            <div className="text-center">
              <div className={`text-[12px] uppercase tracking-widest font-extrabold ${colTextMain(col)} mb-1`}>Rente mensuelle brute</div>
              <div className={`num text-[26px] font-extrabold tracking-tightest ${colTextMain(col)} leading-none`}>
                {fmtEUR(targetRente)}<span className="text-sm font-medium opacity-60"> /mois</span>
              </div>
            </div>

            {/* Slider */}
            <div className="no-print pt-1">
              <input type="range" min={sliderMin} max={sliderMax} step={1} value={Math.min(Math.max(targetRente, sliderMin), sliderMax)}
                onChange={e=>{
                  const v = parseFloat(e.target.value);
                  // Première fenêtre de 100 € depuis le min : valeur précise à l'euro
                  // Au-delà : snap au pas de 50 €
                  if (v - sliderMin <= 100) {
                    setTargetRente(v);
                  } else {
                    setTargetRente(Math.round(v / 50) * 50);
                  }
                }}
                className="slider"
                style={(() => {
                  const pct = sliderMax > sliderMin ? ((Math.min(Math.max(targetRente, sliderMin), sliderMax) - sliderMin) / (sliderMax - sliderMin)) * 100 : 0;
                  const dark = isSolutionVisual(col);
                  const fill = dark ? '#ffffff' : '#10b981';
                  const rest = dark ? 'rgba(255,255,255,0.25)' : '#e7e5e4';
                  return { background: `linear-gradient(to right, ${fill} 0%, ${fill} ${pct}%, ${rest} ${pct}%, ${rest} 100%)` };
                })()} />
              <div className={`relative text-[9px] font-medium mt-1 ${colTextMuted(col)}`} style={{height:'14px'}}>
                <span style={{position:'absolute', left:'11px', transform:'translateX(-50%)'}}>à vie</span>
                <span style={{position:'absolute', right:'11px', transform:'translateX(50%)'}}>{fmtEURc(sliderMax)} /mois</span>
              </div>
            </div>

            {/* Fiscalité et rente nette — UNIQUEMENT pour AV. Aucun commentaire sur PER. */}
            {!isPER_col && (
              <>
                {/* Fiscalité (IR) réduite en largeur + petit bloc CSG/RDS séparé par un « + » */}
                <div className="flex items-stretch gap-2">
                  <div className={`flex-1 rounded-xl px-3 py-2.5 ${isDark ? 'bg-black/20 ring-1 ring-white/15' : 'bg-stone-50 ring-1 ring-stone-200'}`}>
                    <div className="flex items-center justify-between gap-2">
                      <span className={`text-[12px] ${isDark ? 'text-white/85' : 'text-stone-600'}`}>Fiscalité</span>
                      <span className={`num font-bold text-[14px] ${isDark ? 'text-white' : 'text-stone-900'}`}>{targetIRMois <= 0.5 ? '0 €' : `−${fmtEUR(targetIRMois * 12)} /an`}</span>
                    </div>
                    {col.type !== 'livret' && col.rentePlus8 && targetIRMois <= 0.5 && (
                      <div className={`text-[10px] font-bold leading-snug mt-0.5 ${isDark ? 'text-white/85' : 'text-stone-700'}`}>
                        Exonéré — abattement {fmtEUR(col.renteAb || 0)}/an
                      </div>
                    )}
                  </div>
                  <div className={`flex items-center font-bold text-[16px] ${isDark ? 'text-white/70' : 'text-stone-400'}`}>+</div>
                  <div className={`rounded-xl px-3 py-2.5 flex flex-col justify-center text-center ${isDark ? 'bg-black/20 ring-1 ring-white/15' : 'bg-stone-50 ring-1 ring-stone-200'}`}>
                    <span className={`text-[12px] leading-none ${isDark ? 'text-white/85' : 'text-stone-600'}`}>CSG/RDS</span>
                    <span className={`num font-bold text-[13px] leading-none mt-0.5 ${isDark ? 'text-white' : 'text-stone-900'}`}>17,2 %</span>
                  </div>
                </div>

                {/* Rente brute — encadré émeraude prominent, label MIS EN VALEUR */}
                <div className={`rounded-xl px-4 py-3.5 text-center border-2 ${isDark ? 'bg-emerald-900/40 border-emerald-700/60' : 'bg-emerald-50 border-emerald-200'}`}>
                  <div className={`text-[12px] uppercase tracking-widest font-extrabold ${isDark ? 'text-white' : 'text-emerald-900'} mb-1.5`}>Rente nette</div>
                  <div className={`num text-[30px] md:text-[32px] font-extrabold tracking-tightest ${isDark ? 'text-white' : 'text-emerald-700'} leading-none`}>
                    {fmtEUR(targetNetMois)}<span className={`text-sm font-medium ${isDark ? 'text-emerald-400/70' : 'text-emerald-600/80'}`}> /mois</span>
                  </div>
                  {isBest && col.type !== 'livret' && (
                    <div className="mt-2 inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-gradient-to-r from-amber-300 to-amber-500 text-white text-[9px] font-bold shadow-sm">
                      <I.trophy/> Meilleur
                    </div>
                  )}
                </div>
              </>
            )}

            {/* Durée — label MIS EN VALEUR */}
            <div className={`pt-3 border-t ${colDivider(col)} text-center`}>
              <div className={`text-[12px] uppercase tracking-widest font-extrabold ${colTextMain(col)} mb-1`}>Durée de distribution</div>
              <div className={`num text-[24px] font-extrabold tracking-tightest ${colTextMain(col)} leading-none`}>
                {isPerpetual ? <>À vie <span className="text-base font-medium opacity-60">∞</span></>
                  : durYears >= 1 ? <>{durYears}<span className="text-base font-medium opacity-60"> {durYears > 1 ? 'ans' : 'an'}</span>{durMonths > 0 && <>{' '}{durMonths}<span className="text-base font-medium opacity-60"> mois</span></>}</>
                  : <>{Math.max(1, Math.round(dur * 12))}<span className="text-base font-medium opacity-60"> mois</span></>}
              </div>
              <div className={`text-[10px] mt-1 ${colTextMuted(col)}`}>
                {isPerpetual ? 'Rente à vie · capital préservé' : 'Capital épuisé à terme'}
              </div>
            </div>
          </div>
        </ColCard>
      );
    }

    // ============================================================
    // RESULT COLUMN — version legacy, conservée pour compat (non utilisée par défaut)
    // ============================================================
    // Calcule la durée (en années) pendant laquelle un capital peut servir une rente mensuelle donnée,
    // en supposant que le capital continue de fructifier au taux annuel net donné.
    // Retourne Infinity si la rente est inférieure ou égale au rendement (capital préservé).
    function distributionYears(capital, annualRdt, monthlyWithdrawal) {
      if (monthlyWithdrawal <= 0 || capital <= 0) return 0;
      const rm = Math.pow(1 + annualRdt, 1/12) - 1;
      if (rm <= 0) return capital / (monthlyWithdrawal * 12);
      const sustainable = capital * rm;
      if (monthlyWithdrawal <= sustainable + 0.001) return Infinity;
      const N = -Math.log(1 - capital * rm / monthlyWithdrawal) / Math.log(1 + rm);
      return N / 12;
    }

    function ResultColumn({ col, isBestSuccession, isBestRente, onLoad, onRemove, inputs }) {
      const isLivret = col.type === "livret";

      const accent = isLivret ? '#78716c' : isSolution ? '#10b981' : isScenario ? ['#6366f1','#ec4899','#f59e0b','#06b6d4'][col.colorIndex - 1] : '#10b981';

      // Slider rente — état local par colonne. Min = rente perpétuelle (capital préservé) ; on ne va que vers le haut.
      // Rente perpétuelle réelle = capital × taux mensuel équivalent (cap × rm) — pas cap × rdt / 12 (génère une durée finie ~74 ans à cause de la capitalisation)
      const perpRenteMois = col.capital > 0 && col.rdt > 0 ? col.capital * (Math.pow(1 + col.rdt, 1/12) - 1) : 0;
      const [targetRente, setTargetRente] = useState(perpRenteMois);
      useEffect(() => { setTargetRente(perpRenteMois); }, [perpRenteMois]);
      // Slider : début à l'euro précis (perpRenteMois exact), step 1 €,
      // mais à partir de +100 € on snap automatiquement à des multiples de 50 €
      const sliderMin = Math.max(0, Math.floor(perpRenteMois));
      // Max du curseur = rente qui épuise le capital en 5 ans (formule d'annuité).
      // Au-delà de la rente perpétuelle, plus on monte, plus la durée de distribution baisse — jusqu'à 5 ans restants.
      const rmSlider = col.capital > 0 && col.rdt > 0 ? Math.pow(1 + col.rdt, 1/12) - 1 : 0;
      const N5 = 60; // 5 ans en mois
      const renteEpuise5 = rmSlider > 0 ? col.capital * rmSlider / (1 - Math.pow(1 + rmSlider, -N5)) : (col.capital / N5);
      const sliderMax = Math.max(Math.ceil(renteEpuise5 / 50) * 50, sliderMin + 1000);
      const dur = distributionYears(col.capital, col.rdt, targetRente);
      const isPerpetual = !isFinite(dur);
      const durYears = isPerpetual ? null : Math.floor(dur);
      const durMonths = isPerpetual ? null : Math.round((dur - durYears) * 12);
      // Approximation linéaire de la fiscalité sur la rente cible (proportionnelle à la rente perpétuelle)
      const fiscRatio = col.renteBrute > 0 ? col.renteImpot / col.renteBrute : 0;
      const targetFiscMois = targetRente * fiscRatio;
      const targetNetMois = targetRente - targetFiscMois;

      return (
        <div className={className}>
          {/* HEADER centré */}
          <div className="px-5 pt-5 pb-4 text-center relative">
            {isScenario && onRemove && (
              <button onClick={onRemove} className="absolute top-3 right-3 p-1 text-stone-400 hover:text-red-600 hover:bg-red-50 rounded transition no-print"><I.x/></button>
            )}
            <div className="inline-flex items-center gap-1 text-[9px] font-bold uppercase tracking-widest mb-2" style={{color: accent}}>
              {isLivret && <><I.lock/> Référence</>}
              {isSolution && <><I.sparkle/> Solution</>}
              {isScenario && <>Scénario</>}
            </div>
            <div className={`text-[18px] font-bold tracking-tight ${textPrimary}`}>{col.name}</div>
            <div className={`text-[11px] ${textSecondary} mt-1`}>
              {isLivret ? <>Taux servi <span className="num font-semibold">{fmtPCT(col.rdt)}</span></> : <>Hypothèse de rendement <span className="num font-semibold">{fmtPCT(col.rdt)}</span></>}
            </div>

            {/* HERO : Valorisation de votre épargne */}
            <div className="mt-5 pt-4 border-t border-stone-200/60">
              <div className={`text-[10px] uppercase tracking-widest font-bold ${textSecondary} mb-1`}>Valorisation de votre épargne</div>
              <div className={`num text-3xl font-bold tracking-tightest ${textPrimary} leading-none`}>{fmtEUR(col.capital)}</div>
            </div>
          </div>

          {/* ═══════ EN CAS DE VIE ═══════ */}
          <SectionTitle textPrimary={textPrimary} sectionBg={sectionBg} dividerColor={dividerColor} accent={accent}>
            Investissement — En cas de vie
          </SectionTitle>
          <div className="px-5 py-4 space-y-2.5" style={{minHeight: '130px'}}>
            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Épargne investie" val={fmtEUR(col.versements)} />
            {col.isPER && col.reductionImpotCumulee > 0 && (
              <Row textPrimary={textPrimary} textSecondary={textSecondary}
                lbl="Coût réel pour l'épargnant"
                val={<span style={{whiteSpace:'nowrap'}}>{fmtEUR(col.coutReel ?? Math.max(0, col.versements - col.reductionImpotCumulee))} <span className="font-normal text-[9px] opacity-60">(cap.−réduc.)</span></span>} bold />
            )}
            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Plus-value" val={`+${fmtEUR(col.plusValue)}`} positive />
            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Capital + intérêts" val={fmtEUR(col.capital)} bold />
            {col.isPER && col.reductionImpotCumulee > 0 && (
              <div className="mt-3 pt-3 border-t border-stone-200/60 rounded-md bg-emerald-50/60 px-3 py-2.5 ring-1 ring-emerald-200/60">
                <div className="flex items-baseline justify-between gap-2">
                  <div className="text-[10px] uppercase tracking-widest font-bold text-emerald-700">Réduction d'impôt PER</div>
                  <div className="num text-[16px] font-bold text-emerald-700">{fmtEUR(col.reductionImpotCumulee)}</div>
                </div>
                <div className="text-[10px] text-emerald-700/80 mt-1">
                  Versements déductibles × TMI {(col.tauxIRPct*100).toFixed(0)}%

          {/* ═══════ EN CAS DE DÉCÈS ═══════ */}
          <SectionTitle textPrimary={textPrimary} sectionBg={sectionBg} dividerColor={dividerColor} accent={accent}>
            En cas de décès
          </SectionTitle>
          <div className="px-5 py-4 space-y-2.5" style={{minHeight: '160px'}}>
            <Row textPrimary={textPrimary} textSecondary={textSecondary} lbl="Capital à transmettre" val={fmtEUR(col.capitalDeces)} />
            <div style={{minHeight: '40px'}}>
              <div className={`flex items-center justify-between text-[12px] ${textSecondary}`}>
                <span>Abattement</span>
                <span className={`num font-semibold ${textPrimary}`}>{col.abattement === 0 ? '0 €' : `−${fmtEUR(col.abattement)}`}</span>
              </div>
              <div className={`text-[10px] ${textMuted} mt-0.5 truncate`}>{col.abattDetail}</div>
            </div>

              {isBestSuccession && !isLivret && <I.trophy />}

            <div className={`num text-2xl md:text-[28px] font-bold tracking-tightest ${highlightTxt} leading-none`}>{fmtEUR(col.netTransmis)}</div>
          </div>

            Rente

          <div className="px-5 py-4 space-y-3">

              <div className={`text-[10px] uppercase tracking-wider font-semibold ${textSecondary}`}>Rente mensuelle brute</div>
              <div className={`num text-[26px] font-bold tracking-tightest ${textPrimary} mt-0.5 leading-none`}>
                {fmtEUR(targetRente)}<span className="text-base font-medium opacity-60"> /mois</span>
              </div>

                onChange={e=>{
                  const v = parseFloat(e.target.value);
                  // Première fenêtre de 100 € depuis le min : valeur précise à l'euro

    function SectionTitle({ children, textPrimary, sectionBg, dividerColor, accent }) {
